<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구-달 충돌 시뮬레이션 (최종 수정)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 기본 우주 배경 */
            font-family: 'Apple SD Gothic Neo', sans-serif;
        }

        /* 메인 컨테이너 */
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 배경: 도시 야경 (하늘 확보를 위해 아래쪽에 배치) */
        #scene-background {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center bottom;
            z-index: 1; /* 가장 뒤 */
            transition: opacity 1s, filter 0.5s;
        }

        /* 용암 배경 (초기에는 숨김) */
        #lava-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1516733725897-1aa73b87c8e8?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            z-index: 0;
            opacity: 0;
            filter: hue-rotate(-10deg) saturate(2);
        }

        /* 실제 달 사진 적용 */
        #moon {
            position: absolute;
            top: 15%; /* 하늘 위쪽에 배치 */
            left: 50%;
            width: 80px;
            height: 80px;
            background-image: url('https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004720/lroc_color_poles_1k.jpg');
            background-size: cover;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            z-index: 5;
            transition: filter 1s;
        }

        /* 충돌 애니메이션 (30초) */
        @keyframes crash-animation {
            0% { transform: translate(-50%, -50%) scale(1); top: 15%; filter: brightness(1); }
            80% { filter: brightness(1.2) drop-shadow(0 0 20px red); }
            100% { transform: translate(-50%, -50%) scale(50); top: 50%; filter: brightness(5); }
        }

        .crashing {
            animation: crash-animation 30s cubic-bezier(0.6, 0, 1, 0.5) forwards;
        }

        /* 화면 흔들림 */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-10px, 10px); }
            50% { transform: translate(10px, -10px); }
            75% { transform: translate(-15px, -5px); }
        }

        .shaking #viewport {
            animation: shake 0.1s infinite;
        }

        /* UI 레이어: 버튼과 타이머가 항상 위에 보이도록 설정 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 버튼을 아래쪽으로 */
            align-items: center;
            padding-bottom: 80px;
            z-index: 1000; /* 모든 요소보다 위에 */
            pointer-events: none; /* UI 빈 공간 클릭 시 뒤쪽 요소 방해 안함 */
        }

        button {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #ff4500;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(255, 69, 0, 0.6);
            pointer-events: auto; /* 버튼만 클릭 가능하게 */
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            transform: scale(1.1);
            background-color: #ff6347;
        }

        button:active {
            transform: scale(0.95);
        }

        #timer {
            font-size: 4rem;
            color: #ff4500;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 20px black;
            display: none;
        }

        #resetBtn {
            display: none;
            background-color: #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 용암 파티클 */
        .lava-drop {
            position: absolute;
            width: 10px;
            height: 10px;
            background: orange;
            border-radius: 50%;
            box-shadow: 0 0 10px red;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="scene-background"></div>
        <div id="lava-background"></div>
        <div id="moon"></div>
    </div>

    <div id="ui-layer">
        <div id="timer">30.00</div>
        <button id="startBtn">충돌 시작</button>
        <button id="resetBtn">처음으로</button>
    </div>

    <script>
        const moon = document.getElementById('moon');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timer');
        const sceneBg = document.getElementById('scene-background');
        const lavaBg = document.getElementById('lava-background');
        const body = document.body;

        let timerInterval;

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            timerDisplay.style.display = 'block';
            
            // 달 강하 시작
            moon.classList.add('crashing');

            // 타이머 시작
            const startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                const remaining = (30 - elapsed).toFixed(2);

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.innerText = "0.00";
                    triggerEndSequence();
                } else {
                    timerDisplay.innerText = remaining;
                }
            }, 10);
        });

        function triggerEndSequence() {
            // 1. 화면 흔들림 시작
            body.classList.add('shaking');

            // 2. 용암 파티클 생성 (화면 중앙에서 튀어오름)
            for(let i=0; i<30; i++) {
                createLava();
            }

            // 3. 충돌 연출 (흰색 섬광 후 배경 교체)
            setTimeout(() => {
                sceneBg.style.opacity = '0';
                lavaBg.style.opacity = '1';
                moon.style.display = 'none';
                timerDisplay.style.color = "white";
                
                setTimeout(() => {
                    body.classList.remove('shaking');
                    resetBtn.style.display = 'block';
                }, 1000);
            }, 500);
        }

        function createLava() {
            const drop = document.createElement('div');
            drop.className = 'lava-drop';
            drop.style.left = '50%';
            drop.style.top = '50%';
            document.body.appendChild(drop);

            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 500 + 100;
            const x = Math.cos(angle) * dist;
            const y = Math.sin(angle) * dist;

            drop.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${x}px, ${y}px) scale(0)`, opacity: 0 }
            ], {
                duration: 1500,
                easing: 'ease-out'
            });

            setTimeout(() => drop.remove(), 1500);
        }

        resetBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
