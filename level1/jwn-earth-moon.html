<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구-달 충돌: 종말의 날</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Apple SD Gothic Neo', sans-serif;
        }

        /* 1. 화면 2분할 구조 */
        #container {
            display: flex; flex-direction: column;
            width: 100%; height: 100%; transition: opacity 1s;
        }

        /* 상단: 하늘 배경 */
        #sky {
            flex: 1; position: relative;
            background: linear-gradient(to bottom, #000814 0%, #001d3d 100%);
            overflow: hidden;
        }

        /* 하단: 도시 배경 */
        #city {
            flex: 1; position: relative;
            background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center top;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        /* 2. 달 배치 (상단 우측 시작) */
        #moon {
            position: absolute;
            top: 20%; right: 10%;
            width: 60px; height: 60px;
            background-image: url('https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004720/lroc_color_poles_1k.jpg');
            background-size: cover; border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            z-index: 10;
        }

        /* 3. 달 낙하 애니메이션 (도시 중앙으로) */
        @keyframes crash-to-city {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-40vw, 80vh) scale(15); filter: brightness(3) contrast(2); }
        }
        .crashing { animation: crash-to-city 30s cubic-bezier(0.7, 0, 1, 0.5) forwards; }

        /* 4. 효과: 거대한 파도 */
        #tsunami {
            position: absolute; bottom: -100%; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 100, 255, 0.6);
            backdrop-filter: blur(5px); z-index: 20;
            transition: bottom 1.5s ease-out;
        }

        /* 5. 효과: 용암 분출 */
        .lava-fountain {
            position: absolute; bottom: 0;
            width: 10px; background: linear-gradient(to top, #ff4500, #ffff00);
            box-shadow: 0 0 20px #ff0; z-index: 21;
        }

        /* 6. 우주 시점 화면 */
        #space-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
        }
        #earth-destruct {
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, #4169e1, #000);
            box-shadow: 0 0 50px #ff4500;
            animation: explode-earth 5s forwards;
        }
        @keyframes explode-earth {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(2) hue-rotate(-20deg); }
            100% { transform: scale(0); opacity: 0; }
        }

        /* UI */
        #ui {
            position: fixed; bottom: 50px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            text-align: center;
        }
        button {
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer;
            background: #ff4500; color: white; border: none; border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #timer { color: white; font-size: 3rem; font-weight: bold; margin-bottom: 10px; display: none; }
        #resetBtn { display: none; background: #333; }

        /* 흔들림 효과 */
        .shake { animation: shake-screen 0.1s infinite; }
        @keyframes shake-screen {
            0% { transform: translate(0,0); }
            50% { transform: translate(5px, 5px); }
            100% { transform: translate(-5px, -5px); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="sky">
            <div id="moon"></div>
        </div>
        <div id="city">
            <div id="tsunami"></div>
        </div>
    </div>

    <div id="space-view">
        <div id="earth-destruct"></div>
        <h2 id="end-msg">지구 통신 두절...</h2>
    </div>

    <div id="ui">
        <div id="timer">30.00</div>
        <button id="startBtn">충돌 시작</button>
        <button id="resetBtn">처음으로</button>
    </div>

    <script>
        const moon = document.getElementById('moon');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timer');
        const tsunami = document.getElementById('tsunami');
        const container = document.getElementById('container');
        const spaceView = document.getElementById('space-view');

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            timerDisplay.style.display = 'block';
            moon.classList.add('crashing');

            let timeLeft = 30;
            const startTime = Date.now();

            const timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                const remaining = Math.max(0, 30 - elapsed).toFixed(2);
                timerDisplay.innerText = remaining;

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    triggerCatastrophe();
                }
            }, 10);
        });

        function triggerCatastrophe() {
            // 1. 흔들림 및 파도 발생
            document.body.classList.add('shake');
            tsunami.style.bottom = '0';

            // 2. 용암 분출 파티클
            for(let i=0; i<20; i++) {
                setTimeout(createLava, i * 100);
            }

            // 3. 3초 후 우주 시점으로 전환
            setTimeout(() => {
                container.style.opacity = '0';
                setTimeout(() => {
                    container.style.display = 'none';
                    spaceView.style.display = 'flex';
                    document.body.classList.remove('shake');
                    
                    // 4. 5초 후 종료 처리
                    setTimeout(() => {
                        document.getElementById('end-msg').innerText = "충돌 시뮬레이션 종료";
                        resetBtn.style.display = 'inline-block';
                    }, 5000);
                }, 1000);
            }, 3000);
        }

        function createLava() {
            const lava = document.createElement('div');
            lava.className = 'lava-fountain';
            lava.style.left = Math.random() * 100 + '%';
            document.getElementById('city').appendChild(lava);

            const height = Math.random() * 200 + 100;
            lava.animate([
                { height: '0px', bottom: '0px' },
                { height: height + 'px', bottom: '0px' },
                { height: '0px', bottom: '0px', opacity: 0 }
            ], { duration: 1000, easing: 'ease-out' });

            setTimeout(() => lava.remove(), 1000);
        }

        resetBtn.addEventListener('click', () => location.reload());
    </script>
</body>
</html>
