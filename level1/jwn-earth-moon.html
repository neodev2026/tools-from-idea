<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구-달 충돌: 리얼리티 극대화 (쓰나미 애니메이션 강화)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Apple SD Gothic Neo', sans-serif;
        }

        /* 전체 화면 컨테이너 */
        #wrapper {
            position: relative;
            width: 100%; height: 100%;
            transition: opacity 1.5s;
        }

        /* 상단: 밤하늘 */
        #sky {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(to bottom, #000411 0%, #001233 100%);
            z-index: 1;
        }

        /* 하단: 밤의 도시 */
        #city {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 50%;
            background-image: url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=2000&q=80');
            background-size: cover; background-position: center top;
            filter: brightness(0.6) contrast(1.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
            /* 중요: 도시 영역 밖으로 물이나 용암이 나가지 않게 가둠 */
            overflow: hidden; 
        }

        /* 달 (독립 레이어로 빼내어 숨는 현상 방지) */
        #moon {
            position: absolute;
            top: 10%; left: 80%;
            width: 60px; height: 60px;
            background-image: url('https://svs.gsfc.nasa.gov/vis/a000000/a004700/a004720/lroc_color_poles_1k.jpg');
            background-size: cover; border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%) scale(1);
            z-index: 50; 
        }

        @keyframes crash-path {
            0% { top: 10%; left: 80%; transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
            80% { filter: brightness(2) drop-shadow(0 0 20px #ff4500); } 
            100% { top: 75%; left: 50%; transform: translate(-50%, -50%) scale(25); filter: brightness(5); }
        }
        .crashing { animation: crash-path 30s cubic-bezier(0.7, 0, 1, 0.4) forwards; }

        /* 🔥 개선된 쓰나미 파도 애니메이션 */
        #tsunami {
            position: absolute; bottom: -100%; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?auto=format&fit=crop&w=2000&q=80');
            /* 이미지를 가로로 2배 늘려서 이동할 공간을 확보 */
            background-size: 200% 100%; 
            background-position: right bottom; /* 오른쪽 끝에서 시작 */
            opacity: 0.85;
            z-index: 10;
            /* 위로 차오름(bottom)과 동시에 가로로 지나감(background-position) */
            transition: bottom 5s ease-out, background-position 5s linear;
            filter: hue-rotate(-10deg) brightness(0.6) contrast(1.2);
        }
        
        /* 자바스크립트에서 클래스를 추가하면 파도가 차오르며 지나갑니다 */
        .tsunami-active {
            bottom: 0 !important;
            background-position: left bottom !important; /* 왼쪽으로 쓸고 지나감 */
        }

        /* 용암 */
        #lava-ocean {
            position: absolute; bottom: -120%; left: -10%;
            width: 120%; height: 120%;
            background-image: url('https://images.unsplash.com/photo-1516733725897-1aa73b87c8e8?auto=format&fit=crop&w=2000&q=80');
            background-size: cover; background-position: center;
            z-index: 20;
            transition: bottom 1s cubic-bezier(0.1, 0.8, 0.1, 1);
            filter: saturate(1.8) contrast(1.5);
        }
        @keyframes lava-slosh {
            0% { transform: skewY(1deg) scaleY(1) translateY(0); }
            100% { transform: skewY(-1deg) scaleY(1.05) translateY(-20px); }
        }
        .sloshing { animation: lava-slosh 1.5s infinite alternate ease-in-out; }

        /* 충돌 섬광 */
        #flash {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, #fff 0%, #ff4500 40%, transparent 100%);
            opacity: 0; z-index: 40; pointer-events: none;
            mix-blend-mode: screen;
            transition: opacity 0.5s;
        }

        /* 지진 흔들림 */
        .earthquake { animation: shake-hard 0.1s infinite; }
        @keyframes shake-hard {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-8px, 6px); }
            50% { transform: translate(8px, -8px); }
            75% { transform: translate(-6px, -6px); }
        }

        /* 우주 시점 엔딩 */
        #space-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #earth-destruct {
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #0044ff, #001144);
            box-shadow: 0 0 50px #ff2a00, inset 0 0 30px #000;
            animation: space-explode 5s forwards;
        }
        @keyframes space-explode {
            0% { transform: scale(1); filter: brightness(1); }
            30% { transform: scale(1.1); background: radial-gradient(circle at 50% 50%, #ff4500, #4a0000); box-shadow: 0 0 100px #ff4500; }
            80% { transform: scale(1.5); opacity: 1; filter: blur(2px); }
            100% { transform: scale(0); opacity: 0; filter: blur(10px); }
        }

        /* UI 엘리먼트 */
        #ui {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            text-align: center;
        }
        button {
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            background: rgba(255, 69, 0, 0.8); color: white; border: 2px solid #ff4500;
            border-radius: 30px; backdrop-filter: blur(5px); transition: 0.3s;
        }
        button:hover { background: #ff4500; transform: scale(1.05); }
        #timer { color: white; font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 10px #000; margin-bottom: 20px; display: none; }
        #end-msg { color: white; font-size: 2rem; margin-top: 30px; letter-spacing: 5px; opacity: 0; transition: opacity 1s; }
        #resetBtn { display: none; background: transparent; border-color: white; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="wrapper">
        <div id="sky"></div>
        <div id="city">
            <div id="tsunami"></div>
            <div id="lava-ocean"></div>
        </div>
        <div id="moon"></div>
        <div id="flash"></div>
    </div>

    <div id="space-view">
        <div id="earth-destruct"></div>
        <div id="end-msg">시뮬레이션 종료</div>
        <button id="resetBtn">처음으로</button>
    </div>

    <div id="ui">
        <div id="timer">30.00</div>
        <button id="startBtn">충돌 시작</button>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timer');
        const moon = document.getElementById('moon');
        const wrapper = document.getElementById('wrapper');
        const tsunami = document.getElementById('tsunami');
        const lavaOcean = document.getElementById('lava-ocean');
        const flash = document.getElementById('flash');
        const spaceView = document.getElementById('space-view');
        const endMsg = document.getElementById('end-msg');

        let startTime;
        let isTsunamiTriggered = false;
        let isCollisionTriggered = false;

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            timerDisplay.style.display = 'block';
            moon.classList.add('crashing');

            startTime = Date.now();
            requestAnimationFrame(updateTimer); 
        });

        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            const remaining = Math.max(0, 30 - elapsed).toFixed(2);
            timerDisplay.innerText = remaining;

            // 1. 충돌 5초 전 (25초 경과): 지진 시작 & 쓰나미가 지나감
            if (elapsed >= 25 && !isTsunamiTriggered) {
                isTsunamiTriggered = true;
                document.body.classList.add('earthquake');
                timerDisplay.style.color = "#ff4500";
                
                // 클래스를 추가하여 쓰나미 애니메이션 트리거 (차오름 + 지나감)
                tsunami.classList.add('tsunami-active');
            }

            // 2. 충돌 시점 (30초 경과): 화산/용암 분출
            if (elapsed >= 30 && !isCollisionTriggered) {
                isCollisionTriggered = true;
                timerDisplay.innerText = "0.00";
                
                // 완전 충돌 이펙트
                flash.style.opacity = '1';
                moon.style.display = 'none'; 
                
                // 용암이 쓰나미 위로 분출하며 출렁임
                lavaOcean.style.bottom = '0';
                lavaOcean.classList.add('sloshing');

                timerDisplay.style.display = 'none';

                // 3초 후 우주 뷰로 전환
                setTimeout(() => {
                    wrapper.style.opacity = '0'; 
                    document.body.classList.remove('earthquake');
                    
                    setTimeout(() => {
                        wrapper.style.display = 'none';
                        spaceView.style.display = 'flex'; 
                        
                        setTimeout(() => {
                            endMsg.style.opacity = '1';
                            resetBtn.style.display = 'inline-block';
                        }, 5000);

                    }, 1500); 
                }, 3000); 

                return; 
            }

            requestAnimationFrame(updateTimer);
        }

        // 초기화 버튼
        resetBtn.addEventListener('click', () => location.reload());
    </script>
</body>
</html>
