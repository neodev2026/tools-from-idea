<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>1M층 우주 엘레베이터</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: 'Malgun Gothic', sans-serif; color: white; overflow: hidden;
        }

        /* 우주 공간 (층수에 따라 배경이 움직임) */
        #space {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #000000, #020111, #050b18, #191d35);
            z-index: -1; transition: background-position 3s ease-in-out;
        }

        /* 행성 스타일 */
        .planet {
            position: absolute; left: 10%; font-size: 120px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
            transition: top 3s ease-in-out;
            display: flex; flex-direction: column; align-items: center; font-size: 100px;
        }
        .planet span { font-size: 20px; margin-top: 10px; color: #ffd700; }

        /* 별 배경 */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; }

        #game-container { display: flex; gap: 30px; align-items: flex-end; height: 80vh; width: 90%; max-width: 1000px; }

        #shaft {
            flex: 1; height: 100%; border: 5px solid rgba(255, 215, 0, 0.5);
            border-radius: 20px; position: relative; background: rgba(255,255,255,0.05);
        }

        #elevator {
            width: 140px; height: 170px; background: #f1c40f; border: 4px solid #d4ac0d;
            border-radius: 15px; position: absolute; left: 50%; transform: translateX(-50%);
            bottom: 0%; transition: bottom 3s ease-in-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #display {
            width: 110px; height: 35px; background: #000; color: #00ff00;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: bold; margin-bottom: 5px;
        }

        #passenger { font-size: 70px; transition: 0.5s; }
        .exit { opacity: 0; transform: translateX(50px); }
        .enter { opacity: 0; transform: translateX(-50px); }

        #panel {
            flex: 1; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 20px;
            display: flex; flex-direction: column; gap: 10px; border: 2px solid #00d2ff;
        }

        #button-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            overflow-y: auto; max-height: 400px;
        }

        button { height: 50px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        button.active { background: #ff00ff; color: white; }
        .special { background: #ff9a9e; }

        input { font-size: 20px; width: 100%; padding: 10px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

    <div id="space"></div>

    <div id="p-moon" class="planet" style="top: 80vh;">🌙<span>달 (1만 층)</span></div>
    <div id="p-sun" class="planet" style="top: -100vh;">☀️<span>태양 (10만 층)</span></div>
    <div id="p-mars" class="planet" style="top: -300vh;">🔴<span>화성 (30만 층)</span></div>
    <div id="p-jupiter" class="planet" style="top: -500vh;">🪐<span>목성 (50만 층)</span></div>
    <div id="p-saturn" class="planet" style="top: -800vh;">🪐<span>토성 (80만 층)</span></div>
    <div id="p-galaxy" class="planet" style="top: -1000vh;">🌌<span>은하수 (100만 층)</span></div>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="display">1</div>
                <div id="passenger">🧙‍♀️</div>
            </div>
        </div>

        <div id="panel">
            <input type="number" id="target-input" value="1" placeholder="가고 싶은 층">
            <button onclick="goMagic()" style="background: #00d2ff; color: white; margin-bottom: 10px;">우주선 출발!</button>
            <div id="button-grid"></div>
        </div>
    </div>

    <script>
        const planets = [
            { id: 'p-moon', floor: 10000 },
            { id: 'p-sun', floor: 100000 },
            { id: 'p-mars', floor: 300000 },
            { id: 'p-jupiter', floor: 500000 },
            { id: 'p-saturn', floor: 800000 },
            { id: 'p-galaxy', floor: 1000000 }
        ];

        // 별 만들기
        const space = document.getElementById('space');
        for(let i=0; i<150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            space.appendChild(star);
        }

        // 버튼 만들기
        const grid = document.getElementById('button-grid');
        [1000000, 800000, 500000, 300000, 100000, 50000, 10000, 5000, 1000, 1].forEach(f => {
            const b = document.createElement('button');
            b.innerText = f.toLocaleString();
            if(f >= 100000) b.className = 'special';
            b.onclick = () => { document.getElementById('target-input').value = f; moveElevator(f, b); };
            grid.appendChild(b);
        });

        function goMagic() {
            moveElevator(parseInt(document.getElementById('target-input').value));
        }

        function moveElevator(floor, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            // 1. 엘레베이터 위치 (화면 내 이동)
            const elPos = (floor / 1000000) * 85;
            document.getElementById('elevator').style.bottom = elPos + "%";

            // 2. 행성들 위치 (층수에 따라 배경이 흐름)
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                // 현재 층수와 행성 층수의 차이에 따라 위치 계산
                const offset = (p.floor - floor) * 0.1; 
                pEl.style.top = (40 - offset) + "vh"; 
            });

            // 3. 숫자 카운팅
            let cur = parseInt(document.getElementById('display').innerText.replace(/,/g,''));
            const timer = setInterval(() => {
                const diff = floor - cur;
                if(Math.abs(diff) < 1) {
                    clearInterval(timer);
                    document.getElementById('display').innerText = floor.toLocaleString();
                    arrive();
                } else {
                    cur += diff / 10;
                    document.getElementById('display').innerText = Math.round(cur).toLocaleString();
                }
            }, 30);
        }

        function arrive() {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance("아이미따미꼬 야옹야옹");
            m.lang = 'ko-KR'; m.pitch = 1.8;
            window.speechSynthesis.speak(m);

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                const friends = ["🧙‍♀️", "🤖", "🐰", "😊", "🐼", "🦄", "🦖"];
                p.innerText = friends[Math.floor(Math.random()*friends.length)];
                p.classList.remove('exit');
                p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 500);
        }
    </script>
</body>
</html>
