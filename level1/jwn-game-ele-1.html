<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우주 끝판왕 엘레베이터 (완결판)</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: 'Malgun Gothic', sans-serif; color: white; overflow: hidden;
            cursor: pointer; transition: background 1s, filter 1s;
        }

        /* 우주 공간 (클릭 방해 방지) */
        #space {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000000 0%, #000511 100%);
            z-index: -1; pointer-events: none;
        }

        /* 💻 해커 매트릭스 배경 (게임 밖 탈출 시) */
        #matrix-bg {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background: #000; color: #0f0; font-family: monospace; font-size: 20px;
            z-index: -2; opacity: 0; pointer-events: none; white-space: pre-wrap; overflow: hidden;
        }

        /* 행성 스타일 */
        .planet {
            position: absolute; left: 8%; transition: top 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; font-size: 90px;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.5)); pointer-events: none;
        }
        .planet span { font-size: 18px; margin-top: 10px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 5px #000; text-align: center; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: blink 2s infinite; pointer-events: none; }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }

        /* 각종 애니메이션 효과 */
        .earthquake { animation: shake 0.1s infinite !important; }
        .universe-break { animation: crazyShake 0.05s infinite, colorBurst 0.2s infinite !important; }
        .system-error { animation: glitchScreen 0.1s infinite !important; }
        
        /* 🌌 차원 붕괴 (특이점) 효과 */
        .zero-gravity { animation: floatAway 4s forwards ease-in-out !important; pointer-events: none; }
        .spin-crazy { animation: spinOut 3s forwards cubic-bezier(0.5, 0, 0.5, 1) !important; }

        @keyframes shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-3px, -2px) rotate(-1deg); } 100% { transform: translate(3px, -2px) rotate(1deg); } }
        @keyframes crazyShake { 0% { transform: translate(5px, 5px) rotate(2deg) scale(1.02); } 50% { transform: translate(-5px, -5px) rotate(-2deg) scale(0.98); } 100% { transform: translate(5px, 5px) rotate(1deg) scale(1.02); } }
        @keyframes colorBurst { 0% { filter: invert(0%) hue-rotate(0deg); } 50% { filter: invert(100%) hue-rotate(180deg); } 100% { filter: invert(0%) hue-rotate(360deg); } }
        @keyframes glitchScreen { 0% { filter: hue-rotate(0deg); transform: translate(0); } 50% { filter: hue-rotate(90deg) invert(20%); transform: translate(10px, -10px) skewX(20deg); } 100% { filter: hue-rotate(0deg); transform: translate(0); } }
        @keyframes floatAway { 0% { transform: translateY(0) rotate(0deg); opacity: 1; filter: blur(0px); } 100% { transform: translateY(-500px) rotate(45deg) scale(0.5); opacity: 0; filter: blur(10px); } }
        @keyframes spinOut { 0% { transform: translateX(-50%) rotate(0deg) scale(1); } 100% { transform: translateX(-50%) rotate(7200deg) scale(0); opacity: 0; } }

        #game-container { display: flex; gap: 20px; align-items: flex-end; height: 85vh; width: 95%; max-width: 1300px; transition: 0.1s; }

        #shaft {
            flex: 1.2; height: 100%; border: 5px solid #ffd700; border-radius: 25px;
            position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(255,215,0,0.3); transition: all 1s;
        }

        #elevator {
            width: 160px; height: 190px; background: linear-gradient(135deg, #f1c40f, #f39c12);
            border: 4px solid #d4ac0d; border-radius: 15px; position: absolute;
            left: 50%; transform: translateX(-50%); bottom: 0%; transition: bottom 3s cubic-bezier(0.25, 1, 0.5, 1), transform 3s, box-shadow 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        /* 💬 말풍선 스타일 */
        #speech-bubble {
            position: absolute; top: -65px; background: #fff; color: #000;
            padding: 10px 15px; border-radius: 20px; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); opacity: 0; transition: 0.4s ease-out;
            pointer-events: none; white-space: nowrap; z-index: 20; transform: translateY(10px);
            border: 3px solid #ffcc00; text-align: center;
        }
        #speech-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #ffcc00 transparent transparent transparent;
        }
        .show-bubble { opacity: 1 !important; transform: translateY(0) !important; }

        #display {
            width: 150px; height: 50px; background: #000; color: #00ff00;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; margin-bottom: 8px; font-family: 'Courier New', monospace;
            text-align: center; line-height: 1.3;
        }

        #passenger { font-size: 80px; transition: 0.5s; }
        .exit { opacity: 0; transform: translateX(60px) rotate(20deg); }
        .enter { opacity: 0; transform: translateX(-60px) rotate(-20deg); }

        #panel {
            flex: 1; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; gap: 10px; border: 3px solid #00d2ff; z-index: 100; transition: all 2s;
        }

        #button-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            overflow-y: auto; max-height: 550px; padding-right: 5px;
        }

        button { height: 55px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        button.active { background: #ff00ff; color: white; box-shadow: 0 0 15px #ff00ff; }
        
        /* 특수 버튼 디자인들 */
        .special { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; }
        .mega-btn { background: linear-gradient(45deg, #f1c40f, #e74c3c); color: white; font-size: 16px; }
        .hyper-btn { background: linear-gradient(45deg, #ff00cc, #3333ff); color: white; text-shadow: 0 0 5px #fff; box-shadow: 0 0 20px #ff00cc; }
        
        /* 🕳️ 특이점 버튼 */
        .singularity-btn { background: radial-gradient(circle, #ffffff 0%, #00ffff 20%, #ff00ff 50%, #000000 100%); background-size: 200% 200%; color: #fff; font-size: 17px; border: 6px dashed #fff; text-shadow: 0 0 10px #000; box-shadow: 0 0 100px #fff; animation: singularityPulse 0.5s infinite alternate; }
        /* 💻 에러 탈출 버튼 */
        .error-btn { background: #000; color: #0f0; font-family: monospace; font-size: 16px; border: 4px solid #0f0; text-shadow: 0 0 10px #0f0; box-shadow: inset 0 0 20px #0f0; animation: errorGlitch 0.2s infinite; }
        /* 💥 우주 폭발 버튼 */
        .universe-breaker-btn { background: linear-gradient(135deg, #000, #ff0000, #000, #ff00ff, #000); background-size: 1000% 1000%; color: #fff; border: 8px double #fff; box-shadow: 0 0 150px #ff0000; animation: universeBreaker 0.05s infinite; }
        /* 🔥 15층 수학 트릭 버튼 */
        .math-trick-btn { background: linear-gradient(45deg, #ff5500, #ff0000, #000000, #ff0000); background-size: 300% 300%; color: #fff; font-size: 16px; border: 4px dashed #ffff00; animation: dangerPulse 0.1s infinite; }

        @keyframes singularityPulse { 0% { background-position: 0% 0%; transform: scale(1) rotate(-1deg); } 100% { background-position: 100% 100%; transform: scale(1.05) rotate(1deg); } }
        @keyframes errorGlitch { 0% { transform: translate(0); text-shadow: 2px 0 red, -2px 0 blue; } 50% { transform: translate(-2px, 2px); text-shadow: -2px 0 red, 2px 0 blue; } 100% { transform: translate(2px, -2px); text-shadow: 2px 0 red, -2px 0 blue; } }
        @keyframes universeBreaker { 0% { filter: invert(0%); } 50% { filter: invert(100%); } }
        @keyframes dangerPulse { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        input { font-size: 18px; width: 100%; padding: 10px; box-sizing: border-box; text-align: center; border-radius: 10px; border: 2px solid #00d2ff; background: #111; color: white; }
    </style>
</head>
<body>

    <div id="space"></div>
    <div id="matrix-bg"></div> <div id="p-15" class="planet" style="top: 85vh; font-size: 60px;">🏫<span>15층 (비밀!)</span></div>
    <div id="p-moon" class="planet" style="top: -10vh;">🌙<span>달 (1M 층)</span></div>
    <div id="p-earth" class="planet" style="top: -100vh;">🌍<span>지구 (10M 층)</span></div>
    <div id="p-sun" class="planet" style="top: -300vh;">☀️<span>태양 (100M 층)</span></div>
    <div id="p-galaxy" class="planet" style="top: -1000vh;">🌌<span>블랙홀 (1T 층)</span></div>
    <div id="p-bigbang" class="planet" style="top: -1300vh; font-size: 120px;">🎆<span>빅뱅 (10T 층)</span></div>
    <div id="p-beyond" class="planet" style="top: -2400vh; font-size: 200px;">🌟<span>빛의 세계</span></div>
    <div id="p-universe-break" class="planet" style="top: -4000vh; font-size: 400px;">💥<span>숫자의 끝</span></div>
    <div id="p-error" class="planet" style="top: -6000vh; font-size: 500px; color: #0f0; filter: none;">💻<span style="color:#0f0;">에러: 게임 밖</span></div>
    <div id="p-singularity" class="planet" style="top: -10000vh; font-size: 700px; filter: drop-shadow(0 0 200px #fff);">🕳️<span style="color:#fff; text-shadow:none;">특이점 (절대 무)</span></div>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="speech-bubble">💬 띵동!</div> <div id="display">1</div>
                <div id="passenger">🧙‍♀️</div>
            </div>
        </div>

        <div id="panel">
            <input type="text" id="target-input" value="1" placeholder="가고 싶은 층">
            <button onclick="goMagic()" style="background: #00ff00; color: black; font-size: 16px; padding: 10px;">🌌 워프 가동!</button>
            
            <div id="button-grid">
                <button class="singularity-btn" onclick="clickBtn('SINGULARITY', this)" style="grid-column: span 2; height: 110px;">
                    🕳️ 절대 특이점 (차원 붕괴) 🕳️<br>999T의 1000000승
                </button>
                <button class="error-btn" onclick="clickBtn('SYSTEM_ERROR', this)" style="grid-column: span 2; height: 80px;">
                    [FATAL ERROR] 20^1000^1000<br>💻 게임 밖으로 탈출
                </button>
                <button class="universe-breaker-btn" onclick="clickBtn('UNIVERSE_BREAK', this)" style="grid-column: span 2; height: 70px;">💥 숫자의 끝 (우주 폭발) 💥</button>
                <button class="math-trick-btn" onclick="clickBtn('MATH_TRICK', this)" style="grid-column: span 2; height: 60px;">🔥 대폭발 주의?! 15^1^100</button>
                
                <button class="hyper-btn" onclick="clickBtn('10^999', this)">10의 999승</button>
                <button class="hyper-btn" onclick="clickBtn(999000000000000, this)">999T (999조)</button>
                <button class="hyper-btn" onclick="clickBtn(100000000000000, this)">100T (100조)</button>
                <button class="hyper-btn" onclick="clickBtn(1000000000000, this)">1T (1조)</button>
                <button class="mega-btn" onclick="clickBtn(100000000000, this)">100B (천억)</button>
                <button class="mega-btn" onclick="clickBtn(1000000000, this)">1B (십억)</button>
                <button class="mega-btn" onclick="clickBtn(100000000, this)">100M (일억)</button>
                <button class="special" onclick="clickBtn(10000000, this)">10M (천만)</button>
                <button onclick="clickBtn(15, this)" style="background: #ffcc00; color: #000;">15층</button>
                <button class="active" onclick="clickBtn(1, this)">1</button>
            </div>
        </div>
    </div>

    <script>
        const MATH_TRICK = 'MATH_TRICK';
        const MAGIC_INF = '10^999';
        const UNIVERSE_BREAK_INF = 'UNIVERSE_BREAK';
        const SYSTEM_ERROR_INF = 'SYSTEM_ERROR';
        const SINGULARITY_INF = 'SINGULARITY';

        const planets = [
            { id: 'p-15', floor: 15 },
            { id: 'p-moon', floor: 1000000 },
            { id: 'p-earth', floor: 10000000 },
            { id: 'p-sun', floor: 100000000 },
            { id: 'p-galaxy', floor: 1000000000000 },
            { id: 'p-bigbang', floor: 10000000000000 },
            { id: 'p-beyond', floor: MAGIC_INF },
            { id: 'p-universe-break', floor: UNIVERSE_BREAK_INF },
            { id: 'p-error', floor: SYSTEM_ERROR_INF },
            { id: 'p-singularity', floor: SINGULARITY_INF }
        ];

        let globalTimer = null; 
        const matrixBg = document.getElementById('matrix-bg');
        let matrixInterval;

        const space = document.getElementById('space');
        for(let i=0; i<350; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            star.style.animationDelay = Math.random()*2+'s';
            space.appendChild(star);
        }

        function startMatrix() {
            matrixBg.style.opacity = 1; matrixBg.style.zIndex = 0; space.style.opacity = 0;
            document.getElementById('shaft').style.borderColor = '#0f0';
            clearInterval(matrixInterval);
            matrixInterval = setInterval(() => {
                let text = "";
                for(let i=0; i<1000; i++) { text += Math.random() > 0.5 ? "1" : "0"; if(Math.random() > 0.95) text += "\n"; }
                matrixBg.innerText = text;
            }, 100);
        }

        function stopMatrix() {
            clearInterval(matrixInterval); matrixBg.style.opacity = 0; matrixBg.style.zIndex = -2; space.style.opacity = 1;
            document.getElementById('shaft').style.borderColor = '#ffd700';
        }

        function getVisualPos(f) {
            if (f === SINGULARITY_INF) return 100; 
            if (f === SYSTEM_ERROR_INF) return 94; 
            if (f === UNIVERSE_BREAK_INF) return 88; 
            if (f === MAGIC_INF) return 74;
            if (f <= 15) return 5; 
            return Math.pow(f / 999000000000000, 0.06) * 60; 
        }

        function clickBtn(floor, btn) {
            document.getElementById('target-input').value = floor;
            moveElevator(floor, btn);
        }

        function goMagic() {
            const val = document.getElementById('target-input').value;
            if (val === 'MATH_TRICK' || val === '15^1^100') moveElevator(MATH_TRICK);
            else if (val === 'SYSTEM_ERROR' || val.includes('에러')) moveElevator(SYSTEM_ERROR_INF);
            else if (val === 'UNIVERSE_BREAK' || val.includes('폭발')) moveElevator(UNIVERSE_BREAK_INF);
            else if (val === 'SINGULARITY' || val.includes('특이점')) moveElevator(SINGULARITY_INF);
            else if (val === '10^999') moveElevator(MAGIC_INF);
            else moveElevator(parseInt(val.replace(/,/g, '')));
        }

        function moveElevator(floor, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            if (globalTimer) clearInterval(globalTimer);
            
            // 모든 상태 초기화
            document.body.classList.remove('earthquake', 'universe-break', 'system-error');
            document.body.style.backgroundColor = "#000";
            document.body.style.filter = "none";
            document.getElementById('panel').classList.remove('zero-gravity');
            document.getElementById('elevator').classList.remove('spin-crazy');
            document.getElementById('elevator').style.opacity = 1;
            document.getElementById('shaft').style.opacity = 1;
            document.getElementById('elevator').style.transform = "translateX(-50%)";
            document.getElementById('speech-bubble').classList.remove('show-bubble');
            stopMatrix();

            // 💡 15^1^100 수학의 비밀 (반전)
            if (floor === MATH_TRICK) {
                document.body.classList.add('earthquake');
                document.getElementById('elevator').style.bottom = "50%"; 
                let ticks = 0;
                globalTimer = setInterval(() => {
                    ticks++;
                    if (ticks > 60) {
                        clearInterval(globalTimer);
                        document.body.classList.remove('earthquake'); 
                        moveElevatorToRealFloor(15); 
                        arriveMathTrick();
                    } else {
                        document.getElementById('display').innerText = `[위험]\n초강력 에너지!!`;
                        document.body.style.backgroundColor = (ticks % 2 === 0) ? "#ff0000" : "#000"; 
                    }
                }, 50);
                return;
            }

            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                const pPos = getVisualPos(p.floor);
                let offset = (pPos - elPos) * 9.5; 
                pEl.style.top = (40 - offset) + "vh"; 
            });

            // 특수 층 효과
            if (floor === MAGIC_INF || floor === UNIVERSE_BREAK_INF || floor === SYSTEM_ERROR_INF || floor === SINGULARITY_INF) {
                
                if(floor === UNIVERSE_BREAK_INF) document.body.classList.add('universe-break');
                if(floor === SYSTEM_ERROR_INF) document.body.classList.add('system-error');
                if(floor === SINGULARITY_INF) { document.body.classList.add('earthquake'); document.body.style.backgroundColor = "#fff"; document.body.style.filter = "invert(100%)"; }

                let ticks = 0;
                const maxTicks = (floor === SINGULARITY_INF) ? 140 : (floor === SYSTEM_ERROR_INF ? 120 : 90);
                
                globalTimer = setInterval(() => {
                    ticks++;
                    if (ticks > maxTicks) { 
                        clearInterval(globalTimer);
                        document.body.classList.remove('earthquake', 'universe-break', 'system-error'); 
                        
                        if (floor === SYSTEM_ERROR_INF) startMatrix();
                        else if (floor === SINGULARITY_INF) {
                            document.body.style.backgroundColor = "#fff"; document.body.style.filter = "none";
                            document.getElementById('panel').classList.add('zero-gravity');
                            document.getElementById('shaft').style.opacity = 0; 
                            document.getElementById('elevator').classList.add('spin-crazy');
                        } 
                        else if (floor === UNIVERSE_BREAK_INF) document.body.style.backgroundColor = "#fff"; 
                        else document.body.style.backgroundColor = "#000"; 
                        
                        displayFloor(floor); arrive(floor);
                    } else {
                        if (floor === SYSTEM_ERROR_INF) {
                            document.getElementById('display').innerText = `[010101]\n해킹 중!!`;
                        } else if (floor === SINGULARITY_INF) {
                            document.getElementById('display').innerText = `[∞NULL∞]\n차원 소멸 중!`;
                        } else {
                            document.getElementById('display').innerText = `[에러]\n우주 폭발 중!!`;
                            if(floor === UNIVERSE_BREAK_INF) document.body.style.backgroundColor = (ticks % 2 === 0) ? "#fff" : "#000";
                        }
                    }
                }, 50);
                return;
            }

            let currentText = document.getElementById('display').innerText.split('\n')[0].replace(/,/g,'');
            let cur = parseInt(currentText);
            if(isNaN(cur)) cur = 1;
            
            globalTimer = setInterval(() => {
                const diff = floor - cur;
                if(Math.abs(diff) < 1) { clearInterval(globalTimer); displayFloor(floor); arrive(floor); } 
                else { cur += diff / 8; displayFloor(Math.round(cur)); }
            }, 30);
        }

        function moveElevatorToRealFloor(floor) {
            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                const pPos = getVisualPos(p.floor);
                let offset = (pPos - elPos) * 9.5; 
                pEl.style.top = (40 - offset) + "vh"; 
            });
        }

        function displayFloor(f) {
            const d = document.getElementById('display');
            d.style.color = (f === SYSTEM_ERROR_INF) ? "#0f0" : "#00ff00";
            if(f === SINGULARITY_INF) d.innerText = "999T^1000000\n(절대 무)";
            else if(f === SYSTEM_ERROR_INF) d.innerText = "20^1000^1000\n(탈출 성공)";
            else if(f === UNIVERSE_BREAK_INF) d.innerText = "10^10...^10000\n(숫자의 끝)";
            else if(f === MAGIC_INF) d.innerText = "10^999\n(빛의 세계)";
            else if(f === 15) d.innerText = "15\n(수학의 비밀!)";
            else d.innerText = f.toLocaleString();
        }

        function showSpeechBubble(visibleText, speakText, pitch=1.8, rate=1.1) {
            const bubble = document.getElementById('speech-bubble');
            bubble.innerHTML = visibleText;
            bubble.classList.add('show-bubble');
            setTimeout(() => { bubble.classList.remove('show-bubble'); }, 5000);

            const elevator = document.getElementById('elevator');
            elevator.style.boxShadow = "0 0 50px 20px #fff";
            setTimeout(() => { elevator.style.boxShadow = "none"; }, 500);

            const m = new SpeechSynthesisUtterance(speakText);
            m.lang = 'ko-KR'; m.pitch = pitch; m.rate = rate; 
            window.speechSynthesis.speak(m);
        }

        function arriveMathTrick() {
            window.speechSynthesis.cancel();
            displayFloor(15);
            showSpeechBubble("💬 띵동!<br>어라? 1은 백번 곱해도 1이잖아?<br>귀여운 15층!", "우주 대폭발 워프 준비 완료!... 어라? 잠깐만요! 일은 백 번을 곱해도 그냥 일이잖아요? 그래서 십오의 일승은, 귀여운 십오 층이랍니다! 짜잔! 띵동, 십오 층입니다. 야옹야옹!");

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                const friends = ["😼", "🐶", "🏫", "📝", "🤓"];
                p.innerText = friends[Math.floor(Math.random()*friends.length)];
                p.classList.remove('exit'); p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 600);
        }

        function arrive(floor) {
            window.speechSynthesis.cancel();
            let speakText = `띵동, ${floor} 층 입니다 아이미따미꼬 야옹야옹`;
            let bubbleText = `💬 띵동! ${floor.toLocaleString()}층!`;
            let pitch = 1.8; let rate = 1.1;

            if (floor === SINGULARITY_INF) { speakText = "삐리리리... 계산 불가... 특이점에 도달했습니다. 안녕히 계세요."; bubbleText = "💬 특이점 도달.<br>모든 것이 사라졌습니다."; pitch = 0.5; rate = 0.8; }
            else if (floor === SYSTEM_ERROR_INF) { speakText = "삐리리리! 입력하신 숫자가 너무 커서 게임이 터졌습니다! 개발자 방으로 탈출했습니다! 메롱!"; bubbleText = "💻 에러 발생!<br>게임 개발자의 방으로 탈출!"; pitch = 2.0; }
            else if (floor === UNIVERSE_BREAK_INF) { speakText = "십의, 십의, 십의, 십의, 십의, 만승, 승, 승, 승!"; bubbleText = "💥 숫자의 끝에<br>도착했습니다!"; }
            else if (floor === MAGIC_INF) { speakText = "십의 구백구십구승"; bubbleText = "🌟 빛의 세계입니다!"; }
            else if (floor >= 1000000000000) { speakText = "엄청나게 높은 층입니다"; bubbleText = "💬 우주 층입니다!"; }

            showSpeechBubble(bubbleText, speakText, pitch, rate);

            if (floor === SINGULARITY_INF) {
                document.getElementById('passenger').innerText = "👁️‍🗨️";
            } else {
                const p = document.getElementById('passenger');
                p.classList.add('exit');
                setTimeout(() => {
                    let friends = ["💥", "🔥", "⚡", "🌀", "🤯", "🚀"];
                    if (floor === SYSTEM_ERROR_INF) friends = ["👨‍💻", "🤖", "👾", "💻", "🔌"];
                    p.innerText = friends[Math.floor(Math.random()*friends.length)];
                    p.classList.remove('exit'); p.classList.add('enter');
                    setTimeout(() => p.classList.remove('enter'), 50);
                }, 600);
            }
        }
    </script>
</body>
</html>
