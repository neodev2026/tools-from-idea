<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>숫자의 끝 엘레베이터</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: 'Malgun Gothic', sans-serif; color: white; overflow: hidden;
            cursor: pointer;
        }

        /* 우주 공간 배경 */
        #space {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000000 0%, #000511 100%);
            z-index: -1;
        }

        /* 행성 스타일 */
        .planet {
            position: absolute; left: 8%; transition: top 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; font-size: 90px;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.5));
        }
        .planet span { font-size: 18px; margin-top: 10px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 5px #000; text-align: center; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }

        /* 지진(화면 흔들림) 효과 */
        .earthquake { animation: shake 0.1s infinite !important; }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            25% { transform: translate(-3px, -2px) rotate(-1deg); }
            50% { transform: translate(1px, 3px) rotate(1deg); }
            75% { transform: translate(-2px, -1px) rotate(-2deg); }
            100% { transform: translate(3px, -2px) rotate(1deg); }
        }

        /* 우주 폭발 (색상 반전 + 극강 지진) */
        .universe-break { animation: crazyShake 0.05s infinite, colorBurst 0.2s infinite !important; }
        @keyframes crazyShake {
            0% { transform: translate(5px, 5px) rotate(2deg) scale(1.02); }
            25% { transform: translate(-5px, -5px) rotate(-2deg) scale(0.98); }
            50% { transform: translate(5px, -5px) rotate(3deg) scale(1.05); }
            75% { transform: translate(-5px, 5px) rotate(-3deg) scale(0.95); }
            100% { transform: translate(5px, 5px) rotate(1deg) scale(1.02); }
        }
        @keyframes colorBurst {
            0% { filter: invert(0%) hue-rotate(0deg); }
            50% { filter: invert(100%) hue-rotate(180deg); }
            100% { filter: invert(0%) hue-rotate(360deg); }
        }

        #game-container { display: flex; gap: 20px; align-items: flex-end; height: 85vh; width: 95%; max-width: 1300px; transition: 0.1s; }

        #shaft {
            flex: 1.2; height: 100%; border: 5px solid #ffd700; border-radius: 25px;
            position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(255,215,0,0.3);
        }

        #elevator {
            width: 160px; height: 190px; background: linear-gradient(135deg, #f1c40f, #f39c12);
            border: 4px solid #d4ac0d; border-radius: 15px; position: absolute;
            left: 50%; transform: translateX(-50%); bottom: 0%; transition: bottom 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        #display {
            width: 150px; height: 50px; background: #000; color: #00ff00;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; margin-bottom: 8px; font-family: 'Courier New', monospace;
            text-align: center; line-height: 1.3;
        }

        #passenger { font-size: 80px; transition: 0.5s; }
        .exit { opacity: 0; transform: translateX(60px) rotate(20deg); }
        .enter { opacity: 0; transform: translateX(-60px) rotate(-20deg); }

        #panel {
            flex: 1; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; gap: 10px; border: 3px solid #00d2ff;
        }

        #button-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            overflow-y: auto; max-height: 550px; padding-right: 5px;
        }

        button { height: 55px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        button.active { background: #ff00ff; color: white; box-shadow: 0 0 15px #ff00ff; }
        
        .special { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; }
        .mega-btn { background: linear-gradient(45deg, #f1c40f, #e74c3c); color: white; font-size: 16px; }
        .hyper-btn { background: linear-gradient(45deg, #ff00cc, #3333ff); color: white; text-shadow: 0 0 5px #fff; box-shadow: 0 0 20px #ff00cc; }
        .ultimate-btn { background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); animation: rainbow 2s infinite linear; }
        .beyond-btn { background: linear-gradient(45deg, #000000, #4b0082, #0000ff, #ffffff); background-size: 300% 300%; color: #fff; text-shadow: 0 0 10px #fff; border: 2px solid #fff; box-shadow: 0 0 30px #fff; animation: galaxy 2s infinite ease-in-out; }
        .omni-btn { background: linear-gradient(135deg, #ffffff, #ffff00, #00ffff, #ff00ff); background-size: 400% 400%; color: #000; font-weight: 900; text-shadow: 0 0 10px #fff; border: 3px solid #fff; box-shadow: 0 0 50px #ffff00; animation: omniWarp 1s infinite alternate; }
        .absolute-btn { background: #fff; color: #000; font-size: 14px; font-weight: 900; border: 4px solid #000; box-shadow: 0 0 60px #ffffff; animation: glitch 0.5s infinite; }
        .omega-btn { background: linear-gradient(90deg, #ff0000, #ffffff, #0000ff, #ffffff, #ff0000); background-size: 400% 400%; color: #000; font-size: 15px; font-weight: 900; border: 5px dashed #000; box-shadow: 0 0 80px #ffffff, inset 0 0 40px #ff0000; animation: omegaExplosion 0.2s infinite; }
        .true-omega-btn { background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff0000, #000000); background-size: 500% 500%; color: #fff; font-size: 16px; font-weight: 900; border: 6px solid #fff; text-shadow: 0 0 10px #000, 0 0 20px #ff0000; box-shadow: 0 0 100px #ff00ff, inset 0 0 50px #ffff00; animation: trueOmega 0.1s infinite; }
        
        /* 💥 우주 폭발 (숫자의 끝) 버튼 */
        .universe-breaker-btn {
            background: linear-gradient(135deg, #000, #ff0000, #000, #ff00ff, #000);
            background-size: 1000% 1000%; color: #fff; font-size: 18px; font-weight: 900;
            border: 8px double #fff; text-shadow: 0 0 15px #fff, 0 0 30px #ff0000;
            box-shadow: 0 0 150px #ff0000, inset 0 0 80px #ff00ff;
            animation: universeBreaker 0.05s infinite;
        }

        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes galaxy { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes omniWarp { 0% { transform: scale(1); background-position: 0% 50%; } 100% { transform: scale(1.05); background-position: 100% 50%; } }
        @keyframes glitch { 0% { transform: translate(0); filter: invert(0%); } 20% { transform: translate(-2px, 2px); filter: invert(20%); } 40% { transform: translate(-2px, -2px); filter: invert(0%); } 60% { transform: translate(2px, 2px); filter: invert(50%); } 80% { transform: translate(2px, -2px); filter: invert(0%); } 100% { transform: translate(0); filter: invert(10%); } }
        @keyframes omegaExplosion { 0% { transform: scale(1) rotate(1deg); filter: invert(0%); background-position: 0% 50%; } 50% { transform: scale(1.05) rotate(-1deg); filter: invert(100%); background-position: 100% 50%; } 100% { transform: scale(1) rotate(1deg); filter: invert(0%); background-position: 0% 50%; } }
        @keyframes trueOmega { 0% { transform: scale(1); filter: hue-rotate(0deg); } 50% { transform: scale(1.1) rotate(2deg); filter: hue-rotate(180deg); } 100% { transform: scale(1); filter: hue-rotate(360deg); } }
        @keyframes universeBreaker { 0% { transform: scale(1) skewX(0deg); filter: invert(0%); } 50% { transform: scale(1.1) skewX(10deg); filter: invert(100%); } 100% { transform: scale(0.9) skewX(-10deg); filter: invert(0%); } }

        input { font-size: 18px; width: 100%; padding: 10px; box-sizing: border-box; text-align: center; border-radius: 10px; border: 2px solid #00d2ff; background: #111; color: white; }
    </style>
</head>
<body>

    <div id="space"></div>

    <div id="p-moon" class="planet" style="top: 80vh;">🌙<span>달 (1M 층)</span></div>
    <div id="p-earth" class="planet" style="top: -100vh;">🌍<span>지구 (10M 층)</span></div>
    <div id="p-sun" class="planet" style="top: -300vh;">☀️<span>태양 (100M 층)</span></div>
    <div id="p-uranus" class="planet" style="top: -500vh;">🌀<span>천왕성 (1B 층)</span></div>
    <div id="p-saturn" class="planet" style="top: -800vh;">🪐<span>토성 (100B 층)</span></div>
    <div id="p-galaxy" class="planet" style="top: -1000vh;">🌌<span>블랙홀 (1T 층)</span></div>
    <div id="p-bigbang" class="planet" style="top: -1300vh; font-size: 120px;">🎆<span>빅뱅 (10T 층)</span></div>
    <div id="p-multiverse" class="planet" style="top: -1600vh; font-size: 140px;">💫<span>멀티버스 (100T 층)</span></div>
    <div id="p-infinity" class="planet" style="top: -1900vh; font-size: 160px;">♾️<span>차원의 끝 (999T 층)</span></div>
    <div id="p-beyond" class="planet" style="top: -2400vh; font-size: 200px;">🌟<span>빛의 세계 (10^999 층)</span></div>
    <div id="p-omni" class="planet" style="top: -3000vh; font-size: 250px;">💠<span>만물의 근원 (10^9억승)</span></div>
    <div id="p-absolute" class="planet" style="top: -3800vh; font-size: 300px;">👁️‍🗨️<span>절대 차원</span></div>
    <div id="p-omega" class="planet" style="top: -4800vh; font-size: 350px;">⚪<span>태초의 빛</span></div>
    <div id="p-true-omega" class="planet" style="top: -6000vh; font-size: 450px;">🌈<span>상상 초월의 우주</span></div>
    
    <div id="p-universe-break" class="planet" style="top: -8000vh; font-size: 600px;">💥<span>숫자의 끝<br>(상상력 폭발!)</span></div>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="display">1</div>
                <div id="passenger">🧙‍♀️</div>
            </div>
        </div>

        <div id="panel">
            <input type="text" id="target-input" value="1" placeholder="가고 싶은 층">
            <button onclick="goMagic()" style="background: #00ff00; color: black; font-size: 16px; padding: 10px;">💥 10000% 출력 우주 뚫기!</button>
            
            <div id="button-grid">
                <button class="universe-breaker-btn" onclick="clickBtn('UNIVERSE_BREAK', this)" style="grid-column: span 2; height: 120px;">
                    💥 숫자의 끝 (우주 폭발) 💥<br>10의 (19번 중첩) 10000승<br>⚠️ 엘리베이터 고장 주의 ⚠️
                </button>
                <button class="true-omega-btn" onclick="clickBtn('TRUE_OMEGA', this)" style="grid-column: span 2; height: 80px;">10의 (11번 중첩) 101승</button>
                <button class="omega-btn" onclick="clickBtn('OMEGA', this)" style="grid-column: span 2; height: 50px;">태초의 빛 (10번 중첩 100승)</button>
                <button class="absolute-btn" onclick="clickBtn('ABSOLUTE', this)" style="grid-column: span 2; height: 40px;">절대 차원</button>
                <button class="omni-btn" onclick="clickBtn('10^999999999', this)">10의 9억...승</button>
                <button class="beyond-btn" onclick="clickBtn('10^999', this)">10의 999승</button>
                <button class="ultimate-btn" onclick="clickBtn(999000000000000, this)">999T (999조)</button>
                <button class="hyper-btn" onclick="clickBtn(100000000000000, this)">100T (100조)</button>
                <button class="hyper-btn" onclick="clickBtn(1000000000000, this)">1T (1조)</button>
                <button class="mega-btn" onclick="clickBtn(100000000000, this)">100B (천억)</button>
                <button class="mega-btn" onclick="clickBtn(1000000000, this)">1B (십억)</button>
                <button class="mega-btn" onclick="clickBtn(100000000, this)">100M (일억)</button>
                <button class="special" onclick="clickBtn(10000000, this)">10M (천만)</button>
                <button class="active" onclick="clickBtn(1, this)">1</button>
            </div>
        </div>
    </div>

    <script>
        const MAGIC_INF = '10^999';
        const OMNI_INF = '10^999999999';
        const ABSOLUTE_INF = 'ABSOLUTE';
        const OMEGA_INF = 'OMEGA';
        const TRUE_OMEGA_INF = 'TRUE_OMEGA';
        const UNIVERSE_BREAK_INF = 'UNIVERSE_BREAK';

        const planets = [
            { id: 'p-moon', floor: 1000000 },
            { id: 'p-earth', floor: 10000000 },
            { id: 'p-sun', floor: 100000000 },
            { id: 'p-uranus', floor: 1000000000 },
            { id: 'p-saturn', floor: 100000000000 },
            { id: 'p-galaxy', floor: 1000000000000 },
            { id: 'p-bigbang', floor: 10000000000000 },
            { id: 'p-multiverse', floor: 100000000000000 },
            { id: 'p-infinity', floor: 999000000000000 },
            { id: 'p-beyond', floor: MAGIC_INF },
            { id: 'p-omni', floor: OMNI_INF },
            { id: 'p-absolute', floor: ABSOLUTE_INF },
            { id: 'p-omega', floor: OMEGA_INF },
            { id: 'p-true-omega', floor: TRUE_OMEGA_INF },
            { id: 'p-universe-break', floor: UNIVERSE_BREAK_INF }
        ];

        // 별 만들기
        const space = document.getElementById('space');
        for(let i=0; i<400; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            star.style.animationDelay = Math.random()*2+'s';
            space.appendChild(star);
        }

        // 엘레베이터 위치 시각화 비율 공식
        function getVisualPos(f) {
            if (f === UNIVERSE_BREAK_INF) return 98; // 숫자의 끝 꼭대기!
            if (f === TRUE_OMEGA_INF) return 93; 
            if (f === OMEGA_INF) return 88;
            if (f === ABSOLUTE_INF) return 83;
            if (f === OMNI_INF) return 78;
            if (f === MAGIC_INF) return 73;
            return Math.pow(f / 999000000000000, 0.06) * 60; 
        }

        function clickBtn(floor, btn) {
            if (floor === UNIVERSE_BREAK_INF) document.getElementById('target-input').value = "숫자의 끝 (폭발)";
            else if (floor === TRUE_OMEGA_INF) document.getElementById('target-input').value = "상상 초월의 우주";
            else if (floor === OMEGA_INF) document.getElementById('target-input').value = "태초의 빛";
            else if (floor === ABSOLUTE_INF) document.getElementById('target-input').value = "절대 차원";
            else document.getElementById('target-input').value = floor;
            moveElevator(floor, btn);
        }

        function goMagic() {
            const val = document.getElementById('target-input').value;
            if (val.includes('숫자') || val.includes('폭발') || val === 'UNIVERSE_BREAK') moveElevator(UNIVERSE_BREAK_INF);
            else if (val.includes('상상') || val === 'TRUE_OMEGA') moveElevator(TRUE_OMEGA_INF);
            else if (val.includes('태초') || val === 'OMEGA') moveElevator(OMEGA_INF);
            else if (val.includes('절대') || val === 'ABSOLUTE') moveElevator(ABSOLUTE_INF);
            else if (val === '10^999999999' || val === '10의999999999승') moveElevator(OMNI_INF);
            else if (val === '10^999' || val === '10의999승') moveElevator(MAGIC_INF);
            else moveElevator(parseInt(val.replace(/,/g, '')));
        }

        function moveElevator(floor, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";

            // 행성들 스크롤
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                const pPos = getVisualPos(p.floor);
                let offset = (pPos - elPos) * 9.0; 
                pEl.style.top = (40 - offset) + "vh"; 
            });

            // 화면 효과 초기화
            document.body.classList.remove('earthquake');
            document.body.classList.remove('universe-break');
            document.body.style.backgroundColor = "#000";

            // 특수 문자열 워프 (초공간 연출)
            if (floor === MAGIC_INF || floor === OMNI_INF || floor === ABSOLUTE_INF || floor === OMEGA_INF || floor === TRUE_OMEGA_INF || floor === UNIVERSE_BREAK_INF) {
                
                // 지진 효과
                if(floor === TRUE_OMEGA_INF) document.body.classList.add('earthquake');
                
                // 💥 우주 파괴 효과 (화면 반전 + 극강 흔들림)
                if(floor === UNIVERSE_BREAK_INF) document.body.classList.add('universe-break');

                let ticks = 0;
                const maxTicks = (floor === UNIVERSE_BREAK_INF) ? 120 : 90; // 가장 큰 숫자는 더 오래 워프!
                
                const timer = setInterval(() => {
                    ticks++;
                    if (ticks > maxTicks) { 
                        clearInterval(timer);
                        document.body.classList.remove('earthquake'); 
                        document.body.classList.remove('universe-break'); 
                        document.body.style.backgroundColor = (floor === TRUE_OMEGA_INF || floor === UNIVERSE_BREAK_INF) ? "#fff" : "#000"; 
                        displayFloor(floor);
                        arrive(floor);
                    } else {
                        const chars = "ERROR_UNIVERSE_DESTROYED_9999";
                        let chaos = "";
                        for(let i=0; i<10; i++) chaos += chars.charAt(Math.floor(Math.random() * chars.length));
                        document.getElementById('display').innerText = `[${chaos}]\n우주 폭발 중!!`;
                        
                        if(floor === OMEGA_INF || floor === TRUE_OMEGA_INF) {
                            document.body.style.backgroundColor = (ticks % 2 === 0) ? "#fff" : "#000";
                        }
                    }
                }, 50);
                return;
            }

            // 일반 숫자 카운팅 
            let currentText = document.getElementById('display').innerText.split('\n')[0].replace(/,/g,'');
            let cur = parseInt(currentText);
            if(isNaN(cur)) cur = 1;
            
            const timer = setInterval(() => {
                const diff = floor - cur;
                if(Math.abs(diff) < 1) {
                    clearInterval(timer);
                    displayFloor(floor);
                    arrive(floor);
                } else {
                    cur += diff / 8;
                    displayFloor(Math.round(cur));
                }
            }, 30);
        }

        function displayFloor(f) {
            const d = document.getElementById('display');
            if(f === UNIVERSE_BREAK_INF) d.innerText = "10^10... (19번) ^10000\n(숫자의 끝)";
            else if(f === TRUE_OMEGA_INF) d.innerText = "10^10... (11번) ^101\n(상상 초월)";
            else if(f === OMEGA_INF) d.innerText = "10^10^10.. (10번)\n(태초의 빛)";
            else if(f === ABSOLUTE_INF) d.innerText = "10^10^10^10^100\n(절대 차원)";
            else if(f === OMNI_INF) d.innerText = "10^999,999,999\n(만물의 근원)";
            else if(f === MAGIC_INF) d.innerText = "10^999\n(빛의 세계)";
            else if(f >= 999000000000000) d.innerText = "999,000,000,000,000\n(999T)";
            else if(f >= 100000000000000) d.innerText = f.toLocaleString() + "\n(100T)";
            else if(f >= 10000000000000) d.innerText = f.toLocaleString() + "\n(10T)";
            else if(f >= 1000000000000) d.innerText = f.toLocaleString() + "\n(1T)";
            else if(f >= 100000000000) d.innerText = f.toLocaleString() + "\n(100B)";
            else if(f >= 1000000000) d.innerText = f.toLocaleString() + "\n(1B)";
            else if(f >= 100000000) d.innerText = f.toLocaleString() + "\n(100M)";
            else if(f >= 10000000) d.innerText = f.toLocaleString() + "\n(10M)";
            else if(f >= 1000000) d.innerText = f.toLocaleString() + "\n(1M)";
            else d.innerText = f.toLocaleString();
        }

        function arrive(floor) {
            window.speechSynthesis.cancel();
            
            let floorText = floor;
            // 💥 우주 폭발 (19번 십의 + 만승 1번 + 승 18번)
            if (floor === UNIVERSE_BREAK_INF) floorText = "십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 만승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승!"; 
            else if (floor === TRUE_OMEGA_INF) floorText = "십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 백일승, 승, 승, 승, 승, 승, 승, 승, 승, 승, 승"; 
            else if (floor === OMEGA_INF) floorText = "십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의, 십의 백승, 승, 승, 승, 승, 승, 승, 승, 승, 승";
            else if (floor === ABSOLUTE_INF) floorText = "십의, 십의, 십의, 십의 백승, 승, 승, 승"; 
            else if (floor === OMNI_INF) floorText = "십의, 구억, 구천구백구십구만, 구천구백구십구 승";
            else if (floor === MAGIC_INF) floorText = "십의 구백구십구승";
            else if (floor === 999000000000000) floorText = "구백구십구조";
            else if (floor === 100000000000000) floorText = "백조";
            else if (floor === 10000000000000) floorText = "십조";
            else if (floor === 1000000000000) floorText = "일조";
            else if (floor === 100000000000) floorText = "천억";
            else if (floor === 1000000000) floorText = "십억";
            else if (floor === 100000000) floorText = "일억";
            else if (floor === 10000000) floorText = "천만";
            else if (floor === 1000000) floorText = "백만";

            const m = new SpeechSynthesisUtterance(`띵동, ${floorText} 층 입니다 아이미따미꼬 야옹야옹`);
            m.lang = 'ko-KR'; m.pitch = 1.8; m.rate = 1.0; 
            window.speechSynthesis.speak(m);

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                // 숫자의 끝에서는 아무 의미 없는 혼돈의 문자들이 쏟아집니다
                const friends = ["💥", "🔥", "⚡", "🌀", "🤯", "🚀", "🎊"];
                p.innerText = friends[Math.floor(Math.random()*friends.length)];
                p.classList.remove('exit');
                p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 600);
        }
    </script>
</body>
