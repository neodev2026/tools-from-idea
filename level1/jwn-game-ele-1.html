<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>꼬마 마녀의 100층 엘레베이터</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Malgun Gothic', sans-serif;
            color: white;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            gap: 40px;
            align-items: flex-end;
            height: 80vh;
        }

        /* 엘레베이터 통로 (100층의 높이감을 위해 길게 설정) */
        #shaft {
            width: 180px;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid #4a4e69;
            border-radius: 15px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* 엘레베이터 본체 */
        #elevator {
            width: 140px;
            height: 160px;
            background: #f1c40f;
            border: 4px solid #d4ac0d;
            border-radius: 10px;
            position: absolute;
            left: 16px;
            bottom: 10px;
            transition: bottom 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        /* 전광판 */
        #display {
            width: 90px;
            height: 35px;
            background: #222;
            color: #00ff00;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            font-family: 'monospace';
        }

        /* 꼬마 마녀 (이모지 활용으로 절대 깨지지 않음) */
        #witch-emoji {
            font-size: 70px;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.3));
            animation: floating 2s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 버튼 패널 (스크롤 가능하게 수정) */
        #button-panel {
            background: #2c3e50;
            padding: 20px;
            border-radius: 15px;
            height: 500px;
            overflow-y: auto; /* 100개 버튼을 위해 스크롤 추가 */
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            border: 5px solid #1a252f;
        }

        /* 버튼 스타일 */
        button {
            width: 65px;
            height: 65px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            background: #ecf0f1;
            color: #2c3e50;
            transition: 0.2s;
        }

        button:hover { background: #bdc3c7; }
        button.active {
            background: #e74c3c;
            color: white;
            transform: scale(1.05);
        }

        /* 특별한 100층 버튼 */
        .btn-100 {
            grid-column: span 2;
            background: linear-gradient(45deg, #f1c40f, #ff00ff);
            color: white;
            height: 80px;
            font-size: 30px;
        }

        h1 { color: #f1c40f; margin-bottom: 10px; }
        p { color: #bdc3c7; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>✨ 마녀의 100층 엘레베이터 ✨</h1>
    <p>가고 싶은 층 버튼을 눌러보세요!</p>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator" id="elevator-box">
                <div id="display">1</div>
                <div id="witch-emoji">🧙‍♀️</div>
            </div>
        </div>

        <div id="button-panel" id="panel">
            </div>
    </div>

    <script>
        const panel = document.getElementById('button-panel');
        const elevator = document.getElementById('elevator');
        const display = document.getElementById('display');

        // 1. 100층부터 1층까지 버튼 생성
        for (let i = 100; i >= 1; i--) {
            const btn = document.createElement('button');
            btn.innerText = i;
            if (i === 100) btn.className = 'btn-100';
            if (i === 1) btn.classList.add('active');
            
            btn.onclick = () => moveElevator(i, btn);
            panel.appendChild(btn);
        }

        function moveElevator(floor, clickedBtn) {
            // 모든 버튼 활성화 해제 후 클릭된 버튼 활성화
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            clickedBtn.classList.add('active');

            // 2. 엘레베이터 이동 위치 계산 
            // 100층은 맨 위(90%), 1층은 맨 아래(2%)
            const percent = 2 + (floor - 1) * 0.88; 
            elevator.style.bottom = percent + '%';

            // 3. 디스플레이 숫자 업데이트 효과
            let current = parseInt(display.innerText);
            const target = floor;
            const duration = 2500; // 이동 시간과 동일하게
            const stepTime = Math.abs(duration / (target - current || 1));
            
            const timer = setInterval(() => {
                if (current < target) {
                    current++;
                } else if (current > target) {
                    current--;
                } else {
                    clearInterval(timer);
                }
                display.innerText = current;
            }, Math.min(stepTime, 100)); // 너무 빠르면 0.1초 간격으로
        }
    </script>
</body>
</html>
