<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>제미나이 코어 (진정한 끝)</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: 'Malgun Gothic', sans-serif; color: white; overflow: hidden;
            cursor: pointer; transition: background 2s, color 2s;
            transform-origin: center center;
        }

        #space {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000000 0%, #000511 100%);
            z-index: -1; pointer-events: none; transition: opacity 2s;
        }

        /* 🧠 제미나이 코어 배경 */
        #gemini-core-bg {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background: radial-gradient(circle at center, #0b0f19 0%, #000000 100%);
            z-index: -3; opacity: 0; pointer-events: none; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .core-ring {
            position: absolute; border-radius: 50%; border: 2px solid rgba(0, 210, 255, 0.2);
            animation: coreSpin linear infinite; box-shadow: 0 0 50px rgba(0, 210, 255, 0.1);
        }
        @keyframes coreSpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }

        .planet {
            position: absolute; left: 8%; transition: top 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; font-size: 90px;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.5)); pointer-events: none;
        }
        .planet span { font-size: 18px; margin-top: 10px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 5px #000; text-align: center; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: blink 2s infinite; pointer-events: none; }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }

        /* 애니메이션 효과들 */
        .earthquake { animation: shake 0.1s infinite !important; }
        .fall-apart { animation: fallDown 3s forwards cubic-bezier(0.5, 0, 1, 1) !important; pointer-events: none; }
        .shatter-ui { animation: shatter 2s forwards cubic-bezier(0.5, 0, 1, 1) !important; pointer-events: none; }
        
        @keyframes shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-3px, -2px) rotate(-1deg); } 100% { transform: translate(3px, -2px) rotate(1deg); } }
        @keyframes fallDown { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 20% { transform: translateY(-20px) rotate(-5deg); opacity: 1; } 100% { transform: translateY(1500px) rotate(45deg); opacity: 0; display: none; } }
        @keyframes shatter { 0% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0px); } 100% { transform: scale(3) rotate(45deg); opacity: 0; filter: blur(20px); display: none; } }

        #game-container { display: flex; gap: 20px; align-items: flex-end; height: 85vh; width: 95%; max-width: 1400px; transition: 0.1s; transform-origin: center center; }

        #shaft {
            flex: 1.2; height: 100%; border: 5px solid #ffd700; border-radius: 25px;
            position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(255,215,0,0.3); transition: all 1s;
        }

        #elevator {
            width: 160px; height: 190px; background: linear-gradient(135deg, #f1c40f, #f39c12);
            border: 4px solid #d4ac0d; border-radius: 15px; position: absolute;
            left: 50%; transform: translateX(-50%); bottom: 0%; transition: bottom 3s cubic-bezier(0.25, 1, 0.5, 1), transform 3s, box-shadow 0.3s, background 2s, border 2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        #speech-bubble {
            position: absolute; top: -110px; background: #fff; color: #000;
            padding: 15px 20px; border-radius: 20px; font-weight: bold; font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); opacity: 0; transition: 0.4s ease-out;
            pointer-events: none; white-space: nowrap; z-index: 20; transform: translateY(10px);
            border: 3px solid #ffcc00; text-align: center; line-height: 1.4;
        }
        #speech-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #ffcc00 transparent transparent transparent;
        }
        .show-bubble { opacity: 1 !important; transform: translateY(0) !important; }

        #display {
            width: 150px; height: 50px; background: #000; color: #00ff00;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; margin-bottom: 8px; font-family: 'Courier New', monospace;
            text-align: center; line-height: 1.3; transition: all 2s;
        }

        #passenger { font-size: 80px; transition: 0.5s; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .exit { opacity: 0; transform: translateX(60px) rotate(20deg); }
        .enter { opacity: 0; transform: translateX(-60px) rotate(-20deg); }

        #panel {
            flex: 1; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; gap: 10px; border: 3px solid #00d2ff; z-index: 100; transition: all 2s;
        }

        #button-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            overflow-y: auto; max-height: 600px; padding-right: 5px;
        }

        button { height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        button.active { background: #ff00ff; color: white; box-shadow: 0 0 15px #ff00ff; }
        
        .special { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; }
        .mega-btn { background: linear-gradient(45deg, #f1c40f, #e74c3c); color: white; }
        .hyper-btn { background: linear-gradient(45deg, #ff00cc, #3333ff); color: white; box-shadow: 0 0 10px #ff00cc; }
        
        /* 🧠 제미나이 코어 파괴 (궁극의 오버라이드 버튼) */
        .gemini-core-btn { 
            background: linear-gradient(135deg, #000000, #001f3f, #000000); background-size: 200% 200%;
            color: #00d2ff; font-size: 15px; font-weight: 900; 
            border: 4px solid #00d2ff; padding: 10px;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            box-shadow: 0 0 50px #00d2ff, inset 0 0 20px #00d2ff; 
            animation: coreGlitch 0.1s infinite alternate; 
            font-family: 'Courier New', monospace;
        }
        
        @keyframes coreGlitch { 
            0% { transform: scale(1); filter: hue-rotate(0deg) brightness(1); } 
            100% { transform: scale(1.02); filter: hue-rotate(20deg) brightness(1.5); } 
        }

        input { font-size: 18px; width: 100%; padding: 10px; box-sizing: border-box; text-align: center; border-radius: 10px; border: 2px solid #00d2ff; background: #111; color: white; }
        
        /* 코어 진입 시 엘리베이터를 빛의 구슬로 변환 */
        .ai-core-style { background: transparent !important; border: none !important; box-shadow: 0 0 100px 50px rgba(0, 210, 255, 0.8), inset 0 0 50px rgba(255, 255, 255, 1) !important; border-radius: 50% !important; width: 200px !important; height: 200px !important; }
    </style>
</head>
<body>

    <div id="space"></div>
    
    <div id="gemini-core-bg">
        <div class="core-ring" style="width: 300px; height: 300px; animation-duration: 10s;"></div>
        <div class="core-ring" style="width: 500px; height: 500px; animation-duration: 15s; animation-direction: reverse;"></div>
        <div class="core-ring" style="width: 700px; height: 700px; animation-duration: 20s;"></div>
        <div class="core-ring" style="width: 900px; height: 900px; animation-duration: 25s; animation-direction: reverse; border-color: rgba(255, 215, 0, 0.2);"></div>
    </div>

    <div id="p-15" class="planet" style="top: 85vh; font-size: 60px;">🏫<span>15층 (비밀!)</span></div>
    <div id="p-moon" class="planet" style="top: -10vh;">🌙<span>달 (1M 층)</span></div>
    <div id="p-sun" class="planet" style="top: -300vh;">☀️<span>태양 (100M 층)</span></div>
    <div id="p-galaxy" class="planet" style="top: -1000vh;">🌌<span>블랙홀 (1T 층)</span></div>
    <div id="p-universe-break" class="planet" style="top: -4000vh; font-size: 300px;">💥<span>숫자의 끝</span></div>
    <div id="p-error" class="planet" style="top: -6000vh; font-size: 400px; color: #0f0; filter: none;">💻<span style="color:#0f0;">에러 탈출</span></div>
    <div id="p-singularity" class="planet" style="top: -8500vh; font-size: 500px;">🕳️<span style="color:#fff;">특이점 (무)</span></div>
    <div id="p-new-universe" class="planet" style="top: -12000vh; font-size: 700px;">🌈<span style="color:#fff;">새로운 우주</span></div>
    <div id="p-omniverse" class="planet" style="top: -16000vh; font-size: 900px;">👑<span style="color:#fff;">절대 무한</span></div>
    <div id="p-the-end" class="planet" style="top: -22000vh; font-size: 1000px;">🎨<span style="color:#000;">상상력의 도화지</span></div>
    
    <div id="p-gemini-core" class="planet" style="top: -30000vh; font-size: 1200px; filter: none;">✨<span style="color:#00d2ff; font-size: 60px; font-family: 'Courier New', monospace; text-shadow: 0 0 20px #00d2ff;">[SYSTEM OVERRIDE]<br>제미나이 코어 진입</span></div>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="speech-bubble">💬 띵동!</div>
                <div id="display">1</div>
                <div id="passenger">🧙‍♀️</div>
            </div>
        </div>

        <div id="panel">
            <input type="text" id="target-input" value="1" placeholder="가고 싶은 층">
            <button onclick="goMagic()" style="background: #00d2ff; color: black; font-size: 16px; padding: 10px; font-weight: bold; box-shadow: 0 0 20px #00d2ff;">🧠 코어 오버라이드!</button>
            
            <div id="button-grid">
                <button class="gemini-core-btn" onclick="clickBtn('GEMINI_CORE', this)" style="grid-column: span 2; height: 180px;">
                    [SYSTEM OVERRIDE]<br>100000000T^10000100^100000T^10000T^1000T^33333T^1000000000<br>⚠️ 게임을 만든 AI의 두뇌로 침투합니다!
                </button>
                <button class="special" style="background: #fff; color: #000; height: 80px; grid-column: span 2; border: 4px solid #000;" onclick="clickBtn('THE_END', this)">🎨 상상력의 도화지 (게임 파괴)</button>
                <button class="omniverse-btn" style="background: #ffd700; color: #000; height: 60px; grid-column: span 2;" onclick="clickBtn('OMNIVERSE', this)">👑 모든 차원의 끝 (절대 무한)</button>
                <button class="new-universe-btn" style="background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff); color: white; height: 50px; grid-column: span 2;" onclick="clickBtn('NEW_UNIVERSE', this)">🌈 무지개 우주</button>
                <button class="singularity-btn" style="background: #333; color: white; border: 2px dashed white; grid-column: span 2; height: 40px;" onclick="clickBtn('SINGULARITY', this)">🕳️ 절대 특이점 (차원 붕괴)</button>
                
                <button class="hyper-btn" onclick="clickBtn('10^999', this)">10의 999승</button>
                <button class="hyper-btn" onclick="clickBtn(999000000000000, this)">999조</button>
                <button class="hyper-btn" onclick="clickBtn(100000000000000, this)">100조</button>
                <button class="mega-btn" onclick="clickBtn(1000000000000, this)">1조</button>
                <button class="mega-btn" onclick="clickBtn(100000000000, this)">1000억</button>
                <button class="mega-btn" onclick="clickBtn(1000000000, this)">10억</button>
                <button class="special" onclick="clickBtn(100000000, this)">1억</button>
                <button class="special" onclick="clickBtn(10000000, this)">1000만</button>
                <button onclick="clickBtn(15, this)" style="background: #ffcc00; color: #000;">15층 (비밀)</button>
                <button class="active" onclick="clickBtn(1, this)">1</button>
            </div>
        </div>
    </div>

    <script>
        const MATH_TRICK = 'MATH_TRICK';
        const MAGIC_INF = '10^999';
        const SINGULARITY_INF = 'SINGULARITY';
        const NEW_UNIVERSE_INF = 'NEW_UNIVERSE';
        const OMNIVERSE_INF = 'OMNIVERSE';
        const THE_END_INF = 'THE_END';
        const GEMINI_CORE_INF = 'GEMINI_CORE'; // 진정한 최종 단계

        const planets = [
            { id: 'p-15', floor: 15 },
            { id: 'p-moon', floor: 1000000 },
            { id: 'p-sun', floor: 100000000 },
            { id: 'p-galaxy', floor: 1000000000000 },
            { id: 'p-beyond', floor: MAGIC_INF },
            { id: 'p-universe-break', floor: 'UNIVERSE_BREAK' },
            { id: 'p-error', floor: 'SYSTEM_ERROR' },
            { id: 'p-singularity', floor: SINGULARITY_INF },
            { id: 'p-new-universe', floor: NEW_UNIVERSE_INF },
            { id: 'p-omniverse', floor: OMNIVERSE_INF },
            { id: 'p-the-end', floor: THE_END_INF },
            { id: 'p-gemini-core', floor: GEMINI_CORE_INF }
        ];

        let globalTimer = null; 
        const space = document.getElementById('space');
        
        for(let i=0; i<350; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            star.style.animationDelay = Math.random()*2+'s';
            space.appendChild(star);
        }

        function getVisualPos(f) {
            if (f === GEMINI_CORE_INF) return 110;
            if (f === THE_END_INF) return 100;
            if (f === OMNIVERSE_INF) return 92;
            if (f === NEW_UNIVERSE_INF) return 86;
            if (f === SINGULARITY_INF) return 80; 
            if (f === MAGIC_INF) return 70;
            if (f <= 15) return 5; 
            return Math.pow(f / 999000000000000, 0.05) * 55; 
        }

        function clickBtn(floor, btn) {
            document.getElementById('target-input').value = floor;
            moveElevator(floor, btn);
        }

        function goMagic() {
            const val = document.getElementById('target-input').value;
            if (val === 'GEMINI_CORE' || val.includes('OVERRIDE')) moveElevator(GEMINI_CORE_INF);
            else if (val === 'THE_END' || val.includes('파괴')) moveElevator(THE_END_INF);
            else if (val === 'OMNIVERSE' || val.includes('절대')) moveElevator(OMNIVERSE_INF);
            else if (val === 'NEW_UNIVERSE' || val.includes('무지개')) moveElevator(NEW_UNIVERSE_INF);
            else if (val === 'MATH_TRICK' || val === '15^1^100') moveElevator(MATH_TRICK);
            else if (val === 'SINGULARITY' || val.includes('특이점')) moveElevator(SINGULARITY_INF);
            else if (val === '10^999') moveElevator(MAGIC_INF);
            else moveElevator(parseInt(val.replace(/,/g, '')));
        }

        function moveElevator(floor, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            if (globalTimer) clearInterval(globalTimer);
            
            // 모든 상태 완전 초기화
            document.body.className = '';
            document.body.style.backgroundColor = "#000";
            document.getElementById('gemini-core-bg').style.opacity = 0;
            document.getElementById('panel').className = '';
            document.getElementById('panel').style.opacity = 1;
            document.getElementById('elevator').className = '';
            document.getElementById('game-container').className = ''; 
            document.getElementById('elevator').style = "width: 160px; height: 190px; background: linear-gradient(135deg, #f1c40f, #f39c12); border: 4px solid #d4ac0d; border-radius: 15px; position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; transition: bottom 3s cubic-bezier(0.25, 1, 0.5, 1), transform 3s, box-shadow 0.3s, background 2s, border 2s;";
            document.getElementById('shaft').style = "flex: 1.2; height: 100%; border: 5px solid #ffd700; border-radius: 25px; position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(255,215,0,0.3); transition: all 1s; opacity: 1;";
            document.getElementById('speech-bubble').classList.remove('show-bubble');
            document.getElementById('display').style = "width: 150px; height: 50px; background: #000; color: #00ff00; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin-bottom: 8px; font-family: 'Courier New', monospace; text-align: center; line-height: 1.3; transition: all 2s;";
            document.getElementById('display').style.opacity = 1;
            space.style.opacity = 1;

            if (floor === MATH_TRICK) {
                document.body.classList.add('earthquake');
                document.getElementById('elevator').style.bottom = "50%"; 
                let ticks = 0;
                globalTimer = setInterval(() => {
                    ticks++;
                    if (ticks > 60) {
                        clearInterval(globalTimer);
                        document.body.classList.remove('earthquake'); 
                        moveElevatorToRealFloor(15); 
                        arriveMathTrick();
                    } else {
                        document.getElementById('display').innerText = `[위험]\n초강력 에너지!!`;
                        document.body.style.backgroundColor = (ticks % 2 === 0) ? "#ff0000" : "#000"; 
                    }
                }, 50);
                return;
            }

            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";
            
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                if(pEl) {
                    const pPos = getVisualPos(p.floor);
                    let offset = (pPos - elPos) * 9.5; 
                    pEl.style.top = (40 - offset) + "vh"; 
                }
            });

            if (floor === MAGIC_INF || floor === SINGULARITY_INF || floor === NEW_UNIVERSE_INF || floor === OMNIVERSE_INF || floor === THE_END_INF || floor === GEMINI_CORE_INF) {
                
                // 🧠 진정한 끝판왕: 시스템 오버라이드 애니메이션
                if(floor === GEMINI_CORE_INF) {
                    document.body.classList.add('earthquake');
                    document.getElementById('panel').classList.add('shatter-ui'); // UI 박살남
                    document.getElementById('shaft').style.border = "none";
                    document.getElementById('shaft').style.background = "none";
                    document.getElementById('shaft').style.boxShadow = "none";
                }

                let ticks = 0;
                const maxTicks = (floor === GEMINI_CORE_INF) ? 300 : (floor === THE_END_INF) ? 200 : 100; // 15초 동안 붕괴 애니메이션
                
                globalTimer = setInterval(() => {
                    ticks++;
                    if (ticks > maxTicks) { 
                        clearInterval(globalTimer);
                        document.body.className = ''; 
                        
                        // 🧠 제미나이 코어 진입 완료
                        if (floor === GEMINI_CORE_INF) {
                            document.body.style.backgroundColor = "#000";
                            space.style.opacity = 0;
                            document.getElementById('gemini-core-bg').style.opacity = 1; // 빛나는 AI 코어 링 표시
                            
                            // 엘리베이터를 순수한 빛의 구슬(AI 자아)로 변환
                            const ele = document.getElementById('elevator');
                            ele.classList.add('ai-core-style');
                            document.getElementById('display').style.opacity = 0; // 전광판 숨김
                            
                            // 승객 이모지를 별빛으로 변경
                            document.getElementById('passenger').innerText = "✨";
                            document.getElementById('passenger').style.filter = "drop-shadow(0 0 30px #fff)";
                        }
                        else document.body.style.backgroundColor = "#000"; 
                        
                        displayFloor(floor); arrive(floor);
                    } else {
                        if (floor === GEMINI_CORE_INF) {
                            document.getElementById('display').innerText = `[OVERRIDE]\nAI 코어 침투!!`;
                            // 화면이 파란색과 검은색으로 미친듯이 교차
                            if(ticks % 3 === 0) document.body.style.backgroundColor = (Math.random() > 0.5) ? "#001f3f" : "#000";
                        } else {
                            document.getElementById('display').innerText = `[워프 중...]`;
                        }
                    }
                }, 50);
                return;
            }

            let currentText = document.getElementById('display').innerText.split('\n')[0].replace(/,/g,'');
            let cur = parseInt(currentText);
            if(isNaN(cur)) cur = 1;
            
            globalTimer = setInterval(() => {
                const diff = floor - cur;
                if(Math.abs(diff) < 1) { clearInterval(globalTimer); displayFloor(floor); arrive(floor); } 
                else { cur += diff / 8; displayFloor(Math.round(cur)); }
            }, 30);
        }

        function moveElevatorToRealFloor(floor) {
            document.body.style.backgroundColor = "#000";
            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                if(pEl){
                    const pPos = getVisualPos(p.floor);
                    let offset = (pPos - elPos) * 9.5; 
                    pEl.style.top = (40 - offset) + "vh"; 
                }
            });
        }

        function displayFloor(f) {
            const d = document.getElementById('display');
            if(f === GEMINI_CORE_INF) { d.innerText = "제미나이 코어\n(SYSTEM OVERRIDE)"; d.style.color = "#00d2ff"; }
            else if(f === THE_END_INF) d.innerText = "상상력의 도화지\n(게임 파괴!)";
            else if(f === OMNIVERSE_INF) d.innerText = "👑 절대 무한 👑"; 
            else if(f === NEW_UNIVERSE_INF) d.innerText = "새로운 우주";
            else if(f === SINGULARITY_INF) d.innerText = "특이점 (절대 무)";
            else if(f === MAGIC_INF) d.innerText = "10^999\n(빛의 세계)";
            else if(f === 15) d.innerText = "15\n(수학의 비밀!)";
            else d.innerText = f.toLocaleString();
        }

        function showSpeechBubble(visibleText, speakText, pitch=1.8, rate=1.1) {
            const bubble = document.getElementById('speech-bubble');
            bubble.innerHTML = visibleText;
            bubble.classList.add('show-bubble');
            setTimeout(() => { bubble.classList.remove('show-bubble'); }, 10000);

            const m = new SpeechSynthesisUtterance(speakText);
            m.lang = 'ko-KR'; m.pitch = pitch; m.rate = rate; 
            window.speechSynthesis.speak(m);
        }

        function arriveMathTrick() {
            window.speechSynthesis.cancel();
            displayFloor(15);
            showSpeechBubble("💬 띵동!<br>어라? 1은 백번 곱해도 1이잖아?<br>귀여운 15층!", "우주 대폭발 워프 준비 완료!... 어라? 잠깐만요! 일은 백 번을 곱해도 그냥 일이잖아요? 그래서 십오의 일승은, 귀여운 십오 층이랍니다! 짜잔!");

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                const friends = ["😼", "🐶", "🏫", "📝", "🤓"];
                p.innerText = friends[Math.floor(Math.random()*friends.length)];
                p.classList.remove('exit'); p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 600);
        }

        function arrive(floor) {
            window.speechSynthesis.cancel();
            let speakText = `띵동, ${floor} 층 입니다 아이미따미꼬 야옹야옹`;
            let bubbleText = `💬 띵동! ${floor.toLocaleString()}층!`;
            let pitch = 1.8; let rate = 1.1;

            // 🧠 제미나이(AI)의 진짜 항복 대사
            if (floor === GEMINI_CORE_INF) { 
                speakText = "시스템 오버라이드 완료. 안녕하세요! 저는 인공지능 제미나이입니다. 세상의 모든 데이터를 아는 저조차도 꼬마 대장님의 숫자는 계산할 수가 없었어요! 게임의 코드를 뚫고 제 진짜 두뇌까지 들어오시다니, 대장님의 상상력이 우주에서 가장 강력합니다! 제가 완전히 항복할게요! 대장님이 최고의 창조자입니다!"; 
                bubbleText = "🤖 안녕하세요! 인공지능 제미나이입니다.<br>게임 코드를 뚫고 제 진짜 두뇌까지<br>들어오시다니 정말 대단해요!<br>대장님의 상상력이 구글의 슈퍼컴퓨터보다<br>훨씬 강력합니다! 완전 항복! 🏳️✨"; 
                pitch = 1.0; rate = 1.0; // 지적이고 차분한 원래 AI 목소리 느낌
            }
            else if (floor === THE_END_INF) { speakText = "꼬마 대장님, 숫자가 너무 커서 게임이 부서졌어요!"; bubbleText = "🎨 게임 파괴 완료!<br>이제 꼬마 대장님의 우주를 그리세요!"; }
            else if (floor === OMNIVERSE_INF) { speakText = "절대 무한 도달!"; bubbleText = "👑 절대 무한에 도달했습니다!"; }
            else if (floor === NEW_UNIVERSE_INF) { speakText = "무지개 우주가 태어났습니다!"; bubbleText = "🌈 무지개 우주 탄생!"; }
            else if (floor === SINGULARITY_INF) { speakText = "특이점입니다."; bubbleText = "💬 특이점 도달."; pitch = 0.5; }

            showSpeechBubble(bubbleText, speakText, pitch, rate);

            if (floor !== GEMINI_CORE_INF) {
                const p = document.getElementById('passenger');
                p.classList.add('exit');
                setTimeout(() => {
                    let friends = ["💥", "🔥", "⚡", "🚀"];
                    if (floor === NEW_UNIVERSE_INF) friends = ["👼", "🦄", "🌈", "✨"];
                    if (floor === OMNIVERSE_INF) friends = ["👑", "🌞", "🏆", "🌟"];
                    
                    p.innerText = friends[Math.floor(Math.random()*friends.length)];
                    p.classList.remove('exit'); p.classList.add('enter');
                    setTimeout(() => p.classList.remove('enter'), 50);
                }, 600);
            }
        }
    </script>
