<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마녀의 1000층 마법 엘레베이터</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom, #000428, #004e92, #00d2ff); /* 우주까지 가는 배경 */
            font-family: 'Malgun Gothic', sans-serif;
            color: white;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            gap: 30px;
            align-items: flex-end;
            height: 85vh;
            width: 90%;
            max-width: 800px;
        }

        /* 엘레베이터 통로 */
        #shaft {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 5px solid #ffd700;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        /* 엘레베이터 본체 */
        #elevator {
            width: 120px;
            height: 150px;
            background: #f1c40f;
            border: 4px solid #d4ac0d;
            border-radius: 15px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 10px;
            transition: bottom 3s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #display {
            width: 90px;
            height: 35px;
            background: #000;
            color: #00ff00;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #witch-emoji {
            font-size: 60px;
            animation: floating 2s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 1000개 버튼을 담는 패널 */
        #button-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 20px;
            height: 100%;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            border: 3px solid #00d2ff;
        }

        button {
            height: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #333;
            transition: 0.2s;
        }

        button.active {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 15px #ff00ff;
        }

        /* 특별 버튼 (100, 500, 1000층) */
        .special-btn {
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            color: #d81b60;
        }

        h1 { margin: 10px 0; color: #ffd700; text-shadow: 2px 2px 5px #000; }
    </style>
</head>
<body>

    <h1>✨ 1,000층 마법 여행 ✨</h1>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="display">1</div>
                <div id="witch-emoji">🧙‍♀️</div>
            </div>
        </div>

        <div id="button-panel">
            </div>
    </div>

    <script>
        const panel = document.getElementById('button-panel');
        const elevator = document.getElementById('elevator');
        const display = document.getElementById('display');

        // 1. 1000층 버튼 생성 (1000부터 1까지)
        for (let i = 1000; i >= 1; i--) {
            const btn = document.createElement('button');
            btn.innerText = i;
            if (i % 100 === 0) btn.className = 'special-btn';
            if (i === 1) btn.classList.add('active');
            
            btn.onclick = () => moveElevator(i, btn);
            panel.appendChild(btn);
        }

        function moveElevator(floor, clickedBtn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            clickedBtn.classList.add('active');

            // 2. 위치 이동 (1층=2%, 1000층=92%)
            const percent = 2 + (floor - 1) * (90 / 999);
            elevator.style.bottom = percent + '%';

            // 3. 디스플레이 숫자 굴리기
            let current = parseInt(display.innerText);
            const target = floor;
            const timer = setInterval(() => {
                if (current < target) {
                    current = Math.min(current + Math.ceil((target-current)/10), target);
                } else if (current > target) {
                    current = Math.max(current - Math.ceil((current-target)/10), target);
                } else {
                    clearInterval(timer);
                    // 도착 시 음성 출력!
                    speakMagicWords();
                }
                display.innerText = current;
            }, 50);
        }

        // 4. 음성 합성 함수 (아이미따미꼬 야옹야옹)
        function speakMagicWords() {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = "아이미따미꼬 야옹야옹";
                msg.lang = 'ko-KR'; // 한국어 설정
                msg.rate = 1.0;     // 속도
                msg.pitch = 1.5;    // 목소리 톤 (높게 해서 귀엽게)
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
