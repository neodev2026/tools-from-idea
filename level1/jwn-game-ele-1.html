<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>말랑말랑 엘레베이터 게임</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #building {
            width: 300px;
            height: 400px;
            border: 10px solid #555;
            border-radius: 20px;
            background-color: white;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
        }

        /* 엘레베이터 본체 */
        #elevator {
            width: 100px;
            height: 120px;
            background-color: #ffcc00;
            border: 5px solid #ff9900;
            border-radius: 10px;
            position: absolute;
            bottom: 20px;
            transition: bottom 1.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 버튼 컨테이너 */
        #controls {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        /* 큰 버튼 스타일 */
        button {
            width: 80px;
            height: 80px;
            font-size: 30px;
            cursor: pointer;
            border: none;
            border-radius: 50%;
            background-color: #4CAF50;
            color: white;
            box-shadow: 0 6px #2e7d32;
            transition: all 0.1s;
        }

        button:active {
            box-shadow: 0 2px #2e7d32;
            transform: translateY(4px);
        }

        button:nth-child(2) { background-color: #2196F3; box-shadow: 0 6px #1565c0; }
        button:nth-child(3) { background-color: #f44336; box-shadow: 0 6px #c62828; }

        #floor-text {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="floor-text">지금은 <span id="current-floor">1</span>층이에요!</div>

    <div id="building">
        <div id="elevator">1</div>
    </div>

    <div id="controls">
        <button onclick="moveElevator(1, 20)">1</button>
        <button onclick="moveElevator(2, 140)">2</button>
        <button onclick="moveElevator(3, 260)">3</button>
    </div>

    <script>
        function moveElevator(floor, position) {
            const elevator = document.getElementById('elevator');
            const floorText = document.getElementById('current-floor');
            
            // 엘레베이터 이동
            elevator.style.bottom = position + 'px';
            
            // 숫자 변경
            elevator.innerText = floor;
            floorText.innerText = floor;

            // 도착 알림 효과음 (선택사항: 실제 소리 파일을 넣으면 더 좋아요)
            console.log(floor + "층에 도착했습니다!");
        }
    </script>
</body>
</html>
