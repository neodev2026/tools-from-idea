<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새로운 차원의 우주 엘리베이터</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: 'Malgun Gothic', sans-serif; color: white; overflow: hidden;
            cursor: pointer; transition: background 1s, filter 1s;
        }

        #space {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000000 0%, #000511 100%);
            z-index: -1; pointer-events: none; transition: opacity 2s;
        }

        .planet {
            position: absolute; left: 8%; transition: top 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; font-size: 90px;
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.3)); pointer-events: none;
        }
        .planet span { font-size: 18px; margin-top: 10px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 5px #000; text-align: center; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: blink 2s infinite; pointer-events: none; }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }

        /* 🚨 비상 사이렌 애니메이션 */
        .siren-bg { animation: sirenFlash 0.5s infinite !important; }
        @keyframes sirenFlash { 0% { background: #ff0000; } 50% { background: #000000; } 100% { background: #ff0000; } }

        /* 💥 우주 폭발 애니메이션 (1T↑10T↑) */
        .universe-break { animation: crazyShake 0.05s infinite, colorBurst 0.2s infinite !important; }
        @keyframes crazyShake { 0% { transform: translate(5px, 5px) rotate(2deg) scale(1.02); } 50% { transform: translate(-5px, -5px) rotate(-2deg) scale(0.98); } 100% { transform: translate(5px, 5px) rotate(1deg) scale(1.02); } }
        @keyframes colorBurst { 0% { filter: invert(0%) hue-rotate(0deg); } 50% { filter: invert(100%) hue-rotate(180deg); } 100% { filter: invert(0%) hue-rotate(360deg); } }

        #game-container { display: flex; gap: 20px; align-items: flex-end; height: 85vh; width: 95%; max-width: 1200px; transition: 0.1s; }

        #shaft {
            flex: 1.2; height: 100%; border: 5px solid #00d2ff; border-radius: 25px;
            position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(0,210,255,0.3); transition: all 0.5s;
        }
        .siren-shaft { border-color: #ff0000 !important; box-shadow: inset 0 0 100px rgba(255,0,0,0.8) !important; }

        #elevator {
            width: 160px; height: 190px; background: linear-gradient(135deg, #e0f7fa, #80deea);
            border: 4px solid #00acc1; border-radius: 15px; position: absolute;
            left: 50%; transform: translateX(-50%); bottom: 0%; transition: bottom 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        #speech-bubble {
            position: absolute; top: -75px; background: #fff; color: #000;
            padding: 10px 15px; border-radius: 20px; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); opacity: 0; transition: 0.4s ease-out;
            pointer-events: none; white-space: nowrap; z-index: 20; transform: translateY(10px);
            border: 3px solid #00d2ff; text-align: center; line-height: 1.4;
        }
        #speech-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #00d2ff transparent transparent transparent;
        }
        .show-bubble { opacity: 1 !important; transform: translateY(0) !important; }

        #display {
            width: 150px; height: 50px; background: #000; color: #00ff00;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; margin-bottom: 8px; font-family: 'Courier New', monospace;
            text-align: center; line-height: 1.3; transition: background 0.3s, color 0.3s;
        }
        .siren-display { background: #ff0000 !important; color: #fff !important; animation: blink 0.5s infinite; }

        #passenger { font-size: 80px; transition: 0.5s; }
        .exit { opacity: 0; transform: translateX(60px) rotate(20deg); }
        .enter { opacity: 0; transform: translateX(-60px) rotate(-20deg); }

        #panel {
            flex: 1; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; gap: 10px; border: 3px solid #00d2ff; z-index: 100;
        }

        #button-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
            overflow-y: auto; max-height: 600px; padding-right: 5px;
        }

        button { height: 60px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:hover { transform: scale(1.05); }
        button.active { filter: brightness(1.3); border: 2px solid #fff; }
        
        /* 🚨 비상 버튼 */
        .btn-emergency { background: linear-gradient(45deg, #ff0000, #cc0000); color: white; border: 4px solid #fff; font-size: 18px; box-shadow: 0 0 20px #ff0000; animation: dangerPulse 1s infinite alternate; }
        @keyframes dangerPulse { 0% { box-shadow: 0 0 10px #ff0000; } 100% { box-shadow: 0 0 40px #ff0000; } }

        /* 다른 버튼들 */
        .btn-hyper { background: linear-gradient(135deg, #ff00ff, #00ffff); color: #fff; text-shadow: 0 0 5px #000; box-shadow: 0 0 15px #ff00ff; }
        .btn-trick { background: #ffcc00; color: #000; border: 3px dashed #ff5500; }
        .btn-999t { background: radial-gradient(circle, #ffd700, #ff8c00); color: #000; }
        .btn-1t { background: #333; color: #00d2ff; border: 2px solid #00d2ff; }
        .btn-99 { background: #87CEEB; color: #000; }
        .btn-1 { background: #ffffff; color: #000; border: 3px solid #999; }

        input { font-size: 18px; width: 100%; padding: 10px; box-sizing: border-box; text-align: center; border-radius: 10px; border: 2px solid #00d2ff; background: #111; color: white; }
    </style>
</head>
<body>

    <div id="space"></div>

    <div id="p-1" class="planet" style="top: 85vh; font-size: 100px;">🏢<span style="color:#fff; background:#00d2ff;">1층 로비</span></div>
    <div id="p-99" class="planet" style="top: -100vh; font-size: 130px; filter: drop-shadow(0 0 20px #fff);">☁️<span style="color:#000; background:#fff;">99층 구름나라</span></div>
    <div id="p-1t" class="planet" style="top: -400vh; font-size: 160px; filter: drop-shadow(0 0 50px #ff00ff);">🌌<span>1T층 (1조) 은하수</span></div>
    <div id="p-999t" class="planet" style="top: -800vh; font-size: 200px; filter: drop-shadow(0 0 80px #ffd700);">🌈<span style="color:#000; background:#ffd700;">999T층 무지개 우주</span></div>
    <div id="p-hyper" class="planet" style="top: -1500vh; font-size: 300px; filter: drop-shadow(0 0 150px #ff0000);">💥<span style="color:#fff; background:#ff0000;">1Tㅁ10T 차원 폭발</span></div>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="speech-bubble">💬 띵동!</div>
                <div id="display">1 층</div>
                <div id="passenger">👦</div>
            </div>
        </div>

        <div id="panel">
            <input type="text" id="target-input" value="1" placeholder="가고 싶은 층">
            
            <div id="button-grid">
                <button class="btn-emergency" onclick="clickEmergency(this)" style="grid-column: span 2; height: 90px;">
                    🚨 비상버튼 🚨<br>(소방관 아저씨 출동!)
                </button>
                
                <button class="btn-hyper" onclick="clickBtn('1T↑10T↑', this)" style="grid-column: span 2; height: 80px;">💥 1T↑10T↑ (1조의 10조승) - 우주 폭발!</button>
                <button class="btn-trick" onclick="clickBtn('1^1', this)" style="grid-column: span 2; height: 60px;">🤔 1^1 (1의 1승) - 수학의 비밀</button>
                <button class="btn-999t" onclick="clickBtn('999T', this)" style="grid-column: span 2;">🌈 999T (999조)</button>
                <button class="btn-1t" onclick="clickBtn('1T', this)" style="grid-column: span 2;">🌌 1T (1조)</button>
                <button class="btn-99" onclick="clickBtn(99, this)" style="grid-column: span 2;">☁️ 99층</button>
                <button class="btn-1 active" onclick="clickBtn(1, this)" style="grid-column: span 2;">🏢 1층</button>
            </div>
        </div>
    </div>

    <script>
        const FLOOR_1 = 1;
        const FLOOR_99 = 99;
        const FLOOR_1T = 1000000000000;
        const FLOOR_999T = 999000000000000;
        const MATH_TRICK = '1^1';
        const HYPER_MATH = '1T↑10T↑';

        const planets = [
            { id: 'p-1', floor: FLOOR_1 },
            { id: 'p-99', floor: FLOOR_99 },
            { id: 'p-1t', floor: FLOOR_1T },
            { id: 'p-999t', floor: FLOOR_999T },
            { id: 'p-hyper', floor: HYPER_MATH }
        ];

        let globalTimer = null; 
        let isEmergency = false; // 비상사태 상태
        const space = document.getElementById('space');
        
        for(let i=0; i<300; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            star.style.animationDelay = Math.random()*2+'s';
            space.appendChild(star);
        }

        // 시각적 높이 계산
        function getVisualPos(f) {
            if (f === HYPER_MATH) return 95;
            if (f === FLOOR_999T) return 75;
            if (f === FLOOR_1T) return 55;
            if (f === FLOOR_99) return 30;
            if (f <= FLOOR_1) return 5; 
            return 5; 
        }

        // 🚨 비상 버튼 전용 함수
        function clickEmergency(btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('target-input').value = "비상사태!";
            
            if (globalTimer) clearInterval(globalTimer);
            isEmergency = true;

            // 사이렌 연출 시작
            document.body.classList.add('siren-bg');
            document.getElementById('shaft').classList.add('siren-shaft');
            document.getElementById('display').classList.add('siren-display');
            document.getElementById('display').innerText = "🚨 비상! 🚨";
            document.getElementById('speech-bubble').classList.remove('show-bubble');
            
            window.speechSynthesis.cancel();
            let sirenAudio = new SpeechSynthesisUtterance("애앵! 애앵! 비상사태 발생! 소방관 아저씨가 출동합니다! 위용 위용!");
            sirenAudio.lang = 'ko-KR'; sirenAudio.pitch = 2.0; sirenAudio.rate = 1.2;
            window.speechSynthesis.speak(sirenAudio);

            // 3초 뒤에 소방관 아저씨 등장
            setTimeout(() => {
                if(!isEmergency) return; // 중간에 다른버튼 누르면 취소
                document.body.classList.remove('siren-bg');
                document.getElementById('shaft').classList.remove('siren-shaft');
                document.getElementById('display').classList.remove('siren-display');
                document.getElementById('display').innerText = "소방관 출동!";

                const p = document.getElementById('passenger');
                p.classList.add('exit');
                setTimeout(() => {
                    p.innerText = "👨‍🚒"; // 소방관 아저씨 등장!
                    p.classList.remove('exit'); p.classList.add('enter');
                    setTimeout(() => p.classList.remove('enter'), 50);
                    
                    let rescueAudio = new SpeechSynthesisUtterance("불 끄러 왔습니다! 모두 안전합니다! 아이미따미꼬 야옹야옹!");
                    rescueAudio.lang = 'ko-KR'; rescueAudio.pitch = 1.0; // 듬직한 목소리
                    window.speechSynthesis.speak(rescueAudio);
                    
                    showSpeechBubble("🚒 짠! 모두 안전합니다!", "불 끄러 왔습니다! 모두 안전합니다! 아이미따미꼬 야옹야옹!");
                }, 600);
            }, 3000);
        }

        function clickBtn(floor, btn) {
            document.getElementById('target-input').value = floor;
            moveElevator(floor, btn);
        }

        function moveElevator(floor, btn) {
            isEmergency = false; // 비상사태 해제
            document.body.classList.remove('siren-bg', 'universe-break');
            document.getElementById('shaft').classList.remove('siren-shaft');
            document.getElementById('display').classList.remove('siren-display');
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            if (globalTimer) clearInterval(globalTimer);
            document.getElementById('speech-bubble').classList.remove('show-bubble');

            // 💡 1^1 수학의 비밀 (반전)
            if (floor === MATH_TRICK) {
                const elPos = getVisualPos(1); // 1층으로 감
                document.getElementById('elevator').style.bottom = "50%"; // 위로 가는 척
                let ticks = 0;
                globalTimer = setInterval(() => {
                    ticks++;
                    if (ticks > 40) {
                        clearInterval(globalTimer);
                        document.getElementById('elevator').style.bottom = elPos + "%";
                        arriveMathTrick();
                    } else {
                        document.getElementById('display').innerText = `[마법 계산 중]`;
                    }
                }, 50);
                return;
            }

            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";
            
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                if(pEl) {
                    const pPos = getVisualPos(p.floor);
                    let offset = (pPos - elPos) * 12; 
                    pEl.style.top = (40 - offset) + "vh"; 
                }
            });

            // 💥 1T↑10T↑ 우주 폭발
            if (floor === HYPER_MATH) {
                document.body.classList.add('universe-break');
                let ticks = 0;
                globalTimer = setInterval(() => {
                    ticks++;
                    if (ticks > 80) { 
                        clearInterval(globalTimer);
                        document.body.classList.remove('universe-break'); 
                        document.body.style.backgroundColor = "#fff"; // 새하얗게 폭발
                        displayFloor(floor); 
                        arrive(floor); 
                    } else { 
                        document.getElementById('display').innerText = `[우주 폭발 중!!]`;
                        document.body.style.backgroundColor = (ticks % 2 === 0) ? "#fff" : "#000";
                    }
                }, 50);
                return;
            }

            // 일반 숫자 카운팅
            let currentText = document.getElementById('display').innerText.split('\n')[0].replace(/,/g,'').replace('T','000000000000');
            let cur = parseInt(currentText);
            if(isNaN(cur)) cur = 1;
            
            // 목표 숫자를 숫자로 변환 (1T, 999T 처리)
            let targetNum = floor;
            if(floor === '1T') targetNum = FLOOR_1T;
            if(floor === '999T') targetNum = FLOOR_999T;
            
            globalTimer = setInterval(() => {
                const diff = targetNum - cur;
                if(Math.abs(diff) < 1) { 
                    clearInterval(globalTimer); 
                    displayFloor(floor); 
                    arrive(floor); 
                } else { 
                    cur += diff / 8; 
                    // 화면에 너무 긴 숫자 방지
                    if(cur > 1000000) document.getElementById('display').innerText = "워프 중...";
                    else document.getElementById('display').innerText = Math.round(cur).toLocaleString() + " 층"; 
                }
            }, 30);
        }

        function displayFloor(f) {
            const d = document.getElementById('display');
            document.body.style.backgroundColor = "#000"; // 배경 초기화
            if(f === HYPER_MATH) { d.innerText = "1T↑10T↑ 층\n(우주 끝!)"; document.body.style.backgroundColor = "#fff"; }
            else if(f === FLOOR_999T || f === '999T') d.innerText = "999T 층";
            else if(f === FLOOR_1T || f === '1T') d.innerText = "1T 층";
            else if(f === FLOOR_99) d.innerText = "99 층";
            else if(f === FLOOR_1 || f === MATH_TRICK) d.innerText = "1 층";
            else d.innerText = f.toLocaleString() + " 층";
        }

        function showSpeechBubble(visibleText, speakText, bubbleColor="#00d2ff") {
            const bubble = document.getElementById('speech-bubble');
            bubble.innerHTML = visibleText;
            bubble.style.borderColor = bubbleColor;
            
            const triangle = document.createElement('style');
            triangle.innerHTML = `#speech-bubble::after { border-color: ${bubbleColor} transparent transparent transparent; }`;
            document.head.appendChild(triangle);

            bubble.classList.add('show-bubble');
            setTimeout(() => { bubble.classList.remove('show-bubble'); }, 6000);
        }

        function arriveMathTrick() {
            window.speechSynthesis.cancel();
            displayFloor(1);
            let text = "우주 끝으로 출발!... 어라? 1을 한 번 곱하면 그냥 1이잖아요? 속았지롱! 다시 1층입니다! 아이미따미꼬 야옹야옹!";
            showSpeechBubble("💬 속았지롱!<br>1의 1승은 그냥 1층!", text, "#ffcc00");

            const m = new SpeechSynthesisUtterance(text);
            m.lang = 'ko-KR'; m.pitch = 1.5; m.rate = 1.1; 
            window.speechSynthesis.speak(m);

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                p.innerText = "😸"; // 장난꾸러기 고양이
                p.classList.remove('exit'); p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 600);
        }

        function arrive(floor) {
            window.speechSynthesis.cancel();
            let speakText = "";
            let bubbleText = "";
            let bubbleColor = "#00d2ff";

            if (floor === HYPER_MATH) { 
                speakText = "일조의 십조승! 숫자가 너무 커서 우주가 터져버렸습니다! 펑!"; 
                bubbleText = "💥 우주 대폭발!<br>숫자가 너무 커요!"; 
                bubbleColor = "#ff0000";
            }
            else if (floor === '999T' || floor === FLOOR_999T) { 
                speakText = "구백구십구 조 층! 반짝반짝 아름다운 무지개 우주에 도착했습니다!"; 
                bubbleText = "🌈 999T 층!<br>무지개 우주입니다!"; 
                bubbleColor = "#ffd700";
            }
            else if (floor === '1T' || floor === FLOOR_1T) { 
                speakText = "일 조 층! 수많은 별들이 반짝이는 은하수입니다!"; 
                bubbleText = "🌌 1T 층!<br>은하수에 도착했습니다!"; 
                bubbleColor = "#ff00ff";
            }
            else if (floor === 99) { 
                speakText = "구십구 층! 새들과 비행기가 날아다니는 구름나라입니다!"; 
                bubbleText = "☁️ 99층!<br>푹신한 구름나라입니다!"; 
                bubbleColor = "#87CEEB";
            }
            else if (floor === 1) {
                speakText = "일 층 로비입니다. 어디로 놀러 갈까요?";
                bubbleText = "🏢 1층입니다.<br>출발 준비 완료!";
            }

            // 🐱 꼬마 대장님 전용 마법 주문 (무조건 추가!) 🐱
            speakText += " 아이미따미꼬 야옹야옹!";

            showSpeechBubble(bubbleText, speakText, bubbleColor);
            
            const m = new SpeechSynthesisUtterance(speakText);
            m.lang = 'ko-KR'; m.pitch = 1.5; m.rate = 1.1; 
            window.speechSynthesis.speak(m);

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                let friends = ["👦", "👧", "🚶‍♂️"]; 
                if (floor === 99) friends = ["🕊️", "✈️", "🦅", "☁️"];
                if (floor === '1T' || floor === FLOOR_1T) friends = ["👽", "🛸", "🚀", "🔭"];
                if (floor === '999T' || floor === FLOOR_999T) friends = ["🦄", "👼", "🌈", "💖"];
                if (floor === HYPER_MATH) friends = ["💥", "🤯", "🔥", "⚡"];
                
                p.innerText = friends[Math.floor(Math.random()*friends.length)];
                p.classList.remove('exit'); p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 600);
        }
    </script>
</body>
</html>
