<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아산병원 999T층 우주 엘레베이터</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: 'Malgun Gothic', sans-serif; color: white; overflow: hidden;
            cursor: pointer;
        }

        #space {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at bottom, #001f3f 0%, #000000 100%);
            z-index: -1; pointer-events: none; transition: all 1s;
        }

        .planet {
            position: absolute; left: 10%; transition: top 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; font-size: 90px;
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.3)); pointer-events: none;
            transition: all 1.5s ease-out; /* 행성 사라짐/도망감 효과를 위한 트랜지션 */
        }
        .planet span { font-size: 18px; margin-top: 10px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 5px #000; text-align: center; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: blink 2s infinite; pointer-events: none; }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }

        /* 🌙 달이 가까워지면 도망가는 애니메이션 */
        .run-away { transform: translateX(120vw) rotate(360deg) !important; opacity: 0 !important; transition: transform 2s ease-in, opacity 2s !important; }
        
        /* 🪐 토성이 가까워지면 펑 사라지는 애니메이션 */
        .vanish { transform: scale(0) rotate(-180deg) !important; opacity: 0 !important; filter: brightness(3) !important; transition: all 1s ease-out !important; }

        /* ☄️ 파란색 빛줄기를 그리며 지나가는 태양, 달, 괴물들 */
        #blue-streaks {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; display: none; z-index: 0;
        }
        .streak-obj {
            position: absolute; right: -200px; font-size: 100px;
            animation: flyAcross linear infinite;
            /* 파란색 빛줄기 효과 꼬리 */
            filter: drop-shadow(-150px 0px 20px #00aaff) drop-shadow(-80px 0px 10px #00ffff);
        }
        .streak-1 { top: 15%; animation-duration: 1.2s; animation-delay: 0s; }
        .streak-2 { top: 35%; animation-duration: 1.6s; animation-delay: 0.3s; }
        .streak-3 { top: 60%; animation-duration: 1.4s; animation-delay: 0.6s; }
        .streak-4 { top: 80%; animation-duration: 1.1s; animation-delay: 0.9s; }
        
        @keyframes flyAcross {
            0% { transform: translateX(0) scale(0.8) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(-150vw) scale(1.2) rotate(-20deg); opacity: 0; }
        }

        #game-container { display: flex; gap: 20px; align-items: flex-end; height: 85vh; width: 95%; max-width: 1400px; }

        #shaft {
            flex: 1.2; height: 100%; border: 5px solid #00d2ff; border-radius: 25px;
            position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(0,210,255,0.3);
        }

        #elevator {
            width: 160px; height: 190px; background: linear-gradient(135deg, #e0f7fa, #80deea);
            border: 4px solid #00acc1; border-radius: 15px; position: absolute;
            left: 50%; transform: translateX(-50%); bottom: 0%; transition: bottom 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        /* 💬 말풍선 스타일 */
        #speech-bubble {
            position: absolute; top: -75px; background: #fff; color: #000;
            padding: 10px 15px; border-radius: 20px; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); opacity: 0; transition: 0.4s ease-out;
            pointer-events: none; white-space: nowrap; z-index: 20; transform: translateY(10px);
            border: 3px solid #00d2ff; text-align: center;
        }
        #speech-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #00d2ff transparent transparent transparent;
        }
        .show-bubble { opacity: 1 !important; transform: translateY(0) !important; }

        #display {
            width: 150px; height: 50px; background: #000; color: #00ff00;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; margin-bottom: 8px; font-family: 'Courier New', monospace;
            text-align: center; line-height: 1.3;
        }

        #passenger { font-size: 80px; transition: 0.5s; }
        .exit { opacity: 0; transform: translateX(60px) rotate(20deg); }
        .enter { opacity: 0; transform: translateX(-60px) rotate(-20deg); }

        #panel {
            flex: 1; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; gap: 10px; border: 3px solid #00d2ff; z-index: 100;
        }

        #button-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            overflow-y: auto; max-height: 600px; padding-right: 5px;
        }

        button { height: 55px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:hover { transform: scale(1.05); }
        button.active { filter: brightness(1.3); border: 2px solid #fff; }
        
        .btn-asan-top { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; font-size: 18px; text-shadow: 0 0 10px #fff; box-shadow: 0 0 20px #00d2ff; border: 3px solid #fff; }
        .btn-saturn { background: #333; color: #ffd700; border: 2px dashed #ffd700; }
        .btn-moon { background: #555; color: #fff; border: 2px dotted #fff; }
        .btn-earth { background: linear-gradient(45deg, #00ff00, #0000ff); color: white; text-shadow: 0 0 5px #000; box-shadow: 0 0 15px #00aaff; }
        .btn-asan-base { background: #ffffff; color: #000; font-size: 16px; border: 3px solid #00d2ff; }

        input { font-size: 18px; width: 100%; padding: 10px; box-sizing: border-box; text-align: center; border-radius: 10px; border: 2px solid #00d2ff; background: #111; color: white; transition: 1s; }
    </style>
</head>
<body>

    <div id="space"></div>

    <div id="blue-streaks">
        <div class="streak-obj streak-1">☀️</div>
        <div class="streak-obj streak-2">🌙</div>
        <div class="streak-obj streak-3">👾</div>
        <div class="streak-obj streak-4">🦖</div>
    </div>

    <div id="p-asan" class="planet" style="top: 85vh; font-size: 100px;">🏥<span style="color:#fff; background:#00d2ff;">아산병원 1층</span></div>
    <div id="p-earth" class="planet" style="top: -100vh; font-size: 130px; filter: drop-shadow(0 0 50px #00aaff);">🌍<span>지구 (10M)<br>빛줄기 슝슝!</span></div>
    <div id="p-moon" class="planet" style="top: -300vh;">🌕<span>달 (100M)<br>가까이 가면 도망가요!</span></div>
    <div id="p-saturn" class="planet" style="top: -600vh; font-size: 150px;">🪐<span>토성 (100B)<br>펑! 하고 사라져요!</span></div>
    <div id="p-asan-space" class="planet" style="top: -1200vh; font-size: 200px; filter: drop-shadow(0 0 100px #00d2ff);">🏥🛸<span style="color:#00d2ff; font-size: 30px; background:#fff;">아산병원 우주센터<br>999T 층</span></div>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="speech-bubble">💬 띵동!</div>
                <div id="display">1</div>
                <div id="passenger">👩‍⚕️</div>
            </div>
        </div>

        <div id="panel">
            <input type="text" id="target-input" value="1" placeholder="가고 싶은 층">
            <button onclick="goMagic()" style="background: #00d2ff; color: black; font-size: 16px; padding: 10px; font-weight: bold; border-radius: 10px;">🚀 위이잉~ 출발!</button>
            
            <div id="button-grid">
                <button class="btn-asan-top" onclick="clickBtn(999000000000000, this)" style="grid-column: span 2; height: 100px;">
                    🏥 아산병원 999T층 (우주센터) 🛸<br>모든 병이 다 낫는 마법의 층!
                </button>
                <button class="btn-saturn" onclick="clickBtn(100000000000, this)" style="grid-column: span 2; height: 70px;">🪐 토성 (100B 층) - 펑! 사라져요!</button>
                <button class="btn-moon" onclick="clickBtn(100000000, this)" style="grid-column: span 2; height: 70px;">🌕 달 (100M 층) - 슈웅 도망가요!</button>
                <button class="btn-earth" onclick="clickBtn(10000000, this)" style="grid-column: span 2; height: 80px;">🌍 지구 (10M 층) - 파란 빛줄기 대소동 ☄️</button>
                
                <button style="background: #222; color: #fff;" onclick="clickBtn(1000000, this)">1M (백만)</button>
                <button style="background: #444; color: #fff;" onclick="clickBtn(100000, this)">100,000</button>
                <button style="background: #666; color: #fff;" onclick="clickBtn(10000, this)">10,000</button>
                <button style="background: #888; color: #fff;" onclick="clickBtn(100, this)">100</button>
                
                <button class="btn-asan-base active" onclick="clickBtn(1, this)" style="grid-column: span 2; height: 60px;">🏥 아산병원 1층 로비</button>
            </div>
        </div>
    </div>

    <script>
        const ASAN_BASE = 1;
        const EARTH_FLOOR = 10000000;      // 10M
        const MOON_FLOOR = 100000000;      // 100M
        const SATURN_FLOOR = 100000000000; // 100B
        const ASAN_TOP = 999000000000000;  // 999T

        const planets = [
            { id: 'p-asan', floor: ASAN_BASE },
            { id: 'p-earth', floor: EARTH_FLOOR },
            { id: 'p-moon', floor: MOON_FLOOR },
            { id: 'p-saturn', floor: SATURN_FLOOR },
            { id: 'p-asan-space', floor: ASAN_TOP }
        ];

        let globalTimer = null; 
        const space = document.getElementById('space');
        
        for(let i=0; i<300; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            star.style.animationDelay = Math.random()*2+'s';
            space.appendChild(star);
        }

        // 엘리베이터 시각적 높이 계산
        function getVisualPos(f) {
            if (f >= ASAN_TOP) return 95;
            if (f === SATURN_FLOOR) return 75;
            if (f === MOON_FLOOR) return 55;
            if (f === EARTH_FLOOR) return 35;
            if (f <= ASAN_BASE) return 5; 
            return Math.pow(f / ASAN_TOP, 0.1) * 90; 
        }

        function clickBtn(floor, btn) {
            document.getElementById('target-input').value = floor;
            moveElevator(floor, btn);
        }

        function goMagic() {
            const val = document.getElementById('target-input').value;
            moveElevator(parseInt(val.replace(/,/g, '')));
        }

        function moveElevator(floor, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            if (globalTimer) clearInterval(globalTimer);
            document.getElementById('speech-bubble').classList.remove('show-bubble');

            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";
            
            // 배경 행성 이동
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                if(pEl) {
                    const pPos = getVisualPos(p.floor);
                    let offset = (pPos - elPos) * 12; 
                    pEl.style.top = (40 - offset) + "vh"; 
                }
            });

            // 숫자 카운팅 및 실시간 애니메이션 이벤트 처리
            let currentText = document.getElementById('display').innerText.split('\n')[0].replace(/,/g,'').replace('T','000000000000').replace('B','000000000').replace('M','000000');
            let cur = parseInt(currentText);
            if(isNaN(cur)) cur = 1;
            
            globalTimer = setInterval(() => {
                const diff = floor - cur;
                
                // 🚀 실시간 이벤트 1: 달 도망가기 (달의 층수에 가까워지면)
                const moonEl = document.getElementById('p-moon');
                if (cur > MOON_FLOOR * 0.4 && cur < MOON_FLOOR * 5) {
                    moonEl.classList.add('run-away');
                } else {
                    moonEl.classList.remove('run-away');
                }

                // 🚀 실시간 이벤트 2: 토성 사라지기 (토성의 층수에 가까워지면)
                const saturnEl = document.getElementById('p-saturn');
                if (cur > SATURN_FLOOR * 0.5 && cur < SATURN_FLOOR * 5) {
                    saturnEl.classList.add('vanish');
                } else {
                    saturnEl.classList.remove('vanish');
                }

                // 🚀 실시간 이벤트 3: 파란색 빛줄기 소동 (지구 근처)
                const streaksEl = document.getElementById('blue-streaks');
                if (cur >= EARTH_FLOOR * 0.5 && cur <= EARTH_FLOOR * 5) {
                    streaksEl.style.display = 'block';
                } else {
                    streaksEl.style.display = 'none';
                }

                if(Math.abs(diff) < 1) { 
                    clearInterval(globalTimer); 
                    displayFloor(floor); 
                    arrive(floor); 
                } else { 
                    cur += diff / 8; 
                    displayFloor(Math.round(cur)); 
                }
            }, 30);
        }

        function displayFloor(f) {
            const d = document.getElementById('display');
            if(f >= ASAN_TOP) d.innerText = "999T 층\n(아산병원 우주)";
            else if(f === SATURN_FLOOR) d.innerText = "100B 층\n(토성 펑!)";
            else if(f === MOON_FLOOR) d.innerText = "100M 층\n(달 도망감!)";
            else if(f === EARTH_FLOOR) d.innerText = "10M 층\n(지구 빛줄기!)";
            else if(f <= 1) d.innerText = "1 층\n(아산병원)";
            else d.innerText = f.toLocaleString() + " 층";
        }

        function showSpeechBubble(visibleText, speakText) {
            const bubble = document.getElementById('speech-bubble');
            bubble.innerHTML = visibleText;
            bubble.classList.add('show-bubble');
            setTimeout(() => { bubble.classList.remove('show-bubble'); }, 6000);

            const elevator = document.getElementById('elevator');
            elevator.style.boxShadow = "0 0 50px 20px #fff";
            setTimeout(() => { elevator.style.boxShadow = "none"; }, 500);

            const m = new SpeechSynthesisUtterance(speakText);
            m.lang = 'ko-KR'; m.pitch = 1.5; m.rate = 1.1; 
            window.speechSynthesis.speak(m);
        }

        function arrive(floor) {
            window.speechSynthesis.cancel();
            let speakText = `띵동, 아산병원 ${floor} 층 입니다.`;
            let bubbleText = `💬 띵동!<br>${floor.toLocaleString()}층입니다!`;

            if (floor >= ASAN_TOP) { 
                speakText = "구백구십구 조 층, 아산병원 우주센터에 도착했습니다! 이곳에 오면 아프던 사람들이 마법처럼 모두 낫는답니다! 대장님 최고!"; 
                bubbleText = "🏥 999T 아산병원 우주센터!<br>모든 병이 다 낫는 마법의 층입니다!<br>대장님 최고! 🎉"; 
            }
            else if (floor === SATURN_FLOOR) { 
                speakText = "백비 층! 앗? 토성이 부끄러워서 펑 하고 사라졌어요!"; 
                bubbleText = "🪐 펑!<br>토성이 부끄러워서<br>사라져버렸어요!"; 
            }
            else if (floor === MOON_FLOOR) { 
                speakText = "백엠 층! 앗, 달이 엘리베이터를 보고 깜짝 놀라서 슈웅 도망가 버렸네요!"; 
                bubbleText = "🌕 슈웅~!<br>달이 깜짝 놀라서<br>도망갔어요! 😆"; 
            }
            else if (floor === EARTH_FLOOR) { 
                speakText = "십엠 층 지구입니다! 우와! 창밖을 보세요! 태양과 달, 괴물들이 파란색 빛줄기를 그리며 신나게 날아다니고 있어요!"; 
                bubbleText = "☄️ 우와!<br>괴물들이 파란 빛줄기를 뿜으며<br>신나게 날아다녀요!"; 
            }
            else if (floor <= 1) {
                speakText = "아산병원 일층 로비입니다. 다시 우주로 출발할 준비 되셨나요?";
                bubbleText = "🏥 아산병원 1층입니다.<br>우주로 갈 준비 완료!";
            }

            // 🐱 꼬마 대장님 전용 마법 주문 (어떤 층에 도착하든 항상 말해요!) 🐱
            speakText += " 아이미따미꼬 야옹야옹!";

            showSpeechBubble(bubbleText, speakText);

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                let friends = ["👩‍⚕️", "👨‍⚕️", "🩺", "💉", "💊"]; 
                if (floor === EARTH_FLOOR) friends = ["👾", "🦖", "👽", "☄️", "💙"];
                if (floor === MOON_FLOOR) friends = ["🏃‍♂️", "💨", "🐰"];
                if (floor === SATURN_FLOOR) friends = ["💨", "👀", "✨"];
                if (floor >= ASAN_TOP) friends = ["🦸‍♂️", "🌟", "🎉", "💖", "🥰"]; 
                
                p.innerText = friends[Math.floor(Math.random()*friends.length)];
                p.classList.remove('exit'); p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 600);
        }
    </script>
</body>
</html>
