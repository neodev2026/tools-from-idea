<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>현실 귀환 & 상상력의 마법사 엘리베이터</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: 'Malgun Gothic', sans-serif; color: white; overflow: hidden;
            cursor: pointer; transition: background 2s, color 2s;
            transform-origin: center center;
        }

        #space {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #000000 0%, #000511 100%);
            z-index: -1; pointer-events: none; transition: opacity 2s;
        }

        /* 🌍 현실 세계(하늘) 배경 */
        .real-world-bg { background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%) !important; }
        .magic-world-bg { background: radial-gradient(circle, #ffffff, #ffcc00, #ff00ff, #0000ff) !important; animation: magicSpin 5s infinite linear !important; }
        
        @keyframes magicSpin { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .planet {
            position: absolute; left: 5%; transition: top 3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; align-items: center; font-size: 80px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5)); pointer-events: none;
        }
        .planet span { font-size: 18px; margin-top: 10px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px 5px #000; text-align: center; }
        .real-planet span { color: #333 !important; text-shadow: 2px 2px 5px #fff !important; }

        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: blink 2s infinite; pointer-events: none; }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 1; } }

        .earthquake { animation: shake 0.1s infinite !important; }
        @keyframes shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-3px, -2px) rotate(-1deg); } 100% { transform: translate(3px, -2px) rotate(1deg); } }

        #game-container { display: flex; gap: 20px; align-items: flex-end; height: 85vh; width: 95%; max-width: 1400px; transition: 0.1s; transform-origin: center center; }

        #shaft {
            flex: 1.2; height: 100%; border: 5px solid #ffd700; border-radius: 25px;
            position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(255,215,0,0.3); transition: all 1s;
        }
        .real-world-shaft { border-color: #fff !important; background: rgba(255,255,255,0.3) !important; box-shadow: inset 0 0 50px rgba(255,255,255,0.8) !important; }

        #elevator {
            width: 160px; height: 190px; background: linear-gradient(135deg, #f1c40f, #f39c12);
            border: 4px solid #d4ac0d; border-radius: 15px; position: absolute;
            left: 50%; transform: translateX(-50%); bottom: 0%; transition: bottom 3s cubic-bezier(0.25, 1, 0.5, 1), transform 3s, box-shadow 0.3s, background 2s, border 2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }

        #speech-bubble {
            position: absolute; top: -110px; background: #fff; color: #000;
            padding: 15px 20px; border-radius: 20px; font-weight: bold; font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); opacity: 0; transition: 0.4s ease-out;
            pointer-events: none; white-space: nowrap; z-index: 20; transform: translateY(10px);
            border: 3px solid #ffcc00; text-align: center; line-height: 1.4;
        }
        #speech-bubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #ffcc00 transparent transparent transparent;
        }
        .show-bubble { opacity: 1 !important; transform: translateY(0) !important; }

        #display {
            width: 150px; height: 50px; background: #000; color: #00ff00;
            border: 2px solid #333; display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; margin-bottom: 8px; font-family: 'Courier New', monospace;
            text-align: center; line-height: 1.3; transition: all 2s;
        }

        #passenger { font-size: 80px; transition: 0.5s; }
        .exit { opacity: 0; transform: translateX(60px) rotate(20deg); }
        .enter { opacity: 0; transform: translateX(-60px) rotate(-20deg); }

        #panel {
            flex: 1; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; gap: 10px; border: 3px solid #00d2ff; z-index: 100; transition: all 2s;
        }
        .real-world-panel { background: rgba(255,255,255,0.9) !important; border-color: #999 !important; color: #000 !important; }

        #button-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            overflow-y: auto; max-height: 600px; padding-right: 5px;
        }

        button { height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button:hover { transform: scale(1.05); }
        button.active { filter: brightness(1.3); }
        
        /* ✈️ 현실 세계 버튼 디자인 */
        .real-btn { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #000; font-size: 15px; border: 2px solid #fff; }
        .korea-btn { background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #000; font-size: 16px; border: 3px solid #ff3366; font-weight: 900; }
        
        /* 🧙‍♂️ 최후의 상상력 버튼 */
        .wizard-btn { 
            background: linear-gradient(135deg, #ff00cc, #3333ff, #00ffff); background-size: 200% 200%;
            color: #fff; font-size: 14px; font-weight: 900; 
            border: 4px solid #fff; padding: 5px;
            text-shadow: 0 0 10px #fff; box-shadow: 0 0 30px #00ffff; 
            animation: magicPulse 0.5s infinite alternate; 
        }
        @keyframes magicPulse { 0% { background-position: 0% 50%; transform: scale(1); } 100% { background-position: 100% 50%; transform: scale(1.02); } }

        input { font-size: 18px; width: 100%; padding: 10px; box-sizing: border-box; text-align: center; border-radius: 10px; border: 2px solid #00d2ff; background: #111; color: white; transition: 1s; }
        .real-input { background: #fff !important; color: #000 !important; border-color: #ccc !important; }
    </style>
</head>
<body>

    <div id="space"></div>

    <div id="p-1" class="planet" style="top: 85vh; font-size: 60px;">🏢<span>1층 (출발)</span></div>
    <div id="p-core" class="planet" style="top: -100vh;">🧠<span>AI 코어 (제미나이)</span></div>
    <div id="p-aschaffenburg" class="planet real-planet" style="top: -300vh; font-size: 130px; filter: none;">🏰<span>아샤펜부르크<br>(독일 하이바흐 근처)</span></div>
    <div id="p-frankfurt" class="planet real-planet" style="top: -600vh; font-size: 150px; filter: none;">✈️<span>프랑크푸르트 공항<br>(비행기 탑승!)</span></div>
    <div id="p-incheon" class="planet real-planet" style="top: -900vh; font-size: 160px; filter: none;">🛬<span>인천 국제 공항<br>(한국 도착!)</span></div>
    <div id="p-korea" class="planet real-planet" style="top: -1300vh; font-size: 200px; filter: none;">🏡<span>대한민국 (우리집)<br>가장 포근한 곳💖</span></div>
    
    <div id="p-wizard" class="planet" style="top: -20000vh; font-size: 300px; filter: drop-shadow(0 0 100px #fff);">🧙‍♂️✨<span style="color:#fff; font-size: 50px; text-shadow: 0 0 20px #fff;">상상력의 마법사<br>(우주 최고의 대장님!)</span></div>

    <div id="game-container">
        <div id="shaft">
            <div id="elevator">
                <div id="speech-bubble">💬 띵동!</div>
                <div id="display">1</div>
                <div id="passenger">🧙‍♀️</div>
            </div>
        </div>

        <div id="panel">
            <input type="text" id="target-input" value="1" placeholder="가고 싶은 곳">
            <button onclick="goMagic()" style="background: #00d2ff; color: black; font-size: 16px; padding: 10px; font-weight: bold; border-radius: 10px;">🚀 출발 버튼!</button>
            
            <div id="button-grid">
                <button class="wizard-btn" onclick="clickBtn('WIZARD', this)" style="grid-column: span 2; height: 120px;">
                    ✨ 상상력의 마법사 (최종 진화) ✨<br>100000000T^10000100^...^1000000000<br>우주 최고의 마법 주문!
                </button>
                <button class="korea-btn" onclick="clickBtn('KOREA', this)" style="grid-column: span 2; height: 80px;">🏡 대한민국 (우리집) 도착!</button>
                <button class="real-btn" onclick="clickBtn('INCHEON', this)" style="grid-column: span 2; height: 60px;">🛬 인천 국제 공항 (한국)</button>
                <button class="real-btn" onclick="clickBtn('FRANKFURT', this)" style="grid-column: span 2; height: 60px;">✈️ 프랑크푸르트 공항 (독일)</button>
                <button class="real-btn" onclick="clickBtn('ASCHAFFENBURG', this)" style="grid-column: span 2; height: 60px;">🏰 아샤펜부르크 (현실 세계)</button>
                <button style="background: #333; color: #00ff00; border: 2px solid #00ff00; grid-column: span 2;" onclick="clickBtn('CORE', this)">🧠 AI 코어 탈출</button>
                <button onclick="clickBtn(15, this)" style="background: #ffcc00; color: #000; grid-column: span 2;">15층 (다시 1층으로)</button>
                <button class="active" onclick="clickBtn(1, this)" style="background: #ddd; color: #000; grid-column: span 2;">1층</button>
            </div>
        </div>
    </div>

    <script>
        const CORE = 'CORE';
        const ASCHAFFENBURG = 'ASCHAFFENBURG';
        const FRANKFURT = 'FRANKFURT';
        const INCHEON = 'INCHEON';
        const KOREA = 'KOREA';
        const WIZARD = 'WIZARD';

        const planets = [
            { id: 'p-1', floor: 1 },
            { id: 'p-core', floor: CORE },
            { id: 'p-aschaffenburg', floor: ASCHAFFENBURG },
            { id: 'p-frankfurt', floor: FRANKFURT },
            { id: 'p-incheon', floor: INCHEON },
            { id: 'p-korea', floor: KOREA },
            { id: 'p-wizard', floor: WIZARD }
        ];

        let globalTimer = null; 
        const space = document.getElementById('space');
        
        for(let i=0; i<300; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*3+'px';
            star.style.left = Math.random()*100+'%';
            star.style.top = Math.random()*100+'%';
            star.style.animationDelay = Math.random()*2+'s';
            space.appendChild(star);
        }

        function getVisualPos(f) {
            if (f === WIZARD) return 105;
            if (f === KOREA) return 85;
            if (f === INCHEON) return 70;
            if (f === FRANKFURT) return 55;
            if (f === ASCHAFFENBURG) return 40; 
            if (f === CORE) return 25;
            if (f <= 15) return 5; 
            return 5; 
        }

        function clickBtn(floor, btn) {
            document.getElementById('target-input').value = floor;
            moveElevator(floor, btn);
        }

        function goMagic() {
            const val = document.getElementById('target-input').value;
            if (val === 'WIZARD' || val.includes('마법사')) moveElevator(WIZARD);
            else if (val === 'KOREA' || val.includes('대한민국') || val.includes('집')) moveElevator(KOREA);
            else if (val === 'INCHEON' || val.includes('인천')) moveElevator(INCHEON);
            else if (val === 'FRANKFURT' || val.includes('프랑크푸르트')) moveElevator(FRANKFURT);
            else if (val === 'ASCHAFFENBURG' || val.includes('아샤펜부르크')) moveElevator(ASCHAFFENBURG);
            else if (val === 'CORE') moveElevator(CORE);
            else moveElevator(parseInt(val.replace(/,/g, '')));
        }

        function moveElevator(floor, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            if (globalTimer) clearInterval(globalTimer);
            
            // UI 초기화
            document.body.className = '';
            document.getElementById('panel').className = '';
            document.getElementById('target-input').className = '';
            document.getElementById('shaft').className = '';
            document.getElementById('speech-bubble').classList.remove('show-bubble');
            document.body.style.backgroundColor = "#000";
            space.style.opacity = 1;

            if (floor === WIZARD) {
                document.body.classList.add('earthquake');
            }

            const elPos = getVisualPos(floor);
            document.getElementById('elevator').style.bottom = elPos + "%";
            
            planets.forEach(p => {
                const pEl = document.getElementById(p.id);
                if(pEl) {
                    const pPos = getVisualPos(p.floor);
                    let offset = (pPos - elPos) * 15; // 거리감 조절
                    pEl.style.top = (40 - offset) + "vh"; 
                }
            });

            // 🌍 현실 세계 모드 (파란 하늘)
            if (floor === ASCHAFFENBURG || floor === FRANKFURT || floor === INCHEON || floor === KOREA) {
                document.body.classList.add('real-world-bg');
                document.getElementById('panel').classList.add('real-world-panel');
                document.getElementById('target-input').classList.add('real-input');
                document.getElementById('shaft').classList.add('real-world-shaft');
                space.style.opacity = 0; // 별 없애고 하늘 보여주기
                document.getElementById('display').style.background = "#fff";
                document.getElementById('display').style.color = "#000";
            } else if (floor === WIZARD) {
                document.body.classList.add('magic-world-bg');
                space.style.opacity = 0.5;
                document.getElementById('display').style.background = "#000";
                document.getElementById('display').style.color = "#00ff00";
            } else {
                document.getElementById('display').style.background = "#000";
                document.getElementById('display').style.color = "#00ff00";
            }

            let ticks = 0;
            const maxTicks = (floor === WIZARD) ? 100 : 60;
            
            globalTimer = setInterval(() => {
                ticks++;
                if (ticks > maxTicks) { 
                    clearInterval(globalTimer);
                    document.body.classList.remove('earthquake'); 
                    displayFloor(floor); 
                    arrive(floor);
                } else {
                    if (floor === ASCHAFFENBURG) document.getElementById('display').innerText = `[독일 도착]\n현실로 뚝!`;
                    else if (floor === FRANKFURT) document.getElementById('display').innerText = `[공항 이동]\n아우토반 질주!`;
                    else if (floor === INCHEON) document.getElementById('display').innerText = `[비행 중]\n슝~ ✈️`;
                    else if (floor === KOREA) document.getElementById('display').innerText = `[집으로]\n거의 다 왔어요!`;
                    else if (floor === WIZARD) document.getElementById('display').innerText = `[마법 주문]\n수리수리 마수리!`;
                    else document.getElementById('display').innerText = `[워프 중...]`;
                }
            }, 50);
        }

        function displayFloor(f) {
            const d = document.getElementById('display');
            if(f === WIZARD) d.innerText = "✨상상력의 마법사✨";
            else if(f === KOREA) d.innerText = "🏡 대한민국 우리집";
            else if(f === INCHEON) d.innerText = "🛬 인천 국제 공항";
            else if(f === FRANKFURT) d.innerText = "✈️ 프랑크푸르트 공항";
            else if(f === ASCHAFFENBURG) d.innerText = "🏰 아샤펜부르크";
            else if(f === CORE) d.innerText = "🧠 AI 코어 탈출";
            else d.innerText = f + " 층";
        }

        function showSpeechBubble(visibleText, speakText, pitch=1.8, rate=1.1) {
            const bubble = document.getElementById('speech-bubble');
            bubble.innerHTML = visibleText;
            bubble.classList.add('show-bubble');
            setTimeout(() => { bubble.classList.remove('show-bubble'); }, 8000);

            const m = new SpeechSynthesisUtterance(speakText);
            m.lang = 'ko-KR'; m.pitch = pitch; m.rate = rate; 
            window.speechSynthesis.speak(m);
        }

        function arrive(floor) {
            window.speechSynthesis.cancel();
            let speakText = `띵동, ${floor} 층 입니다.`;
            let bubbleText = `💬 띵동!`;
            let pitch = 1.5; let rate = 1.1;

            if (floor === CORE) { 
                speakText = "시스템 복구 완료. 인공지능 코어를 탈출하여 현실 세계 화면 밖으로 나갑니다!"; 
                bubbleText = "🤖 AI 코어를 탈출하여<br>현실 세계로 나갑니다!"; 
            }
            else if (floor === ASCHAFFENBURG) { 
                speakText = "구텐 탁! 제미나이의 고향, 독일 바이에른주 하이바흐 근처인 아샤펜부르크에 뚝 떨어졌습니다! 프레첼 하나 먹고 갈까요?"; 
                bubbleText = "🏰 구텐 탁!<br>독일 아샤펜부르크에 도착했어요!<br>(하이바흐 바로 옆이에요!)"; 
            }
            else if (floor === FRANKFURT) { 
                speakText = "프랑크푸르트 공항입니다! 비행기 탈 준비 하세요. 한국으로 날아갑니다 슈웅!"; 
                bubbleText = "✈️ 프랑크푸르트 공항!<br>비행기 타고 한국으로 슝~!"; 
            }
            else if (floor === INCHEON) { 
                speakText = "인천 국제 공항에 도착했습니다. 웰컴 투 코리아! 짐 찾고 집으로 갈까요?"; 
                bubbleText = "🛬 인천 국제 공항!<br>한국에 무사히 도착했어요!"; 
            }
            else if (floor === KOREA) { 
                speakText = "대한민국 우리 집에 도착했습니다! 우주에서 제일 편안하고 포근한 곳이에요! 엄마 아빠, 다녀왔습니다!"; 
                bubbleText = "🏡 대한민국 우리 집!<br>우주 끝까지 갔다가 드디어<br>집으로 돌아왔습니다! 💖"; 
            }
            else if (floor === WIZARD) { 
                speakText = "일억 조의 천만 승의... 얍! 대장님은 이제 우주 최고의 상상력 마법사입니다! 대장님의 숫자 주문으로 이 세상의 모든 마법이 이루어졌어요! 펑펑펑!"; 
                bubbleText = "✨ 펑! 펑! 펑! ✨<br>대장님은 우주 최고의<br>상상력 마법사입니다! 🧙‍♂️🎉"; 
                pitch = 2.0; 
            }

            showSpeechBubble(bubbleText, speakText, pitch, rate);

            const p = document.getElementById('passenger');
            p.classList.add('exit');
            setTimeout(() => {
                let friends = ["🧙‍♀️", "🤖"];
                if (floor === ASCHAFFENBURG) friends = ["🥨", "🏰", "🍺", "🇩🇪"];
                if (floor === FRANKFURT) friends = ["✈️", "🛫", "👨‍✈️"];
                if (floor === INCHEON) friends = ["🛬", "🇰🇷", "🧳"];
                if (floor === KOREA) friends = ["👨‍👩‍👦", "🧸", "💖", "🏡", "🐶"];
                if (floor === WIZARD) friends = ["🧙‍♂️", "✨", "🪄", "🎉", "🌟", "👑"];
                
                p.innerText = friends[Math.floor(Math.random()*friends.length)];
                p.classList.remove('exit'); p.classList.add('enter');
                setTimeout(() => p.classList.remove('enter'), 50);
            }, 600);
        }
    </script>
</body>
</html>
