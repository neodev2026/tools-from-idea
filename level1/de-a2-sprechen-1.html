<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch A2 Speaking - Multi Scenarios & Auto Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step-hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-scroll { max-height: 350px; overflow-y: auto; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .schedule-table { font-size: 0.65rem; line-height: 1.2; width: 100%; border-collapse: collapse; }
        .schedule-table td { border: 1px solid #e2e8f0; padding: 4px; vertical-align: top; }
        .btn-active-play { animation: pulseBg 1.5s infinite; border-color: #f43f5e; background-color: #f43f5e; color: white; }
        @keyframes pulseBg { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 font-sans">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200 flex flex-col h-[95vh]">
        <div class="bg-amber-600 p-5 text-white flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-lg font-black italic tracking-tight">Deutsch A2 Trainer</h1>
                <p id="role-display" class="text-amber-100 text-[10px] uppercase font-bold tracking-widest">Setup</p>
            </div>
            
            <div id="top-controls" class="flex items-center gap-2 hidden">
                <button id="play-all-btn" onclick="togglePlayAll()" class="text-[10px] font-bold bg-white/20 hover:bg-white/30 border border-white/30 px-3 py-1.5 rounded-full transition-all flex items-center gap-1 shadow-sm">
                    <span>🔄 전체 반복</span>
                </button>
                <div class="text-[10px] font-bold bg-white/20 border border-white/30 px-3 py-1.5 rounded-full shadow-sm">
                    LIFE: <span id="lives-count">2</span>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-hidden flex flex-col p-6">
            
            <div id="setup-screen" class="my-auto">
                <div class="mb-8 bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-3">1. 훈련 상황 선택 (PDF 기준)</label>
                    <select id="situation-select" class="w-full p-4 rounded-xl border border-slate-300 font-bold text-slate-700 bg-white shadow-sm focus:ring-2 focus:ring-amber-500 outline-none">
                        <option value="1">상황 1 (A1 수준) - 10시 제안 / 14시 합의</option>
                        <option value="2">상황 2 (A1 수준) - 15시 제안 / 16시 합의</option>
                        <option value="3" selected>상황 3 (A2 수준) - 오전 시험 / 18시 합의</option>
                        <option value="4">상황 4 (A2 수준) - 15시 병원 / 14시 합의</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-3">2. 역할 선택 후 시작</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="startTraining('A')" class="p-6 border-2 border-slate-200 rounded-2xl hover:border-amber-500 hover:bg-amber-50 transition-all group shadow-sm bg-white">
                            <span class="block text-4xl mb-2 group-hover:scale-110 transition-transform">🙋‍♂️</span>
                            <b class="text-slate-700 block">Kandidat A</b>
                        </button>
                        <button onclick="startTraining('B')" class="p-6 border-2 border-slate-200 rounded-2xl hover:border-amber-500 hover:bg-amber-50 transition-all group shadow-sm bg-white">
                            <span class="block text-4xl mb-2 group-hover:scale-110 transition-transform">🙋‍♀️</span>
                            <b class="text-slate-700 block">Kandidat B</b>
                        </button>
                    </div>
                </div>
            </div>

            <div id="main-trainer" class="step-hidden flex flex-col h-full">
                <div id="schedule-section" class="mb-4 p-3 bg-slate-50 rounded-xl border border-slate-200 shrink-0 shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">📅 Meine Termine</p>
                    <div id="schedule-content"></div>
                </div>

                <div id="chat-history" class="chat-scroll no-scrollbar flex-1 space-y-4 mb-4 pr-2 border-b border-slate-100 pb-4"></div>

                <div class="shrink-0 space-y-4">
                    <div id="system-msg" class="h-6 text-center text-xs font-black transition-opacity opacity-0"></div>

                    <div id="section-level1" class="fade-in">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">1단계: 문장 조립</span>
                            <button onclick="showHint()" class="text-[11px] bg-amber-50 text-amber-600 px-3 py-1.5 rounded-full font-bold border border-amber-200 shadow-sm hover:bg-amber-100 transition-all">💡 힌트 보기</button>
                        </div>
                        <div class="p-4 bg-amber-50 border-2 border-dashed border-amber-200 rounded-2xl text-center mb-4 min-h-[60px] flex items-center justify-center gap-2 flex-wrap shadow-inner" id="sentence-dropzone"></div>
                        <div class="flex flex-wrap justify-center gap-2" id="word-bank"></div>
                    </div>

                    <div id="section-level2" class="step-hidden fade-in bg-slate-900 rounded-2xl p-5 space-y-4 shadow-xl">
                        <div class="flex justify-between items-center text-white">
                            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">2단계: 쉐도잉 훈련</span>
                            <div class="flex items-center gap-2">
                                <label class="text-[10px] font-bold">연습 횟수:</label>
                                <select id="repeat-select" onchange="updateRepeatLimit()" class="bg-slate-800 border border-slate-700 text-[10px] rounded px-1 py-0.5">
                                    <option value="1">1회</option>
                                    <option value="3" selected>3회</option>
                                    <option value="5">5회</option>
                                </select>
                            </div>
                        </div>
                        <div class="text-center">
                            <p id="target-sentence" class="text-lg font-black text-white mb-4 leading-tight"></p>
                            <div class="flex justify-center items-center gap-6">
                                <button onclick="handlePlay()" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center shadow-lg hover:bg-blue-500 active:scale-90 transition-all">
                                    <span class="text-xl text-white">🔊</span>
                                </button>
                                <div class="text-left">
                                    <p class="text-[10px] text-slate-400 font-bold">진행도</p>
                                    <p class="text-xl font-black text-white"><span id="current-repeat">0</span> / <span id="limit-display">3</span></p>
                                </div>
                            </div>
                        </div>
                        <button id="next-btn" disabled class="w-full py-4 bg-slate-700 text-slate-500 rounded-xl font-black text-base transition-all">NÄCHSTE (다음 대화)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="hint-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl relative">
            <button onclick="closeHint()" class="absolute top-6 right-6 text-slate-400 font-bold text-xl">✕</button>
            <h3 class="text-xl font-black text-slate-800 mb-4 tracking-tight">💡 대화 가이드</h3>
            <div id="hint-content" class="text-sm space-y-4 text-slate-600 leading-relaxed border-t pt-4"></div>
            <button onclick="closeHint()" class="w-full mt-8 py-4 bg-amber-600 text-white rounded-2xl font-bold">확인</button>
        </div>
    </div>

    <script>
        // 전역 상태 변수
        let currentSituation = '3';
        let myRole = '';
        let currentIdx = 0;
        let selectedWords = [];
        let errorCount = 0;
        const maxErrors = 2;
        let repeatLimit = 3;
        let repeatDone = 0;
        
        // 반복 재생 상태 변수
        let isPlayingAll = false;
        let playAllIndex = 0;
        let scriptArray = [];

        // 스케줄 데이터
        const scheduleHTML = {
            'A': `<table class="schedule-table"><tr><td class="font-bold bg-slate-100">08:00</td><td>Michaela & Paul</td><td class="font-bold bg-slate-100">11:00</td><td>Paket kommt an!</td></tr><tr><td class="font-bold bg-slate-100">12:00</td><td>Mittagessen bei Hans</td><td class="font-bold bg-slate-100">15:00</td><td>Sportkurse</td></tr></table>`,
            'B': `<table class="schedule-table"><tr><td class="font-bold bg-slate-100">08:00</td><td>Boris (Frühstück)</td><td class="font-bold bg-slate-100">10:00</td><td>Computerkurs-Prüfung</td></tr><tr><td class="font-bold bg-slate-100">12:30</td><td>Pizzeria</td><td class="font-bold bg-slate-100">17:00</td><td>Deutsch lernen</td></tr></table>`
        };

        // 전체 시나리오 데이터베이스 (상황 1~4)
        const allScenarios = {
            '1': { // A1 수준
                'A': [
                    { partner: "Hallo! Ja. Gehen wir um 10 Uhr?", target: "Nein, um 10 Uhr habe ich Besuch.", words: ["Nein,", "um", "10", "Uhr", "habe", "ich", "Besuch."], order: ["Nein,", "um", "10", "Uhr", "habe", "ich", "Besuch."], hint: "<b>Besuch haben</b>: 손님이 있다." },
                    { partner: "Hast du um 14 Uhr Zeit?", target: "Ja, 14 Uhr ist gut.", words: ["Ja,", "14", "Uhr", "ist", "gut."], order: ["Ja,", "14", "Uhr", "ist", "gut."], hint: "단순히 시간이 좋다고 동의하는 A1 표현입니다." }
                ],
                'B': [
                    { partner: "Hast du am Samstag Zeit?", target: "Hallo! Ja. Gehen wir um 10 Uhr?", words: ["Hallo!", "Ja.", "Gehen", "wir", "um", "10", "Uhr?"], order: ["Hallo!", "Ja.", "Gehen", "wir", "um", "10", "Uhr?"], hint: "<b>Gehen wir...</b>: 우리 ~시에 갈까?" },
                    { partner: "Nein, um 10 Uhr habe ich Besuch.", target: "Hast du um 14 Uhr Zeit?", words: ["Hast", "du", "um", "14", "Uhr", "Zeit?"], order: ["Hast", "du", "um", "14", "Uhr", "Zeit?"], hint: "대안 시간을 물어보는 기본 문장입니다." }
                ]
            },
            '2': { // A1 수준
                'A': [
                    { partner: "Wollen wir am Samstag das Wörterbuch kaufen?", target: "Ja, gerne. Hast du um 15 Uhr Zeit?", words: ["Ja,", "gerne.", "Hast", "du", "um", "15", "Uhr", "Zeit?"], order: ["Ja,", "gerne.", "Hast", "du", "um", "15", "Uhr", "Zeit?"], hint: "<b>Ja, gerne</b>: 흔쾌히 수락할 때 씁니다." },
                    { partner: "Nein, da gehe ich ins Krankenhaus. Geht es um 16 Uhr?", target: "Ja, um 16 Uhr habe ich Zeit.", words: ["Ja,", "um", "16", "Uhr", "habe", "ich", "Zeit."], order: ["Ja,", "um", "16", "Uhr", "habe", "ich", "Zeit."], hint: "<b>Zeit haben</b>을 이용해 긍정합니다." }
                ],
                'B': [
                    { partner: "Ja, gerne. Hast du um 15 Uhr Zeit?", target: "Nein, ich gehe ins Krankenhaus.", words: ["Nein,", "ich", "gehe", "ins", "Krankenhaus."], order: ["Nein,", "ich", "gehe", "ins", "Krankenhaus."], hint: "<b>ins Krankenhaus</b>: 병원으로 (방향을 나타냅니다)" },
                    { partner: "Geht es um 16 Uhr?", target: "Ja, um 16 Uhr habe ich Zeit.", words: ["Ja,", "um", "16", "Uhr", "habe", "ich", "Zeit."], order: ["Ja,", "um", "16", "Uhr", "habe", "ich", "Zeit."], hint: "간단한 수락 표현입니다." }
                ]
            },
            '3': { // A2 수준 (기존에 작성한 고득점 시나리오)
                'A': [
                    { partner: "Hallo! Wollen wir zusammen ein Wörterbuch kaufen?", target: "Wann hast du am Samstag, den 17. Mai, Zeit?", words: ["Wann", "hast", "du", "am", "Samstag,", "den", "17.", "Mai,", "Zeit?"], order: ["Wann", "hast", "du", "am", "Samstag,", "den", "17.", "Mai,", "Zeit?"], hint: "날짜 앞에 <b>am</b>을 씁니다." },
                    { partner: "Am Vormittag habe ich eine Prüfung. Wie wäre es um 12 Uhr?", target: "Tut mir leid, um 12 Uhr esse ich bei Hans zu Mittag.", words: ["Tut", "mir", "leid,", "um", "12", "Uhr", "esse", "ich", "bei", "Hans", "zu", "Mittag."], order: ["Tut", "mir", "leid,", "um", "12", "Uhr", "esse", "ich", "bei", "Hans", "zu", "Mittag."], hint: "<b>zu Mittag essen</b>: 점심을 먹다." },
                    { partner: "Da lerne ich Deutsch. Aber um 18 Uhr habe ich Zeit. Passt dir das?", target: "Ja, 18 Uhr passt mir sehr gut.", words: ["Ja,", "18", "Uhr", "passt", "mir", "sehr", "gut."], order: ["Ja,", "18", "Uhr", "passt", "mir", "sehr", "gut."], hint: "<b>passt mir sehr gut</b>: 나에게 아주 좋다." }
                ],
                'B': [
                    { partner: "Wann hast du am Samstag, den 17. Mai, Zeit?", target: "Am Vormittag habe ich leider eine Computerkurs-Prüfung.", words: ["Am", "Vormittag", "habe", "ich", "leider", "eine", "Computerkurs-Prüfung."], order: ["Am", "Vormittag", "habe", "ich", "leider", "eine", "Computerkurs-Prüfung."], hint: "<b>leider</b>: 유감스럽게도" },
                    { partner: "Tut mir leid, um 12 Uhr esse ich bei Hans. Hast du um 17 Uhr Zeit?", target: "Da lerne ich leider Deutsch. Aber danach um 18 Uhr?", words: ["Da", "lerne", "ich", "leider", "Deutsch.", "Aber", "danach", "um", "18", "Uhr?"], order: ["Da", "lerne", "ich", "leider", "Deutsch.", "Aber", "danach", "um", "18", "Uhr?"], hint: "<b>danach</b>: 그 이후에" },
                    { partner: "Ja, 18 Uhr passt mir gut. Wollen wir uns am Bahnhof treffen?", target: "Abgemacht! Bis Samstag um 18 Uhr.", words: ["Abgemacht!", "Bis", "Samstag", "um", "18", "Uhr."], order: ["Abgemacht!", "Bis", "Samstag", "um", "18", "Uhr."], hint: "<b>Abgemacht!</b>: 약속됐어! (합의 완료)" }
                ]
            },
            '4': { // A2 수준 (오후 스케줄 조정)
                'A': [
                    { partner: "Wir müssen noch das Wörterbuch kaufen. Hast du Zeit?", target: "Ja, gerne. Wollen wir uns um 15 Uhr treffen?", words: ["Ja,", "gerne.", "Wollen", "wir", "uns", "um", "15", "Uhr", "treffen?"], order: ["Ja,", "gerne.", "Wollen", "wir", "uns", "um", "15", "Uhr", "treffen?"], hint: "<b>Wollen wir uns... treffen?</b>: 우리 ~시에 만날까?" },
                    { partner: "Um 15 Uhr muss ich ins Krankenhaus. Könnten wir uns um 14 Uhr treffen?", target: "Um 14 Uhr ist super! Da habe ich nichts vor.", words: ["Um", "14", "Uhr", "ist", "super!", "Da", "habe", "ich", "nichts", "vor."], order: ["Um", "14", "Uhr", "ist", "super!", "Da", "habe", "ich", "nichts", "vor."], hint: "<b>nichts vorhaben</b>: 아무 계획이 없다." }
                ],
                'B': [
                    { partner: "Ja, gerne. Wollen wir uns um 15 Uhr treffen?", target: "Um 15 Uhr besuche ich Frau Schäfer. Geht es um 14 Uhr?", words: ["Um", "15", "Uhr", "besuche", "ich", "Frau", "Schäfer.", "Geht", "es", "um", "14", "Uhr?"], order: ["Um", "15", "Uhr", "besuche", "ich", "Frau", "Schäfer.", "Geht", "es", "um", "14", "Uhr?"], hint: "<b>Geht es um...?</b>: ~시는 어때?" },
                    { partner: "Um 14 Uhr ist super! Da habe ich nichts vor.", target: "Perfekt. Dann kaufen wir das Wörterbuch.", words: ["Perfekt.", "Dann", "kaufen", "wir", "das", "Wörterbuch."], order: ["Perfekt.", "Dann", "kaufen", "wir", "das", "Wörterbuch."], hint: "<b>Dann...</b>: 그러면 (결정 후 행동을 말할 때)" }
                ]
            }
        };

        function startTraining(role) {
            myRole = role;
            currentSituation = document.getElementById('situation-select').value;
            currentIdx = 0;
            
            // 재생 중지 및 상태 초기화
            stopPlayAll();
            
            document.getElementById('setup-screen').classList.add('step-hidden');
            document.getElementById('main-trainer').classList.remove('step-hidden');
            document.getElementById('top-controls').classList.remove('hidden');
            
            document.getElementById('role-display').innerText = `상황 ${currentSituation} - Kandidat ${role}`;
            document.getElementById('schedule-content').innerHTML = scheduleHTML[role];
            document.getElementById('chat-history').innerHTML = '';
            
            // 스크립트 배열 생성 (무한 반복용)
            scriptArray = [];
            allScenarios[currentSituation][myRole].forEach(d => {
                scriptArray.push(d.partner);
                scriptArray.push(d.target);
            });

            initDialog();
        }

        // ---------- 대화 전체 무한 반복 재생 로직 ---------- //
        function togglePlayAll() {
            const btn = document.getElementById('play-all-btn');
            if (isPlayingAll) {
                stopPlayAll();
            } else {
                isPlayingAll = true;
                playAllIndex = 0;
                btn.innerHTML = `<span>⏹ 반복 중지</span>`;
                btn.classList.add('btn-active-play');
                playNextInSequence();
            }
        }

        function stopPlayAll() {
            isPlayingAll = false;
            window.speechSynthesis.cancel();
            const btn = document.getElementById('play-all-btn');
            if(btn) {
                btn.innerHTML = `<span>🔄 전체 반복</span>`;
                btn.classList.remove('btn-active-play');
            }
        }

        function playNextInSequence() {
            if (!isPlayingAll || scriptArray.length === 0) return;
            
            if (playAllIndex >= scriptArray.length) {
                playAllIndex = 0; // 배열 끝에 도달하면 무한 루프
            }

            const msg = new SpeechSynthesisUtterance(scriptArray[playAllIndex]);
            msg.lang = 'de-DE';
            msg.rate = 0.8;
            
            msg.onend = () => {
                playAllIndex++;
                if (isPlayingAll) {
                    setTimeout(playNextInSequence, 1000); // 문장 사이 1초 간격
                }
            };

            window.speechSynthesis.speak(msg);
        }
        // ---------------------------------------------------- //

        function initDialog() {
            const d = allScenarios[currentSituation][myRole][currentIdx];
            errorCount = 0; repeatDone = 0;
            updateLivesUI(); updateRepeatUI();
            
            addChatBubble('partner', d.partner);
            
            document.getElementById('section-level1').classList.remove('step-hidden');
            document.getElementById('section-level2').classList.add('step-hidden');
            document.getElementById('sentence-dropzone').innerHTML = '';
            selectedWords = [];
            
            const bank = document.getElementById('word-bank');
            bank.innerHTML = '';
            [...d.words].sort(() => Math.random() - 0.5).forEach(word => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-1.5 bg-white border-2 border-slate-200 rounded-xl text-sm font-bold shadow-sm active:scale-95 transition-all";
                btn.innerText = word;
                btn.onclick = () => selectWord(word, btn);
                bank.appendChild(btn);
            });
        }

        function addChatBubble(side, text) {
            const history = document.getElementById('chat-history');
            const container = document.createElement('div');
            container.className = side === 'partner' ? "flex gap-2 fade-in" : "flex justify-end fade-in";
            const bubble = document.createElement('div');
            bubble.className = side === 'partner' 
                ? "bg-slate-100 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-xs font-medium text-slate-700 italic border shadow-sm"
                : "bg-amber-600 p-3 rounded-2xl rounded-tr-none max-w-[85%] text-xs font-bold text-white shadow-md";
            bubble.innerText = text;
            container.appendChild(bubble);
            history.appendChild(container);
            history.scrollTop = history.scrollHeight;
        }

        function selectWord(word, btn) {
            if(isPlayingAll) stopPlayAll(); // 학습 중 조작 시 전체듣기 일시 정지

            selectedWords.push(word);
            btn.classList.add('invisible');
            const dropzone = document.getElementById('sentence-dropzone');
            const chip = document.createElement('span');
            chip.className = "px-2 py-1 bg-amber-600 text-white rounded-lg font-bold text-[10px] fade-in";
            chip.innerText = word;
            dropzone.appendChild(chip);
            
            const d = allScenarios[currentSituation][myRole][currentIdx];
            if(selectedWords.length === d.words.length) {
                if(JSON.stringify(selectedWords) === JSON.stringify(d.order)) startLevel2(d.target);
                else handleWrong();
            }
        }

        function handleWrong() {
            errorCount++; updateLivesUI();
            const d = allScenarios[currentSituation][myRole][currentIdx];
            if (errorCount >= maxErrors) {
                showSystemMsg("2회 오답! 정답을 확인하세요.", "text-rose-600");
                setTimeout(() => startLevel2(d.target), 2000);
            } else {
                showSystemMsg("Falsch! 다시 시도하세요.", "text-amber-600");
                setTimeout(() => {
                    selectedWords = [];
                    document.getElementById('sentence-dropzone').innerHTML = '';
                    document.querySelectorAll('#word-bank button').forEach(b => b.classList.remove('invisible'));
                }, 2000);
            }
        }

        function startLevel2(sentence) {
            addChatBubble('me', sentence);
            document.getElementById('section-level1').classList.add('step-hidden');
            document.getElementById('section-level2').classList.remove('step-hidden');
            document.getElementById('target-sentence').innerText = sentence;
            repeatDone = 0;
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = true;
            nextBtn.className = "w-full py-4 bg-slate-700 text-slate-500 rounded-xl font-black text-base transition-all";
            updateRepeatUI();
            
            if(!isPlayingAll) setTimeout(playSingleTTS, 500);
        }

        function handlePlay() {
            if(isPlayingAll) stopPlayAll();
            playSingleTTS();
            if (repeatDone < repeatLimit) { repeatDone++; updateRepeatUI(); }
            if (repeatDone >= repeatLimit) {
                const nextBtn = document.getElementById('next-btn');
                nextBtn.disabled = false;
                nextBtn.className = "w-full py-4 bg-blue-600 text-white rounded-xl font-black text-base shadow-lg active:bg-blue-500 transition-all";
            }
        }

        function updateRepeatLimit() {
            repeatLimit = parseInt(document.getElementById('repeat-select').value);
            updateRepeatUI();
        }

        function updateRepeatUI() {
            document.getElementById('current-repeat').innerText = repeatDone;
            document.getElementById('limit-display').innerText = repeatLimit;
        }

        function updateLivesUI() {
            document.getElementById('lives-count').innerText = Math.max(0, maxErrors - errorCount);
        }

        function showSystemMsg(text, colorClass) {
            const msgEl = document.getElementById('system-msg');
            msgEl.innerText = text;
            msgEl.className = "h-6 text-center text-[10px] font-black transition-opacity opacity-100 " + colorClass;
            setTimeout(() => msgEl.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        function showHint() {
            document.getElementById('hint-content').innerHTML = allScenarios[currentSituation][myRole][currentIdx].hint;
            document.getElementById('hint-modal').classList.remove('hidden');
        }

        function closeHint() { document.getElementById('hint-modal').classList.add('hidden'); }

        function playSingleTTS() {
            const msg = new SpeechSynthesisUtterance(document.getElementById('target-sentence').innerText);
            msg.lang = 'de-DE'; msg.rate = 0.8; window.speechSynthesis.speak(msg);
        }

        document.getElementById('next-btn').onclick = () => {
            currentIdx++;
            if (currentIdx < allScenarios[currentSituation][myRole].length) {
                initDialog();
            } else {
                addChatBubble('partner', "훈련 완료! 상황 목록으로 돌아가려면 새로고침 하세요. 🎉");
                document.getElementById('section-level2').classList.add('step-hidden');
            }
        };
    </script>
</body>
</html>
