<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우주의 끝: 통합 컨트롤 시스템</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; color: white; }
        
        #viewport { 
            position: relative; width: 100vw; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        #game-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        /* 블럭 컨테이너 */
        #block-container {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column-reverse; align-items: center;
            transition: top 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: top, transform, opacity;
            top: 50%;
        }

        #counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 3.5rem; font-weight: bold; color: #00f2ff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); z-index: 100;
        }

        /* 컨트롤 버튼 - 항상 최상단에 고정 */
        .controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 15px;
        }

        button {
            padding: 15px 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); 
            background: rgba(40, 40, 40, 0.8); color: white;
            backdrop-filter: blur(5px); transition: all 0.2s;
        }

        button:active { transform: scale(0.95); }

        .block {
            width: 220px; height: 60px; border: 1px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; font-weight: bold; color: white;
            margin-bottom: 5px; flex-shrink: 0; border-radius: 8px;
            animation: popIn 0.3s ease-out;
        }

        .special-block {
            position: relative; width: 380px !important; height: 380px !important;
            border-radius: 50% !important; font-size: 12rem !important;
            border: 12px solid gold !important;
            background: radial-gradient(circle, #444, #000) !important;
            box-shadow: 0 0 120px rgba(255, 215, 0, 0.6) !important;
            margin: 200px 0 !important; display: flex !important;
            justify-content: center !important; align-items: center !important;
        }

        .planet-info {
            position: absolute; left: calc(100% + 50px); top: 50%;
            transform: translateY(-50%); display: none; flex-direction: column;
            align-items: flex-start; white-space: nowrap;
        }

        .planet-name { font-size: 5rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.8); }
        .ready-msg { font-size: 10rem; color: #ff00ff; text-shadow: 0 0 40px #ff00ff; font-weight: bold; }

        .black-hole {
            background: #000 !important; border-color: #fff !important;
            box-shadow: 0 0 100px 20px #fff, 0 0 150px 40px #ff00ff !important;
            animation: rotate 3s linear infinite;
        }

        .sucking { transition: all 3s ease-in !important; transform: translateX(-50%) scale(0) rotate(1080deg) !important; opacity: 0; }

        /* T블럭 스타일 */
        .t-block {
            width: 400px; height: 120px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border: 8px solid #fff; border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 5rem; font-weight: bold; color: #fff;
            margin-bottom: 10px; flex-shrink: 0; box-shadow: 0 0 30px gold;
            animation: tDrop 0.2s ease-out forwards;
        }

        .t-block.final { width: 520px; height: 220px; font-size: 9rem; box-shadow: 0 0 100px gold; border-width: 15px; }

        @keyframes tDrop {
            0% { transform: translateY(-500px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        #reset-btn {
            position: fixed; top: 70%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 2rem; background: #ff0055;
            display: none; z-index: 2000; border-radius: 50px; cursor: pointer; color: white;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="counter">READY</div>
    <button id="reset-btn">다시 처음 부터</button>

    <div id="viewport">
        <div id="game-background"></div>
        <div id="block-container"></div>
    </div>

    <div class="controls" id="main-controls">
        <button id="play-pause">시작</button>
        <button id="speed-up">🚀 빠르게</button>
        <button id="speed-down">🐢 느리게</button>
    </div>

    <script>
        let countValue = 0;
        let blockCount = 0;
        let tCount = 0; // T블럭 카운트 전용
        let timer = null;
        let delay = 500;
        let isWaiting = false;
        let currentPhase = 'NORMAL'; // 'NORMAL', 'ENDING', 'T_STACKING', 'FINISHED'

        const container = document.getElementById('block-container');
        const counterDisplay = document.getElementById('counter');
        const resetBtn = document.getElementById('reset-btn');

        const solarSystem = [
            {id: '☀️', name: '태양'}, {id: '☄️', name: '수성'}, {id: '✨', name: '금성'},
            {id: '🌍', name: '지구'}, {id: '🔴', name: '화성'}, {id: '🟠', name: '목성'},
            {id: '🪐', name: '토성'}, {id: '💎', name: '천왕성'}, {id: '🔵', name: '해왕성'}
        ];

        // 통합 실행 함수: 현재 단계에 맞는 동작을 수행
        function processNext() {
            if (isWaiting) return;

            if (currentPhase === 'NORMAL') {
                addNormalBlock();
            } else if (currentPhase === 'T_STACKING') {
                addTBlock();
            }
        }

        function addNormalBlock() {
            blockCount++;
            countValue += 10000;
            counterDisplay.innerText = countValue.toLocaleString();

            const block = document.createElement('div');

            if (blockCount > 0 && blockCount % 200 === 0) {
                const objectIdx = (blockCount / 200) - 1;
                if (objectIdx < solarSystem.length) {
                    const obj = solarSystem[objectIdx];
                    block.className = 'block special-block';
                    block.innerHTML = `<span>${obj.id}</span><div class="planet-info"><div class="planet-name">${obj.name}</div><div class="ready-msg"></div></div>`;
                    container.appendChild(block);
                    updateCamera(block); 
                    triggerPause(block.querySelector('.planet-info'), 4);
                } else {
                    block.className = 'block special-block black-hole';
                    block.innerHTML = `<span>🕳️</span><div class="planet-info"><div class="planet-name">블랙홀</div><div class="ready-msg"></div></div>`;
                    container.appendChild(block);
                    updateCamera(block);
                    startEndingSequence();
                }
            } else {
                block.className = 'block';
                block.innerText = countValue.toLocaleString();
                block.style.backgroundColor = `hsl(${(blockCount * 10) % 360}, 60%, 45%)`;
                container.appendChild(block);
                updateCamera(block);
            }
        }

        // T블럭 추가 함수 (버튼 제어 가능)
        function addTBlock() {
            tCount++;
            if (tCount > 999) {
                stopTimer();
                currentPhase = 'FINISHED';
                resetBtn.style.display = 'block';
                return;
            }

            const tBlock = document.createElement('div');
            tBlock.className = tCount === 999 ? 't-block final' : 't-block';
            tBlock.innerText = `${tCount}T`;
            container.appendChild(tBlock);
            updateCamera(tBlock);

            // T블럭은 기본적으로 속도가 빠름 (원하는 경우 버튼으로 조절 가능)
            if (tCount === 1) delay = 50; 
        }

        function updateCamera(targetBlock) {
            requestAnimationFrame(() => {
                const viewportCenterY = window.innerHeight / 2;
                const blockCenterInsideContainer = targetBlock.offsetTop + (targetBlock.offsetHeight / 2);
                container.style.top = `${viewportCenterY - blockCenterInsideContainer}px`;
            });
        }

        async function triggerPause(infoElement, seconds) {
            isWaiting = true;
            infoElement.style.display = 'flex';
            const msgElement = infoElement.querySelector('.ready-msg');
            for (let i = seconds; i > 0; i--) {
                msgElement.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }
            infoElement.style.display = 'none';
            isWaiting = false;
        }

        async function startEndingSequence() {
            currentPhase = 'ENDING';
            isWaiting = true;
            const info = container.querySelector('.black-hole .planet-info');
            info.style.display = 'flex';
            info.querySelector('.ready-msg').innerText = "흡수 중...";
            
            await new Promise(r => setTimeout(r, 2000));
            container.classList.add('sucking');
            
            await new Promise(r => setTimeout(r, 3000));
            
            // 초기화 후 T블럭 쌓기 단계로 전환
            container.innerHTML = '';
            container.classList.remove('sucking');
            container.style.top = '50%';
            counterDisplay.style.display = 'none';
            
            currentPhase = 'T_STACKING';
            isWaiting = false;
            delay = 50; // T블럭 기본 속도 상향
            // 타이머가 돌고 있었다면 바뀐 phase로 계속 진행됨
        }

        function startTimer() {
            if (!timer && currentPhase !== 'FINISHED') {
                timer = setInterval(processNext, delay);
                document.getElementById('play-pause').innerText = "멈춤";
            }
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-pause').innerText = "시작";
        }

        document.getElementById('play-pause').onclick = () => timer ? stopTimer() : startTimer();
        document.getElementById('speed-up').onclick = () => { delay = Math.max(10, delay * 0.7); if(timer){stopTimer(); startTimer();} };
        document.getElementById('speed-down').onclick = () => { delay *= 1.4; if(timer){stopTimer(); startTimer();} };
        resetBtn.onclick = () => location.reload();
    </script>
</body>
</html>
