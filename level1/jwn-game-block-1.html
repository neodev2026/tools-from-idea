<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대우주 탐험: 행성과 은하</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; perspective: 1000px; }

        #game-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        #block-container {
            position: absolute; left: 50%; bottom: 30%; 
            transform: translateX(-50%) translateY(0px);
            display: flex; flex-direction: column-reverse; align-items: center;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        #counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 3.5rem; font-weight: bold; color: #00f2ff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); z-index: 100;
        }

        #ready-msg {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 15rem; font-weight: bold; color: #fff;
            text-shadow: 0 0 50px #ff00ff; z-index: 200; display: none;
            pointer-events: none;
        }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 10px;
        }

        button {
            padding: 12px 20px; font-size: 1rem; font-weight: bold; cursor: pointer;
            border-radius: 25px; border: none; background: #333; color: white;
            box-shadow: 0 4px #000;
        }

        .block {
            width: 200px; height: 60px; border: 1px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; font-weight: bold; color: white;
            margin-bottom: 4px; flex-shrink: 0; border-radius: 8px;
            animation: popIn 0.3s ease-out;
        }

        /* 행성 및 은하 블럭 전용 스타일 */
        .special-block {
            width: 300px !important; height: 300px !important;
            border-radius: 50% !important;
            font-size: 10rem !important; /* 크기를 더 키웠습니다 */
            border: 10px solid gold !important;
            background: radial-gradient(circle, #333, #000) !important;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.6) !important;
            margin: 100px 0 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .black-hole {
            background: #000 !important; border-color: #fff !important;
            box-shadow: 0 0 100px 20px #fff, 0 0 150px 40px #ff00ff !important;
            animation: rotate 3s linear infinite;
        }

        #reset-btn {
            position: fixed; top: 60%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 2rem; background: #ff0055;
            display: none; z-index: 300; border-radius: 50px; cursor: pointer; color: white;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .sucking-out { transition: all 2.5s ease-in; transform: scale(0) rotate(1080deg) !important; opacity: 0; }
    </style>
</head>
<body>

    <div id="counter">READY</div>
    <div id="ready-msg"></div>
    <button id="reset-btn">다시 처음 부터</button>

    <div id="viewport">
        <div id="game-background"></div>
        <div id="block-container"></div>
    </div>

    <div class="controls" id="main-controls">
        <button id="play-pause">시작</button>
        <button id="speed-up">🚀 빠르게</button>
        <button id="speed-down">🐢 느리게</button>
    </div>

    <script>
        let countValue = 0;
        let blockCount = 0;
        let timer = null;
        let delay = 500;
        let isWaiting = false;

        const container = document.getElementById('block-container');
        const counterDisplay = document.getElementById('counter');
        const readyMsg = document.getElementById('ready-msg');
        const resetBtn = document.getElementById('reset-btn');

        // 태양계 + 은하계 100개 데이터
        const solarSystem = ['☀️', '☿️', '♀️', '🌍', '♂️', '♃', '♄', '♅', '♆'];
        const galaxies = Array.from({length: 100}, () => '🌀');
        const allObjects = [...solarSystem, ...galaxies];

        function addBlock() {
            if (isWaiting) return;

            blockCount++;
            countValue += 10000;
            counterDisplay.innerText = countValue.toLocaleString();

            const block = document.createElement('div');

            // 200번째마다 특수 천체 등장 여부 확인
            if (blockCount > 0 && blockCount % 200 === 0) {
                const objectIdx = (blockCount / 200) - 1;
                
                if (objectIdx < allObjects.length) {
                    // 행성 또는 은하 등장
                    block.className = 'block special-block';
                    block.innerHTML = `<span>${allObjects[objectIdx]}</span>`;
                    container.appendChild(block);
                    updateCamera(true); // 시점 이동
                    triggerPause(4);    // 4초 정지
                } else {
                    // 모든 천체가 끝난 뒤 다음 200번째에 블랙홀 등장
                    block.className = 'block special-block black-hole';
                    block.innerHTML = `<span>🕳️</span>`;
                    container.appendChild(block);
                    updateCamera(true);
                    triggerBlackHole();
                }
            } else {
                // 일반 숫자 블록
                block.className = 'block';
                block.innerText = countValue.toLocaleString();
                block.style.backgroundColor = `hsl(${(blockCount * 10) % 360}, 60%, 45%)`;
                container.appendChild(block);
                updateCamera(false);
            }
        }

        function updateCamera(isSpecial) {
            const blocks = container.childNodes;
            let totalHeight = 0;
            blocks.forEach(b => {
                totalHeight += (b.offsetHeight || 0) + 6; // 마진 포함 높이 계산
            });

            // 행성 블럭일 때는 조금 더 위로 올려서 중앙에 배치
            const offset = isSpecial ? totalHeight - 250 : totalHeight - 100;
            container.style.transform = `translateX(-50%) translateY(${offset}px)`;
        }

        async function triggerPause(seconds) {
            isWaiting = true;
            stopTimer();
            readyMsg.style.display = 'block';
            for (let i = seconds; i > 0; i--) {
                readyMsg.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }
            readyMsg.style.display = 'none';
            isWaiting = false;
            startTimer();
        }

        function triggerBlackHole() {
            isWaiting = true;
            stopTimer();
            document.getElementById('main-controls').style.display = 'none';
            
            setTimeout(() => {
                container.classList.add('sucking-out');
                setTimeout(() => {
                    resetBtn.style.display = 'block';
                }, 2500);
            }, 1000);
        }

        function startTimer() {
            if (!timer) {
                timer = setInterval(addBlock, delay);
                document.getElementById('play-pause').innerText = "멈춤";
            }
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
            document.getElementById('play-pause').innerText = "시작";
        }

        document.getElementById('play-pause').onclick = () => {
            if (timer) stopTimer(); else startTimer();
        };

        document.getElementById('speed-up').onclick = () => {
            delay *= 0.8;
            if (timer) { stopTimer(); startTimer(); }
        };

        document.getElementById('speed-down').onclick = () => {
            delay *= 1.2;
            if (timer) { stopTimer(); startTimer(); }
        };

        resetBtn.onclick = () => location.reload();
    </script>
</body>
</html>
