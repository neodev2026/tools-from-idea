<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대우주 탐험: 블랙홀의 끝까지</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; perspective: 1000px; }

        #game-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1; transition: all 2s ease;
        }

        #block-container {
            position: absolute; left: 50%; bottom: 25%; 
            transform: translateX(-50%) translateY(0px);
            display: flex; flex-direction: column-reverse; align-items: center;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #counter {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 4rem; font-weight: bold; color: #00f2ff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); z-index: 100;
        }

        #ready-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12rem; font-weight: bold; color: #fff;
            text-shadow: 0 0 30px #ff00ff; z-index: 200; display: none;
        }

        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 10px;
        }

        button {
            padding: 12px 20px; font-size: 1rem; font-weight: bold; cursor: pointer;
            border-radius: 25px; border: none; background: #333; color: white;
            box-shadow: 0 4px #000;
        }

        #reset-btn {
            position: fixed; top: 60%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 2rem; background: #ff0055;
            display: none; z-index: 300; border-radius: 50px; cursor: pointer;
        }

        .block {
            width: 180px; height: 80px; border: 2px solid rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; color: white;
            margin-bottom: 2px; flex-shrink: 0; border-radius: 10px;
            animation: popIn 0.4s ease-out;
        }

        .special-block {
            width: 250px; height: 250px; border-radius: 50%;
            font-size: 8rem; border: 10px solid #fff;
            box-shadow: 0 0 60px rgba(255,255,255,0.5);
            margin: 50px 0; background: radial-gradient(circle, #444, #000);
        }

        /* 블랙홀 애니메이션 */
        .black-hole {
            width: 300px; height: 300px; background: #000; border-radius: 50%;
            box-shadow: 0 0 100px 20px #fff, 0 0 150px 40px #ff00ff;
            animation: suck 2s infinite alternate, rotate 5s linear infinite;
        }

        @keyframes suck { from { transform: scale(1); } to { transform: scale(1.2); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .sucking-out {
            transition: all 2s ease-in; transform: scale(0) rotate(720deg) !important;
            opacity: 0;
        }

        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="counter">0</div>
    <div id="ready-msg"></div>
    <button id="reset-btn">다시 처음 부터</button>

    <div id="viewport">
        <div id="game-background"></div>
        <div id="block-container"></div>
    </div>

    <div class="controls" id="main-controls">
        <button onclick="toggleGame()">시작/멈춤</button>
        <button onclick="adjustSpeed(0.8)">🚀 빠르게</button>
        <button onclick="adjustSpeed(1.2)">🐢 느리게</button>
    </div>

    <script>
        let countValue = 0;
        let blockCount = 0;
        let timer = null;
        let delay = 500;
        let isWaiting = false;

        const container = document.getElementById('block-container');
        const counterDisplay = document.getElementById('counter');
        const readyMsg = document.getElementById('ready-msg');
        const resetBtn = document.getElementById('reset-btn');

        // 천체 리스트
        const solarSystem = ['☀️', '☿️', '♀️', '🌍', '♂️', '♃', '♄', '♅', '♆'];
        const galaxies = Array(100).fill('🌀'); // 은하계 100개
        const allObjects = [...solarSystem, ...galaxies];

        function addBlock() {
            if (isWaiting) return;

            blockCount++;
            countValue += 10000;
            counterDisplay.innerText = countValue.toLocaleString();

            const block = document.createElement('div');
            
            // 200개마다 행성/은하 등장
            if (blockCount > 0 && blockCount % 200 === 0) {
                const objectIdx = (blockCount / 200) - 1;
                
                if (objectIdx < allObjects.length) {
                    block.className = 'block special-block';
                    block.innerText = allObjects[objectIdx];
                    container.appendChild(block);
                    triggerPause(4);
                } else {
                    // 블랙홀 등장 (모든 행성+은하 끝난 후 다음 200번째)
                    block.className = 'block special-block black-hole';
                    block.innerText = '';
                    container.appendChild(block);
                    triggerBlackHole();
                    return;
                }
            } else {
                block.className = 'block';
                block.innerText = countValue.toLocaleString();
                block.style.backgroundColor = `hsl(${(blockCount * 5) % 360}, 60%, 40%)`;
                container.appendChild(block);
            }

            updateCamera();
        }

        function updateCamera() {
            const blocks = container.childNodes;
            let totalHeight = 0;
            blocks.forEach(b => totalHeight += (b.offsetHeight || 0) + 5);
            container.style.transform = `translateX(-50%) translateY(${totalHeight - 200}px)`;
        }

        async function triggerPause(seconds) {
            isWaiting = true;
            stopTimer();
            readyMsg.style.display = 'block';
            for (let i = seconds; i > 0; i--) {
                readyMsg.innerText = i;
                await new Promise(r => setTimeout(r, 1000));
            }
            readyMsg.style.display = 'none';
            isWaiting = false;
            startTimer();
        }

        function triggerBlackHole() {
            stopTimer();
            isWaiting = true;
            document.getElementById('main-controls').style.display = 'none';
            
            setTimeout(() => {
                container.classList.add('sucking-out');
                setTimeout(() => {
                    resetBtn.style.display = 'block';
                }, 2000);
            }, 1000);
        }

        function startTimer() {
            if (!timer) timer = setInterval(addBlock, delay);
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
        }

        function toggleGame() {
            if (timer) stopTimer(); else startTimer();
        }

        function adjustSpeed(factor) {
            delay *= factor;
            if (timer) { stopTimer(); startTimer(); }
        }

        resetBtn.onclick = () => {
            location.reload(); // 간단하게 페이지 새로고침으로 초기화
        };
    </script>
</body>
</html>
