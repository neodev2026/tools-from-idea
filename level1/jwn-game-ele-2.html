<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엘리베이터 몬스터 게임</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        /* 왼쪽: 엘리베이터 영역 */
        #game-area {
            flex: 2;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            border-right: 5px solid #333;
            overflow: hidden;
        }

        #elevator {
            width: 100px;
            height: 120px;
            background-color: #95a5a6;
            border: 4px solid #34495e;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border-radius: 10px;
            z-index: 10;
            transition: bottom 0.5s ease;
        }

        .monster {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            z-index: 5;
        }

        /* 오른쪽: 정보 및 버튼 영역 */
        #ui-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fff;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }

        h2 { color: #2c3e50; margin-bottom: 10px; }
        .info { font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #3498db;
            color: white;
            transition: background 0.3s;
        }

        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        #message {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #e67e22;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="elevator">🛗</div>
    </div>

    <div id="ui-area">
        <h2>엘리베이터 게임</h2>
        <div class="info">
            현재 층: <span id="current-floor">1층</span><br>
            잡은 몬스터: <span id="score">0</span> / 10
        </div>
        
        <div class="btn-group">
            <button onclick="goToFloor('Aschaffenburg')">Aschaffenburg 가기</button>
            <button onclick="goToFloor('Frankfurt')">Frankfurt 가기</button>
            <button onclick="goToFloor('100000T')">100000T 가기</button>
        </div>

        <div id="message">층 버튼을 눌러주세요!</div>
    </div>

    <script>
        const elevator = document.getElementById('elevator');
        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('score');
        const floorDisplay = document.getElementById('current-floor');
        const message = document.getElementById('message');
        const buttons = document.querySelectorAll('button');

        let score = 0;
        let isMoving = false;
        const monsters = ['👾', '👻', '👹', '🎃', '👽', '👿'];

        function goToFloor(floorName) {
            if (isMoving) return;
            
            // 초기화
            isMoving = true;
            score = 0;
            scoreDisplay.innerText = score;
            message.innerText = floorName + "층으로 출발!";
            buttons.forEach(btn => btn.disabled = true);
            
            // 엘리베이터를 바닥으로 리셋 (부드럽게)
            elevator.style.bottom = "10px";
            
            // 몬스터 생성 시작
            startMonsterWave(floorName);
        }

        function startMonsterWave(floorName) {
            const spawnInterval = setInterval(() => {
                if (score >= 10) {
                    clearInterval(spawnInterval);
                    finishTrip(floorName);
                    return;
                }
                createMonster();
            }, 1500); // 1.5초마다 몬스터 등장
        }

        function createMonster() {
            const monster = document.createElement('div');
            monster.className = 'monster';
            monster.innerText = monsters[Math.floor(Math.random() * monsters.length)];
            
            // 랜덤 가로 위치
            monster.style.left = Math.random() * (gameArea.clientWidth - 50) + "px";
            monster.style.top = "-50px";
            
            gameArea.appendChild(monster);

            // 몬스터 내려오기 애니메이션
            let topPos = -50;
            const fallInterval = setInterval(() => {
                topPos += 2;
                monster.style.top = topPos + "px";

                // 엘리베이터에 닿거나 화면 밖으로 나가면 제거 (여기선 단순화)
                if (topPos > gameArea.clientHeight) {
                    clearInterval(fallInterval);
                    monster.remove();
                }
            }, 20);

            // 몬스터 터치 이벤트
            monster.addEventListener('mousedown', () => {
                score++;
                scoreDisplay.innerText = score;
                
                // 엘리베이터 조금씩 상승
                const currentBottom = parseInt(elevator.style.bottom);
                elevator.style.bottom = (currentBottom + (gameArea.clientHeight / 12)) + "px";
                
                clearInterval(fallInterval);
                monster.remove();
                
                if (score === 10) {
                    message.innerText = "도착했습니다!";
                }
            });
        }

        function finishTrip(floorName) {
            isMoving = false;
            floorDisplay.innerText = floorName + "층";
            elevator.style.bottom = (gameArea.clientHeight - 130) + "px"; // 맨 위에 고정
            buttons.forEach(btn => btn.disabled = false);
            message.innerText = "🎉 " + floorName + " 도착! 🎉";
        }
    </script>
</body>
</html>
