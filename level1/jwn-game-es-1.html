<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>м•ҢлЎқлӢ¬лЎқ м—җмҠӨм»¬л Ҳмқҙн„° лӘЁн—ҳ!</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Nanum Gothic', 'л§‘мқҖ кі л”•', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            padding-top: 10px;
        }

        h1 {
            color: #333;
            margin-top: 5px;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #ui-panel {
            text-align: center;
            margin-bottom: 10px;
            width: 850px;
            max-width: 95vw;
        }

        .message-box {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            border: 4px solid #ff99cc;
            font-size: 1.4rem;
            font-weight: bold;
            color: #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, border-color 0.3s;
        }

        /* 20мёө кұҙл¬јмқ„ к°җмӢёлҠ” мҠӨнҒ¬лЎӨ к°ҖлҠҘн•ң м°Ҫ */
        #game-wrapper {
            width: 850px;
            max-width: 95vw;
            height: 70vh; /* нҷ”л©ҙмқҳ 70% лҶ’мқҙл§Ң м°Ём§Җ (нғңлё”лҰҝ мөңм Ғнҷ”) */
            overflow-y: auto;
            overflow-x: hidden;
            border: 10px solid #778899;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background-color: #a0c4ff; /* л°”к№Ҙ н•ҳлҠҳ л°°кІҪ */
            position: relative;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 1250px; /* 20мёө м „мІҙ лҶ’мқҙ */
            background-color: #fffaf0; /* кұҙл¬ј лӮҙл¶Җ мғүмғҒ */
        }

        .floor {
            position: absolute;
            width: 100%;
            height: 15px;
            background-color: #d3d3d3;
            border-top: 3px solid #b0c4de;
            z-index: 5;
        }

        .floor-desc {
            position: absolute;
            left: 20px;
            width: 550px; /* кіөк°„ л„үл„үн•ҳкІҢ */
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            z-index: 6;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .escalator-track {
            position: absolute;
            height: 12px;
            border-radius: 6px;
            z-index: 2;
        }

        .up-esc {
            background: repeating-linear-gradient(90deg, #4682b4, #4682b4 10px, #5f9ea0 10px, #5f9ea0 20px);
            border: 2px solid #2f4f4f;
            z-index: 4;
        }

        .down-esc {
            background: repeating-linear-gradient(90deg, #a9a9a9, #a9a9a9 10px, #808080 10px, #808080 20px);
            opacity: 0.4;
            z-index: 1;
        }

        .boarding-zone {
            position: absolute;
            width: 50px;
            height: 15px;
            background-color: #ffeb3b;
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 0 10px #ffeb3b;
        }

        #player {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: grab;
            transition: left 0.1s linear; 
            touch-action: none; 
        }

        #player:active {
            cursor: grabbing;
        }

        /* лЁёлҰ¬ мң„лЎң лңЁлҠ” н”ҢлЎңнҢ… лІ„нҠј */
        #floating-btn-container {
            position: absolute;
            display: none; /* кё°ліё мҲЁк№Җ */
            flex-direction: row;
            gap: 10px;
            z-index: 100;
            transform: translateX(-50%); /* мәҗлҰӯн„° мӨ‘м•ҷ м •л ¬ */
        }

        .f-btn {
            font-size: 2rem;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #ffcc00;
            border: 4px solid #ff6699;
            color: #333;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
            animation: bounce 1s infinite alternate;
            padding: 0;
            margin: 0;
        }

        .f-btn:active {
            transform: scale(0.9);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-8px); }
        }

        .emoji-group {
            display: inline-flex;
            align-items: flex-end;
        }

        .emoji-item {
            display: inline-block;
            font-size: 40px;
            position: relative;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        .emoji-item:not(:first-child) {
            margin-left: -18px; 
        }

        .guide-text {
            font-size: 1.1rem;
            color: #555;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>рҹҸў мҡ°лҰ¬ к°ҖмЎұ 20мёө м—җмҠӨм»¬л Ҳмқҙн„° м—¬н–ү</h1>

    <div id="ui-panel">
        <div class="message-box" id="msg">
            <div>м•Ҳл…•! мҶҗк°ҖлқҪмңјлЎң лӮҳлҘј лҒҢм–ҙм„ң мқҙлҸҷн•ҙлҙҗ!</div>
            <div id="msg-emoji" class="emoji-group"></div>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="floating-btn-container">
                <button id="float-up" class="f-btn">рҹ”ј</button>
                <button id="float-down" class="f-btn">рҹ”Ҫ</button>
            </div>
        </div>
    </div>

    <div class="guide-text">
        мЎ°мһ‘лІ•: <b>мәҗлҰӯн„°лҘј лҒҢм–ҙм„ң(л“ңлһҳк·ё)</b> л…ёлһҖмғү м—җмҠӨм»¬л Ҳмқҙн„° нғ‘мҠ№кө¬лЎң к°Җм„ёмҡ”!<br>
        лҸ„м°©н•ҳл©ҙ лЁёлҰ¬ мң„м—җ мғқкё°лҠ” <b>лІ„нҠј</b>мқ„ лҲ„лҘҙм„ёмҡ”.
    </div>

<script>
    // 20мёө лҚ°мқҙн„°
    const floorsData = [
        { f: 1, text: "рҹӣ’ 1мёө: мҠҲнҚјл§Ҳмј“м—җм„ң м¶ңл°ң!", emojis: ["рҹ‘¶"] },
        { f: 2, text: "рҹҸ  2мёө: мҡ°лҰ¬ м§‘м—җ мҷ”м–ҙмҡ”.", emojis: ["рҹ‘¶"] },
        { f: 3, text: "рҹ‘© 3мёө: м—„л§Ҳ! м•Ҳл…•!", emojis: ["рҹ‘©", "рҹ‘¶"] },
        { f: 4, text: "рҹ‘Ё 4мёө: м•„л№ лҸ„ л§ҢлӮ¬м–ҙмҡ”!", emojis: ["рҹ‘Ё", "рҹ‘©", "рҹ‘¶"] },
        { f: 5, text: "рҹ‘Ұрҹ‘§ 5мёө: м§Җмӣҗмқҙлһ‘ лҲ„лӮҳлӢӨ!", emojis: ["рҹ‘Ё", "рҹ‘©", "рҹ‘Ұ", "рҹ‘§", "рҹ‘¶"] },
        { f: 6, text: "рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ 6мёө: мҡ°лҰ¬ к°ҖмЎұ лӢӨ лӘЁмҳҖлӢӨ! кә„м•„~", emojis: ["рҹ‘Ё", "рҹ‘©", "рҹ‘Ұ", "рҹ‘§", "рҹ‘¶"] },
        { f: 7, text: "рҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ 7мёө: м•„л№ лҠ” мһ мӢң нҡҢмӮ¬лЎң~ (4лӘ…)", emojis: ["рҹ‘©", "рҹ‘Ұ", "рҹ‘§", "рҹ‘¶"] },
        { f: 8, text: "рҹ‘©вҖҚрҹ‘Ұ 8мёө: лҲ„лӮҳлҸ„ н•ҷмӣҗ к°”м–ҙмҡ”. (3лӘ…)", emojis: ["рҹ‘©", "рҹ‘Ұ", "рҹ‘¶"] },
        { f: 9, text: "рҹ§ё 9мёө: мҡ°мҷҖ! мһҘлӮңк°җ к°ҖкІҢлӢӨ!!!", emojis: ["рҹ‘©", "рҹ‘Ұ", "рҹ‘¶"] },
        { f: 10, text: "рҹҸў 10мёө: EDEKA лҸ„м°©! м•„мқҙмҠӨнҒ¬лҰј мӮ¬лЁ№мһҗ!", emojis: ["рҹ‘©", "рҹ‘Ұ", "рҹ‘¶"] },
        { f: 11, text: "рҹҚҰ 11мёө: м•—, м°Ёк°ҖмӣҢ! лӢ¬мҪӨн•ң м•„мқҙмҠӨнҒ¬лҰј!", emojis: ["рҹҚҰ", "рҹ‘¶"] },
        { f: 12, text: "рҹҺҲ 12мёө: л‘Ҙл‘Ҙ~ мҳҲмҒң н’Қм„ мқҙ к°Җл“қн•ҙмҡ”", emojis: ["рҹҺҲ", "рҹ‘¶"] },
        { f: 13, text: "рҹ“ҡ 13мёө: мһ¬лҜёмһҲлҠ” к·ёлҰјмұ… лҸ„м„ңкҙҖ", emojis: ["рҹ“ҡ", "рҹ‘¶"] },
        { f: 14, text: "рҹҗ¶ 14мёө: л©Қл©Қ! к°•м•„м§Җ лҶҖмқҙн„°", emojis: ["рҹҗ¶", "рҹ‘¶"] },
        { f: 15, text: "рҹҚ• 15мёө: лғ лғ ~ л§ӣмһҲлҠ” н”јмһҗ лғ„мғҲ!", emojis: ["рҹҚ•", "рҹ‘¶"] },
        { f: 16, text: "рҹҺө 16мёө: л”©лҸҷлҢ•~ н”јм•„л…ё м—°мЈјн•ҙліҙкё°", emojis: ["рҹҺө", "рҹ‘¶"] },
        { f: 17, text: "рҹҺЁ 17мёө: м•ҢлЎқлӢ¬лЎқ л¬јк°җлҶҖмқҙ лҜёмҲ  н•ҷмӣҗ", emojis: ["рҹҺЁ", "рҹ‘¶"] },
        { f: 18, text: "рҹӘҙ 18мёө: н–Ҙкё°лЎңмҡҙ мҳҲмҒң кҪғм§‘", emojis: ["рҹӘҙ", "рҹ‘¶"] },
        { f: 19, text: "рҹҡҖ 19мёө: мҠҲмӣ…~ мҡ°мЈјм„  мІҙн—ҳкҙҖ!", emojis: ["рҹҡҖ", "рҹ‘¶"] },
        { f: 20, text: "вңЁ 20мёө: мҳҘмғҒ м •мӣҗ нҢҢнӢ°мһҘ лҸ„м°©!!! м°ё мһҳн–Ҳм–ҙмҡ”!", emojis: ["рҹҺү", "рҹҺҠ", "рҹ‘¶"] }
    ];

    const container = document.getElementById('game-container');
    const wrapper = document.getElementById('game-wrapper');
    const msgBox = document.getElementById('msg');
    const msgBoxText = msgBox.querySelector('div');
    const msgBoxEmoji = document.getElementById('msg-emoji');
    const floatBtnContainer = document.getElementById('floating-btn-container');
    const floatBtnUp = document.getElementById('float-up');
    const floatBtnDown = document.getElementById('float-down');
    
    // м„Өм •к°’
    const floorHeight = 60; 
    const startY = 30; 
    const escStartX = 620; // м—җмҠӨм»¬л Ҳмқҙн„° мһ…кө¬ (мҡ°мёЎмңјлЎң мқҙлҸҷ)
    const escWidth = 150;  // м—җмҠӨм»¬л Ҳмқҙн„° кёёмқҙ
    const maxPosX = escStartX + escWidth; // лӮҙлҰ¬лҠ” кіімқҳ мўҢн‘ң (770)
    
    const trackLength = Math.sqrt(escWidth * escWidth + floorHeight * floorHeight); 
    const angle = Math.atan2(floorHeight, escWidth) * (180 / Math.PI);

    // 20к°ң мёө мғқм„ұ
    floorsData.forEach((data, index) => {
        const floorBottom = startY + (index * floorHeight);

        const floorDiv = document.createElement('div');
        floorDiv.className = 'floor';
        floorDiv.style.bottom = `${floorBottom}px`;
        container.appendChild(floorDiv);

        const descDiv = document.createElement('div');
        descDiv.className = 'floor-desc';
        descDiv.style.bottom = `${floorBottom + 20}px`;
        descDiv.innerText = `${data.text}`;
        container.appendChild(descDiv);

        if (data.f < 20) { // л§Ё мң—мёө(20мёө)мқҖ мҳ¬лқјк°ҖлҠ” м—җмҠӨм»¬л Ҳмқҙн„° м—ҶмқҢ
            const zone = document.createElement('div');
            zone.className = 'boarding-zone';
            zone.style.left = `${escStartX}px`;
            zone.style.bottom = `${floorBottom + 10}px`;
            container.appendChild(zone);

            const upEsc = document.createElement('div');
            upEsc.className = 'escalator-track up-esc';
            upEsc.style.width = `${trackLength}px`;
            upEsc.style.left = `${escStartX + 20}px`;
            upEsc.style.bottom = `${floorBottom + 15}px`;
            upEsc.style.transformOrigin = `left center`;
            upEsc.style.transform = `rotate(-${angle}deg)`;
            container.appendChild(upEsc);

            const downEsc = document.createElement('div');
            downEsc.className = 'escalator-track down-esc';
            downEsc.style.width = `${trackLength}px`;
            downEsc.style.left = `${escStartX + 20}px`;
            downEsc.style.bottom = `${floorBottom + floorHeight + 15}px`;
            downEsc.style.transformOrigin = `left center`;
            downEsc.style.transform = `rotate(${angle}deg)`;
            container.appendChild(downEsc);
        }
    });

    // н”Ңл Ҳмқҙм–ҙ мғқм„ұ
    const player = document.createElement('div');
    player.id = 'player';
    container.appendChild(player);

    let currentFloor = 1;
    let posX = 50; // мӢңмһ‘мқҖ мҷјмӘҪ
    let isRiding = false;

    // мқҙлӘЁнӢ°мҪҳ кІ№м№Ё л ҢлҚ”л§Ғ
    function renderEmojis(emojisArray) {
        let html = '<div class="emoji-group">';
        emojisArray.forEach((emoji, idx) => {
            html += `<span class="emoji-item" style="z-index: ${emojisArray.length - idx}">${emoji}</span>`;
        });
        html += '</div>';
        return html;
    }

    // м№ҙл©”лқј(мҠӨнҒ¬лЎӨ)к°Җ н”Ңл Ҳмқҙм–ҙлҘј м«“м•„лӢӨлӢҲкІҢ н•ҳлҠ” н•ЁмҲҳ
    function scrollToPlayer() {
        const playerBottom = parseInt(player.style.bottom);
        const containerHeight = 1250;
        // мәҗлҰӯн„°к°Җ нҷ”л©ҙ мӨ‘м•ҷм—җ мҳӨлҸ„лЎқ мҠӨнҒ¬лЎӨ мң„м№ҳ кі„мӮ°
        const targetScrollTop = containerHeight - playerBottom - (wrapper.clientHeight / 1.5);
        wrapper.scrollTo({ top: targetScrollTop, behavior: 'smooth' });
    }

    // нҷ”л©ҙ л°Ҹ мң„м№ҳ м—…лҚ°мқҙнҠё, н”ҢлЎңнҢ… лІ„нҠј м ңм–ҙ
    function updatePosition() {
        if (isRiding) return;
        
        const floorBottom = startY + ((currentFloor - 1) * floorHeight);
        player.style.left = posX + 'px';
        player.style.bottom = (floorBottom + 15) + 'px';

        // м—җмҠӨм»¬л Ҳмқҙн„° мһ…кө¬(нғ‘мҠ№кө¬м—ӯ)м—җ лҸ„лӢ¬н–ҲлҠ”м§Җ нҷ•мқё
        if (posX === escStartX) {
            floatBtnContainer.style.display = 'flex';
            // лІ„нҠј мң„м№ҳлҘј мәҗлҰӯн„° лЁёлҰ¬ мң„лЎң м„Өм •
            floatBtnContainer.style.left = (posX + 30) + 'px'; // мәҗлҰӯн„°(л„Ҳл№„ 60) мӨ‘м•ҷ
            floatBtnContainer.style.bottom = (floorBottom + 85) + 'px';

            floatBtnUp.style.display = currentFloor < 20 ? 'flex' : 'none';
            floatBtnDown.style.display = currentFloor > 1 ? 'flex' : 'none';
        } else {
            floatBtnContainer.style.display = 'none'; // нғ‘мҠ№кө¬м—ӯ лІ—м–ҙлӮҳл©ҙ лІ„нҠј мҲЁк№Җ
        }
    }

    // мҙҲкё° мғҒнғң л ҢлҚ”л§Ғ
    player.innerHTML = renderEmojis(floorsData[0].emojis);
    msgBoxEmoji.innerHTML = renderEmojis(floorsData[0].emojis);
    updatePosition();
    setTimeout(scrollToPlayer, 500); // мӢңмһ‘ мӢң нҷ”л©ҙ л§һм¶Ө

    // ==========================================
    // л“ңлһҳк·ё & н„°м№ҳ мқҙлІӨнҠё лЎңм§Ғ
    // ==========================================
    let isDragging = false;
    let startClientX = 0;
    let initialPosX = 0;

    function startDrag(e) {
        if (isRiding) return;
        isDragging = true;
        startClientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        initialPosX = posX;
        player.style.transition = 'none';
        floatBtnContainer.style.display = 'none'; // л“ңлһҳк·ё мӨ‘м—җлҠ” лІ„нҠј мҲЁк№Җ
    }

    function doDrag(e) {
        if (!isDragging || isRiding) return;
        e.preventDefault(); 
        
        let currentClientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        let deltaX = currentClientX - startClientX;
        
        // мқҙлҸҷ лІ”мң„: л§Ё мҷјмӘҪ(20) ~ м—җмҠӨм»¬л Ҳмқҙн„° лӮҙлҰ¬лҠ” кіі(maxPosX)
        posX = Math.max(20, Math.min(maxPosX, initialPosX + deltaX));
        
        const floorBottom = startY + ((currentFloor - 1) * floorHeight);
        player.style.left = posX + 'px';
        player.style.bottom = (floorBottom + 15) + 'px';
    }

    function endDrag() {
        if (!isDragging) return;
        isDragging = false;
        player.style.transition = 'left 0.1s linear';

        // м—җмҠӨм»¬л Ҳмқҙн„° мһ…кө¬(escStartX) к·јмІҳм—җ лҶ“мңјл©ҙ мһҗм„қмІҳлҹј м°©! л¶ҷмқҢ
        if (posX > escStartX - 15 && posX < escStartX + 15) {
            posX = escStartX; 
        }
        
        updatePosition();
    }

    player.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', doDrag);
    window.addEventListener('mouseup', endDrag);

    player.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('touchmove', doDrag, { passive: false });
    window.addEventListener('touchend', endDrag);


    // ==========================================
    // м—җмҠӨм»¬л Ҳмқҙн„° нғҖкё° м• лӢҲл©”мқҙм…ҳ
    // ==========================================
    function rideEscalator(direction) {
        if (isRiding) return;
        isRiding = true;
        floatBtnContainer.style.display = 'none'; // нғҖлҠ” лҸҷм•Ҳ лІ„нҠј мҲЁк№Җ

        const targetFloor = direction === 'up' ? currentFloor + 1 : currentFloor - 1;
        // лӘ©м Ғм§ҖлҠ” н•ӯмғҒ м—җмҠӨм»¬л Ҳмқҙн„° мҡ°мёЎ лҒқ (лҸ„м°© м§Җм җ)
        const targetX = maxPosX; 
        const targetY = startY + ((targetFloor - 1) * floorHeight) + 15;

        // 1. лҢҖк°Ғм„  мқҙлҸҷ м• лӢҲл©”мқҙм…ҳ
        player.style.transition = 'left 1.5s linear, bottom 1.5s linear';
        player.style.left = targetX + 'px';
        player.style.bottom = targetY + 'px';
        
        // нғҖлҠ” лҸҷм•Ҳ м№ҙл©”лқјлҸ„ мӮҙм§қ л”°лқјк°Җкё° мӢңмһ‘
        setTimeout(scrollToPlayer, 300);

        // 2. м• лӢҲл©”мқҙм…ҳ мҷ„лЈҢ мІҳлҰ¬ (мҲңк°„мқҙлҸҷ м•Ҳн•Ё! лҸ„м°©н•ң мһҗлҰ¬м—җ к·ёлҢҖлЎң м„ң мһҲмқҢ)
        setTimeout(() => {
            currentFloor = targetFloor;
            posX = targetX; // мҳӨлҘёмӘҪ лҸ„м°© мһҗлҰ¬м—җ к·ёлҢҖлЎң мң„м№ҳ
            
            player.style.transition = 'left 0.1s linear'; // л“ңлһҳк·ёмҡ© нҠёлһңм§Җм…ҳ ліөкө¬
            
            // мәҗлҰӯн„° л°Ҹ л©”мӢңм§Җ м—…лҚ°мқҙнҠё
            const floorInfo = floorsData[currentFloor - 1];
            msgBoxText.innerText = floorInfo.text;
            const overlappedHTML = renderEmojis(floorInfo.emojis);
            
            msgBoxEmoji.innerHTML = overlappedHTML;
            player.innerHTML = overlappedHTML;

            if (currentFloor === 20) {
                msgBox.style.background = '#ffffcc';
                msgBox.style.borderColor = '#ffaa00';
            } else {
                msgBox.style.background = 'white';
                msgBox.style.borderColor = '#ff99cc';
            }

            isRiding = false;
            updatePosition();
            scrollToPlayer(); // лҸ„м°© нӣ„ м№ҙл©”лқј мҷ„лІҪ м •л ¬

        }, 1500);
    }

    floatBtnUp.addEventListener('click', () => rideEscalator('up'));
    floatBtnDown.addEventListener('click', () => rideEscalator('down'));

</script>
</body>
</html>
